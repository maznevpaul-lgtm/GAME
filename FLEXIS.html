<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Флексис Тетрис — вертикальная адаптация</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            touch-action: pan-y; /* запрещаем горизонтальный скролл */
        }
        /* Главный контейнер — вертикальная колонка */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }
        /* Обёртка поля с тенью */
        .canvas-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            background: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #050505;
        }
        /* Панель информации (счёт, рекорд, следующая фигура) */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: #111;
            border-radius: 30px;
            padding: 8px 16px;
            margin: 12px 0;
            gap: 16px;
            backdrop-filter: blur(4px);
        }
        .stats {
            display: flex;
            gap: 20px;
        }
        .stat {
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            color: #aaa;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1;
            color: #4CAF50;
        }
        .record-value {
            color: #FFD966;
        }
        .next-box {
            text-align: center;
        }
        .next-label {
            font-size: 10px;
            color: #aaa;
        }
        #next-canvas {
            background: #0a0a0a;
            border-radius: 12px;
            width: 60px;
            height: 60px;
            border: 1px solid #333;
        }
        .bonus-icon {
            font-size: 24px;
            margin-left: 8px;
        }
        /* Кнопки управления — 2x2 сетка */
        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 280px;
            margin-top: 8px;
        }
        .ctrl-btn {
            background: #1e1e1e;
            border: 2px solid #3a3a3a;
            border-radius: 60px;
            font-size: 32px;
            padding: 12px 0;
            text-align: center;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
        }
        .ctrl-btn:active {
            background: #4CAF50;
            transform: scale(0.94);
        }
        /* Оверлеи (старт, пауза, game over) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        .btn {
            background: linear-gradient(135deg, #4CAF50, #2e7d32);
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            margin: 6px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .btn-small {
            background: #2c2c2c;
            border: 1px solid #555;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
        }
        .leaderboard {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 6px 10px;
            margin-top: 12px;
            font-size: 11px;
            width: 200px;
        }
        .leaderboard table {
            width: 100%;
            color: #ddd;
        }
        .slider-container {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12px;
            margin: 8px 0;
        }
        input[type="range"] {
            width: 120px;
        }
        .toast {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            backdrop-filter: blur(12px);
            color: #4CAF50;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            pointer-events: none;
            z-index: 300;
            display: none;
            white-space: nowrap;
            font-size: 14px;
        }
        .top-buttons {
            position: absolute;
            top: 8px;
            left: 8px;
            display: flex;
            gap: 8px;
            z-index: 50;
        }
        .score-absolute {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 22px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 2px 12px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            z-index: 50;
            color: #4CAF50;
        }
        @media (max-width: 480px) {
            .ctrl-btn { font-size: 28px; padding: 10px 0; }
            .stat-value { font-size: 24px; }
            #next-canvas { width: 50px; height: 50px; }
            .info-bar { padding: 6px 12px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
<div class="game-container">
    <div class="canvas-wrapper" id="canvas-wrapper">
        <div class="top-buttons">
            <button class="btn-small" onclick="location.reload()">🏠 Меню</button>
            <button class="btn-small" onclick="togglePause()">⏸ Пауза</button>
        </div>
        <div class="score-absolute" id="score-hud">0</div>
        <div id="canvas-container"></div>

        <!-- Оверлеи -->
        <div id="start-screen" class="overlay">
            <h2 style="color:#4CAF50; margin:0 0 8px;">FLEXIS</h2>
            <p style="margin:0 0 8px; font-size:12px;">Тетрис + физика + бонусы</p>
            <button class="btn" onclick="startGame('classic')">КЛАССИКА</button>
            <button class="btn" style="background:#FF9800;" onclick="startGame('accel')">УСКОРЕНИЕ</button>
            <button class="btn" style="background:#9C27B0;" onclick="startGame('survival')">ВЫЖИВАНИЕ</button>
            <button id="load-main-btn" class="btn" style="background:#2196F3; display:none;" onclick="loadGame()">📀 ПРОДОЛЖИТЬ</button>
            <div class="slider-container">
                <span>⚙️ Сложность</span>
                <input type="range" id="gravity-slider" min="0.4" max="1.4" step="0.02" value="0.65">
                <span id="grav-value">0.65</span>
            </div>
            <button id="mute-btn" class="btn-small" onclick="toggleMute()" style="background:#2c2c2c;">🔊 Звук вкл</button>
            <div class="leaderboard">
                <div>🏆 ТОП-5</div>
                <table id="leaderboard-table"><tr><th>#</th><th>Счёт</th><th>Режим</th></tr></table>
            </div>
        </div>
        <div id="pause-screen" class="overlay" style="display:none;">
            <h2 style="color:#FF9800;">ПАУЗА</h2>
            <button class="btn" onclick="togglePause()">ПРОДОЛЖИТЬ</button>
            <button class="btn" style="background:#1976D2;" onclick="saveGame()">💾 СОХРАНИТЬ</button>
        </div>
        <div id="game-over" class="overlay" style="display:none;">
            <h2 style="color:#f44336;">GAME OVER</h2>
            <p>Счёт: <strong id="final-score">0</strong></p>
            <button class="btn" onclick="restartGame()">🔄 ЗАНОВО</button>
        </div>
    </div>

    <div class="info-bar">
        <div class="stats">
            <div class="stat">
                <div class="stat-label">СЧЁТ</div>
                <div class="stat-value" id="score-panel">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">РЕКОРД</div>
                <div class="stat-value record-value" id="record-panel">0</div>
            </div>
        </div>
        <div class="bonus-icon" id="bonus-indicator">✨</div>
        <div class="next-box">
            <div class="next-label">СЛЕДУЮЩАЯ</div>
            <canvas id="next-canvas" width="80" height="80"></canvas>
        </div>
    </div>

    <div class="controls">
        <div class="ctrl-btn" id="btn-left">◀</div>
        <div class="ctrl-btn" id="btn-right">▶</div>
        <div class="ctrl-btn" id="btn-down">▼</div>
        <div class="ctrl-btn" id="btn-rotate">↻</div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
    (function(){
        const { Engine, Render, Bodies, Composite, Body, Events, Sleeping, Vector } = Matter;
        const GAME_W = 360, GAME_H = 600;
        const BLOCK = 30;
        const COLS = 12, ROWS = 20;

        // Физика
        let engine = Engine.create();
        engine.gravity.y = 0.65;
        engine.positionIterations = 12;
        engine.enableSleeping = false;

        const render = Render.create({
            element: document.getElementById('canvas-container'),
            engine: engine,
            options: { width: GAME_W, height: GAME_H, wireframes: false, background: '#050505' }
        });

        // Стены
        const wallOpt = { isStatic: true, restitution: 0.2, friction: 0, render: { fillStyle: '#111' } };
        const ground = Bodies.rectangle(GAME_W/2, GAME_H+25, GAME_W+100, 50, wallOpt);
        const leftWall = Bodies.rectangle(-25, GAME_H/2, 50, GAME_H*2, wallOpt);
        const rightWall = Bodies.rectangle(GAME_W+25, GAME_H/2, 50, GAME_H*2, wallOpt);
        Composite.add(engine.world, [ground, leftWall, rightWall]);

        // Фигуры
        const shapes = [
            [{x:0,y:0},{x:30,y:0},{x:60,y:0},{x:90,y:0}], // I
            [{x:0,y:0},{x:30,y:0},{x:0,y:30},{x:30,y:30}], // O
            [{x:30,y:0},{x:0,y:30},{x:30,y:30},{x:60,y:30}], // T
            [{x:0,y:0},{x:0,y:30},{x:30,y:30},{x:60,y:30}], // J
            [{x:60,y:0},{x:0,y:30},{x:30,y:30},{x:60,y:30}], // L
            [{x:30,y:0},{x:60,y:0},{x:0,y:30},{x:30,y:30}], // S
            [{x:0,y:0},{x:30,y:0},{x:30,y:30},{x:60,y:30}]  // Z
        ];
        const colors = ['#00e5f0','#f0e000','#c058f0','#3a6eff','#f0a030','#30f030','#f03050'];
        const rareShapes = [
            [{x:30,y:0},{x:0,y:30},{x:30,y:30},{x:60,y:30},{x:30,y:60}],
            [{x:0,y:0},{x:0,y:30},{x:30,y:30},{x:60,y:30},{x:60,y:0}],
            [{x:0,y:0},{x:30,y:0},{x:60,y:0},{x:90,y:0},{x:120,y:0}]
        ];
        const rareColors = ['#FFD966', '#B0BEC5', '#FF80AB'];

        // Состояние игры
        let activePiece = null;
        let lockedBodies = [];
        let score = 0;
        let bestScore = localStorage.getItem('flexis_best') ? parseInt(localStorage.getItem('flexis_best')) : 0;
        let currentMode = 'classic';
        let isGameOver = false, isGameStarted = false, isPaused = false;
        let nextShape = null, nextColor = null;
        let lockDelayTimer = null;
        let activeBonus = null;
        let bonusTimer = null;
        let survivalInterval = null;
        let survivalGravityMultiplier = 1.0;

        // Управление
        const keys = { left: false, right: false, softDrop: false };
        let rotateRequest = false;

        // DOM
        const scoreHud = document.getElementById('score-hud');
        const scorePanel = document.getElementById('score-panel');
        const recordPanel = document.getElementById('record-panel');
        const nextCanvas = document.getElementById('next-canvas');
        const ctxNext = nextCanvas.getContext('2d');
        const bonusIndicator = document.getElementById('bonus-indicator');
        const gravitySlider = document.getElementById('gravity-slider');
        const gravValueSpan = document.getElementById('grav-value');

        // Лидерборд
        let leaderboard = [];
        function loadLeaderboard() {
            const stored = localStorage.getItem('flexis_leaderboard');
            leaderboard = stored ? JSON.parse(stored) : [];
            updateLeaderboardUI();
        }
        function updateLeaderboardUI() {
            const tbody = document.getElementById('leaderboard-table');
            tbody.innerHTML = '<tr><th>#</th><th>Счёт</th><th>Режим</th></tr>';
            leaderboard.slice(0,5).forEach((entry, idx) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = idx+1;
                row.insertCell(1).innerText = entry.score;
                let modeStr = entry.mode === 'classic' ? 'Клас' : (entry.mode === 'accel' ? 'Ускор' : 'Выж');
                row.insertCell(2).innerText = modeStr;
            });
        }
        function addScoreToLeaderboard(score, mode) {
            leaderboard.push({ score, mode, date: Date.now() });
            leaderboard.sort((a,b) => b.score - a.score);
            if (leaderboard.length > 5) leaderboard = leaderboard.slice(0,5);
            localStorage.setItem('flexis_leaderboard', JSON.stringify(leaderboard));
            updateLeaderboardUI();
        }

        // Звук
        let audioCtx = null;
        let isMuted = false;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            if (isMuted) return;
            try {
                initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now+0.3);
                if (type === 'lock') { osc.frequency.value = 150; osc.start(now); osc.stop(now+0.1); }
                else if (type === 'clear') { osc.frequency.value = 880; osc.start(now); osc.stop(now+0.2); }
                else if (type === 'gameover') { osc.frequency.value = 200; osc.start(now); osc.stop(now+0.5); }
                else if (type === 'bonus') { osc.frequency.value = 1175; osc.start(now); osc.stop(now+0.2); }
                else { osc.frequency.value = 440; osc.start(now); osc.stop(now+0.15); }
            } catch(e) {}
        }
        window.toggleMute = () => { isMuted = !isMuted; document.getElementById('mute-btn').innerHTML = isMuted ? '🔇 Звук выкл' : '🔊 Звук вкл'; };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.style.display = 'block';
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => { toast.style.display = 'none'; toast.style.opacity = '1'; }, 300); }, 1500);
        }

        function updateScoreUI() {
            scoreHud.innerText = score;
            scorePanel.innerText = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flexis_best', bestScore);
                recordPanel.innerText = bestScore;
            }
        }

        // Генерация случайной фигуры
        function getRandomPiece() {
            if (Math.random() < 0.07) {
                const idx = Math.floor(Math.random() * rareShapes.length);
                return { shape: rareShapes[idx], color: rareColors[idx] };
            } else {
                const idx = Math.floor(Math.random() * shapes.length);
                return { shape: shapes[idx], color: colors[idx] };
            }
        }

        function drawNext() {
            ctxNext.clearRect(0, 0, 80, 80);
            if (!nextShape) return;
            const offX = 40, offY = 40;
            nextShape.forEach(p => {
                ctxNext.fillStyle = nextColor;
                ctxNext.fillRect(offX + p.x - 14, offY + p.y - 14, 28, 28);
                ctxNext.strokeStyle = '#000';
                ctxNext.strokeRect(offX + p.x - 14, offY + p.y - 14, 28, 28);
            });
        }

        function createPieceBody(shape, color, posX, posY) {
            const parts = shape.map(p => Bodies.rectangle(p.x, p.y, BLOCK, BLOCK, {
                render: { fillStyle: color, strokeStyle: '#111', lineWidth: 1 },
                chamfer: { radius: 4 }, friction: 0.05, restitution: 0.15, density: 0.002, sleepThreshold: Infinity
            }));
            const body = Body.create({ parts: parts, frictionAir: 0.04, restitution: 0.15 });
            Body.setPosition(body, { x: posX, y: posY });
            return body;
        }

        function spawnPiece() {
            if (isGameOver || isPaused) return;
            // Если нет следующей фигуры (при первом запуске) — создаём
            if (!nextShape) {
                const np = getRandomPiece();
                nextShape = np.shape;
                nextColor = np.color;
                drawNext();
            }
            const currentShape = nextShape;
            const currentColor = nextColor;
            // Генерируем следующую для preview
            const npNew = getRandomPiece();
            nextShape = npNew.shape;
            nextColor = npNew.color;
            drawNext();

            const spawnX = Math.round(GAME_W/2 / BLOCK) * BLOCK;
            const spawnY = -40;
            const newPiece = createPieceBody(currentShape, currentColor, spawnX, spawnY);
            activePiece = newPiece;
            Composite.add(engine.world, activePiece);
            wakeAll();

            // Проверка коллизии (Game Over при спавне)
            const collision = Composite.allBodies(engine.world).some(body => {
                if (body === activePiece || body.isStatic) return false;
                return activePiece.parts.some(part =>
                    part.bounds.min.x < body.bounds.max.x && part.bounds.max.x > body.bounds.min.x &&
                    part.bounds.min.y < body.bounds.max.y && part.bounds.max.y > body.bounds.min.y
                );
            });
            if (collision) {
                isGameOver = true;
                playSound('gameover');
                document.getElementById('final-score').innerText = score;
                document.getElementById('game-over').style.display = 'flex';
                if (activePiece) Composite.remove(engine.world, activePiece);
                activePiece = null;
                if (survivalInterval) clearInterval(survivalInterval);
                addScoreToLeaderboard(score, currentMode);
            }
        }

        function wakeAll() {
            Composite.allBodies(engine.world).forEach(b => { if (!b.isStatic) Sleeping.set(b, false); });
        }

        function lockPiece() {
            if (!activePiece || isGameOver) return;
            if (lockDelayTimer) clearTimeout(lockDelayTimer);
            const piece = activePiece;
            activePiece = null;
            // Выравнивание угла
            const targetAngle = Math.round(piece.angle / (Math.PI/2)) * (Math.PI/2);
            Body.setAngle(piece, targetAngle);
            piece.friction = 0.45;
            piece.frictionStatic = 0.6;
            piece.density = 0.015;
            if (piece.parts) piece.parts.forEach(p => { p.friction = 0.45; p.frictionStatic = 0.6; });
            lockedBodies.push(piece);
            playSound('lock');
            checkLinesAndClear();
            checkGameOverCondition();
            setTimeout(() => { if (!isGameOver && !isPaused) spawnPiece(); }, 80);
        }

        function buildGrid() {
            let grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));
            for (let body of lockedBodies) {
                if (!body || !body.parts) continue;
                const parts = body.parts.length > 1 ? body.parts.slice(1) : [body];
                for (let part of parts) {
                    let col = Math.round((part.position.x - 15) / BLOCK);
                    let row = Math.round((part.position.y - 15) / BLOCK);
                    if (col >= 0 && col < COLS && row >= 0 && row < ROWS) grid[row][col] = part;
                }
            }
            return grid;
        }

        function removeSpecificBlocks(blocksSet) {
            let newLocked = [];
            for (let body of lockedBodies) {
                let removed = false;
                const partsArray = body.parts.length > 1 ? body.parts.slice(1) : [body];
                const remaining = [];
                for (let part of partsArray) {
                    if (blocksSet.has(part)) removed = true;
                    else remaining.push(part);
                }
                if (removed && remaining.length > 0) {
                    const color = body.parts[1] ? body.parts[1].render.fillStyle : '#aaa';
                    for (let part of remaining) {
                        const nb = Bodies.rectangle(part.position.x, part.position.y, BLOCK, BLOCK, {
                            angle: part.angle, render: { fillStyle: color, strokeStyle: '#000' },
                            chamfer: { radius: 4 }, friction: 0.45, restitution: 0.1, sleepThreshold: Infinity
                        });
                        Composite.add(engine.world, nb);
                        newLocked.push(nb);
                    }
                    Composite.remove(engine.world, body);
                } else if (!removed) newLocked.push(body);
                else Composite.remove(engine.world, body);
            }
            lockedBodies = newLocked;
            wakeAll();
        }

        function activateBonus(type) {
            if (activeBonus) {
                if (bonusTimer) clearTimeout(bonusTimer);
                if (activeBonus.type === 'magnet') engine.gravity.y = activeBonus.originalGravity;
                if (activeBonus.type === 'slow') engine.timing.timeScale = activeBonus.originalTimeScale;
            }
            if (type === 'lightning') {
                let grid = buildGrid();
                let nonEmptyRows = [];
                for (let r=0; r<ROWS; r++) {
                    for (let c=0; c<COLS; c++) if (grid[r][c]) { nonEmptyRows.push(r); break; }
                }
                if (nonEmptyRows.length) {
                    const targetRow = nonEmptyRows[Math.floor(Math.random() * nonEmptyRows.length)];
                    let toRemove = new Set();
                    for (let c=0; c<COLS; c++) if (grid[targetRow][c]) toRemove.add(grid[targetRow][c]);
                    removeSpecificBlocks(toRemove);
                    score += 50;
                    updateScoreUI();
                    showToast("⚡ Молния! +50");
                    playSound('clear');
                } else showToast("⚡ Нет строк");
                return;
            }
            const originalGravity = engine.gravity.y;
            const originalTimeScale = engine.timing.timeScale;
            if (type === 'magnet') {
                engine.gravity.y = originalGravity * 2;
                showToast("🧲 Магнит! Гравитация x2");
                activeBonus = { type, endTime: Date.now()+6000, originalGravity, originalTimeScale };
                bonusTimer = setTimeout(() => { if (activeBonus && activeBonus.type === 'magnet') engine.gravity.y = activeBonus.originalGravity; activeBonus=null; bonusIndicator.innerText='✨'; }, 6000);
            } else if (type === 'slow') {
                engine.timing.timeScale = 0.5;
                showToast("🐢 Замедление времени");
                activeBonus = { type, endTime: Date.now()+6000, originalGravity, originalTimeScale };
                bonusTimer = setTimeout(() => { if (activeBonus && activeBonus.type === 'slow') engine.timing.timeScale = activeBonus.originalTimeScale; activeBonus=null; bonusIndicator.innerText='✨'; }, 6000);
            }
            if (type !== 'lightning') {
                bonusIndicator.innerText = (type === 'magnet' ? '🧲' : '🐢');
                playSound('bonus');
            }
        }

        function checkLinesAndClear() {
            let grid = buildGrid();
            let rowsToClear = [];
            for (let r=0; r<ROWS; r++) {
                let full = true;
                for (let c=0; c<COLS; c++) if (!grid[r][c]) { full=false; break; }
                if (full) rowsToClear.push(r);
            }
            if (rowsToClear.length === 0) return;
            let blocksToRemove = new Set();
            for (let r of rowsToClear) {
                for (let c=0; c<COLS; c++) blocksToRemove.add(grid[r][c]);
            }
            removeSpecificBlocks(blocksToRemove);
            let addScore = rowsToClear.length === 1 ? 100 : rowsToClear.length === 2 ? 250 : rowsToClear.length === 3 ? 500 : 800;
            score += addScore;
            updateScoreUI();
            playSound('clear');
            showToast(`+${addScore} (${rowsToClear.length} ряд.)`);
            if (Math.random() < 0.25 && !activeBonus) {
                const bonusType = ['lightning','magnet','slow'][Math.floor(Math.random()*3)];
                activateBonus(bonusType);
            }
            for (let b of lockedBodies) Body.applyForce(b, b.position, { x: 0, y: 0.05 });
            wakeAll();
        }

        function checkGameOverCondition() {
            for (let body of lockedBodies) {
                if (body.bounds.min.y < 85 && Math.abs(body.velocity.y) < 0.5) {
                    if (!isGameOver) {
                        isGameOver = true;
                        playSound('gameover');
                        document.getElementById('final-score').innerText = score;
                        document.getElementById('game-over').style.display = 'flex';
                        if (survivalInterval) clearInterval(survivalInterval);
                        addScoreToLeaderboard(score, currentMode);
                    }
                    break;
                }
            }
        }

        function updateActivePiece() {
            if (!activePiece || isGameOver || isPaused) return;
            let vx = 0;
            if (keys.left && activePiece.bounds.min.x > 5) vx = -6.2;
            if (keys.right && activePiece.bounds.max.x < GAME_W-5) vx = 6.2;
            let vy = activePiece.velocity.y;
            let maxFall = 1.4;
            if (currentMode === 'accel') maxFall = Math.min(2.2 + score/1200, 6.5);
            if (currentMode === 'survival') maxFall = Math.min(1.2 + survivalGravityMultiplier * 0.8, 5.5);
            if (keys.softDrop) vy = 9.5;
            else if (vy > maxFall) vy = maxFall;
            Body.setVelocity(activePiece, { x: vx, y: vy });
            if (rotateRequest) {
                if (lockDelayTimer) clearTimeout(lockDelayTimer);
                Body.setAngle(activePiece, activePiece.angle + Math.PI/2);
                rotateRequest = false;
                wakeAll();
            }
            if (Math.abs(activePiece.angularVelocity) < 0.2) {
                const target = Math.round(activePiece.angle / (Math.PI/2)) * (Math.PI/2);
                const diff = target - activePiece.angle;
                Body.setAngle(activePiece, activePiece.angle + diff * 0.2);
            }
            const onGround = activePiece.velocity.y < 0.15 && activePiece.velocity.y > -0.1 && activePiece.position.y > 40;
            const noMove = !keys.left && !keys.right && !keys.softDrop;
            if (onGround && activePiece.speed < 0.25 && noMove) {
                if (!lockDelayTimer) lockDelayTimer = setTimeout(() => lockPiece(), 380);
            } else if (lockDelayTimer) { clearTimeout(lockDelayTimer); lockDelayTimer = null; }
        }

        Events.on(engine, 'beforeUpdate', () => { if (isGameStarted && !isGameOver && !isPaused) updateActivePiece(); });
        Events.on(engine, 'collisionStart', () => wakeAll());

        // Сохранение / загрузка
        window.saveGame = () => {
            const blocksData = [];
            lockedBodies.forEach(body => {
                if (!body) return;
                const cubes = body.parts.length > 1 ? body.parts.slice(1) : [body];
                cubes.forEach(part => blocksData.push({ x: part.position.x, y: part.position.y, angle: part.angle, color: part.render.fillStyle }));
            });
            localStorage.setItem('flexis_save', JSON.stringify({ score, mode: currentMode, blocks: blocksData, gravity: engine.gravity.y }));
            showToast("Сохранено");
            document.getElementById('load-main-btn').style.display = 'inline-block';
        };
        window.loadGame = () => {
            const raw = localStorage.getItem('flexis_save');
            if (!raw) { showToast("Нет сохранения"); return; }
            const data = JSON.parse(raw);
            lockedBodies.forEach(b => Composite.remove(engine.world, b));
            if (activePiece) Composite.remove(engine.world, activePiece);
            lockedBodies = [];
            data.blocks.forEach(b => {
                const block = Bodies.rectangle(b.x, b.y, BLOCK, BLOCK, {
                    angle: b.angle, render: { fillStyle: b.color, strokeStyle: '#000' }, chamfer: { radius: 4 },
                    friction: 0.45, restitution: 0.1, sleepThreshold: Infinity
                });
                Composite.add(engine.world, block);
                lockedBodies.push(block);
            });
            score = data.score; updateScoreUI();
            currentMode = data.mode;
            engine.gravity.y = data.gravity || 0.65;
            gravitySlider.value = engine.gravity.y;
            gravValueSpan.innerText = engine.gravity.y.toFixed(2);
            isGameStarted = true; isGameOver = false; isPaused = false;
            engine.timing.timeScale = 1;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('pause-screen').style.display = 'none';
            wakeAll();
            const np = getRandomPiece();
            nextShape = np.shape; nextColor = np.color; drawNext();
            spawnPiece();
            if (currentMode === 'survival') startSurvivalMode();
            showToast("Загружено");
        };

        function startSurvivalMode() {
            if (survivalInterval) clearInterval(survivalInterval);
            survivalGravityMultiplier = 1.0;
            survivalInterval = setInterval(() => {
                if (!isGameOver && !isPaused && isGameStarted && currentMode === 'survival') {
                    survivalGravityMultiplier = Math.min(1.5, survivalGravityMultiplier + 0.02);
                    if (!activeBonus || activeBonus.type !== 'magnet') engine.gravity.y = parseFloat(gravitySlider.value) * survivalGravityMultiplier;
                    document.getElementById('survival-info') && (document.getElementById('survival-info').innerText = `🌪️ гравитация: ${engine.gravity.y.toFixed(2)}`);
                }
            }, 10000);
        }

        window.togglePause = () => {
            if (!isGameStarted || isGameOver) return;
            isPaused = !isPaused;
            engine.timing.timeScale = isPaused ? 0 : (activeBonus && activeBonus.type === 'slow' ? 0.5 : 1);
            document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none';
            if (lockDelayTimer && isPaused) clearTimeout(lockDelayTimer);
        };

        window.startGame = (mode) => {
            playSound('start');
            if (survivalInterval) clearInterval(survivalInterval);
            currentMode = mode;
            score = 0; updateScoreUI();
            lockedBodies.forEach(b => Composite.remove(engine.world, b));
            if (activePiece) Composite.remove(engine.world, activePiece);
            lockedBodies = [];
            isGameStarted = true; isGameOver = false; isPaused = false;
            let baseGrav = parseFloat(gravitySlider.value);
            engine.gravity.y = baseGrav;
            engine.timing.timeScale = 1;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('pause-screen').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            // Инициализируем следующую фигуру
            const np = getRandomPiece();
            nextShape = np.shape;
            nextColor = np.color;
            drawNext();
            // Спавним первую фигуру
            spawnPiece();
            if (mode === 'survival') {
                survivalGravityMultiplier = 1.0;
                const infoDiv = document.getElementById('survival-info');
                if (infoDiv) infoDiv.innerText = `🌪️ гравитация: ${engine.gravity.y.toFixed(2)}`;
                startSurvivalMode();
            } else {
                const infoDiv = document.getElementById('survival-info');
                if (infoDiv) infoDiv.innerText = '';
                if (survivalInterval) clearInterval(survivalInterval);
            }
            if (activeBonus) { if (bonusTimer) clearTimeout(bonusTimer); activeBonus = null; bonusIndicator.innerText = '✨'; }
        };
        window.restartGame = () => location.reload();

        // Управление
        function setupControls() {
            const setKey = (k, state) => { if (k === 'rotate') rotateRequest = state; else keys[k] = state; };
            const btnL = document.getElementById('btn-left');
            const btnR = document.getElementById('btn-right');
            const btnD = document.getElementById('btn-down');
            const btnRot = document.getElementById('btn-rotate');
            const addEvent = (el, ev, handler) => { el.addEventListener(ev, handler, { passive: false }); };
            const startHandler = (key) => (e) => { e.preventDefault(); setKey(key, true); };
            const endHandler = (key) => (e) => { e.preventDefault(); setKey(key, false); };
            addEvent(btnL, 'mousedown', startHandler('left')); addEvent(btnL, 'mouseup', endHandler('left')); addEvent(btnL, 'mouseleave', endHandler('left'));
            addEvent(btnL, 'touchstart', startHandler('left')); addEvent(btnL, 'touchend', endHandler('left'));
            addEvent(btnR, 'mousedown', startHandler('right')); addEvent(btnR, 'mouseup', endHandler('right')); addEvent(btnR, 'mouseleave', endHandler('right'));
            addEvent(btnR, 'touchstart', startHandler('right')); addEvent(btnR, 'touchend', endHandler('right'));
            addEvent(btnD, 'mousedown', startHandler('softDrop')); addEvent(btnD, 'mouseup', endHandler('softDrop')); addEvent(btnD, 'mouseleave', endHandler('softDrop'));
            addEvent(btnD, 'touchstart', startHandler('softDrop')); addEvent(btnD, 'touchend', endHandler('softDrop'));
            btnRot.addEventListener('click', (e) => { e.preventDefault(); if (activePiece && !isGameOver && !isPaused) { if(lockDelayTimer) clearTimeout(lockDelayTimer); rotateRequest = true; } });
            btnRot.addEventListener('touchstart', (e) => { e.preventDefault(); if (activePiece && !isGameOver && !isPaused) { if(lockDelayTimer) clearTimeout(lockDelayTimer); rotateRequest = true; } });
            window.addEventListener('keydown', (e) => {
                if (e.code === 'ArrowLeft') { e.preventDefault(); keys.left = true; }
                if (e.code === 'ArrowRight') { e.preventDefault(); keys.right = true; }
                if (e.code === 'ArrowDown') { e.preventDefault(); keys.softDrop = true; }
                if (e.code === 'ArrowUp') { e.preventDefault(); if (activePiece && !isGameOver && !isPaused) rotateRequest = true; }
            });
            window.addEventListener('keyup', (e) => {
                if (e.code === 'ArrowLeft') keys.left = false;
                if (e.code === 'ArrowRight') keys.right = false;
                if (e.code === 'ArrowDown') keys.softDrop = false;
            });
            // Вращение мышью
            const canvasWrapper = document.getElementById('canvas-wrapper');
            canvasWrapper.addEventListener('wheel', (e) => {
                if (!isGameStarted || isGameOver || isPaused || !activePiece) return;
                e.preventDefault();
                if (lockDelayTimer) clearTimeout(lockDelayTimer);
                Body.setAngle(activePiece, activePiece.angle + Math.PI/2);
                wakeAll();
            }, { passive: false });
        }

        // Запуск
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);
        setupControls();
        loadLeaderboard();
        if (localStorage.getItem('flexis_save')) document.getElementById('load-main-btn').style.display = 'inline-block';
        recordPanel.innerText = bestScore;
        updateScoreUI();
        gravitySlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            gravValueSpan.innerText = val;
            if (!isGameStarted || isPaused || isGameOver) engine.gravity.y = val;
        });
        // Добавим элемент для отображения инфы выживания (если его нет в info-bar)
        if (!document.getElementById('survival-info')) {
            const span = document.createElement('div');
            span.id = 'survival-info';
            span.style.fontSize = '10px';
            span.style.color = '#ff9800';
            span.style.marginTop = '4px';
            document.querySelector('.info-bar').appendChild(span);
        }
    })();
</script>
</body>
