<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Флексис Тетрис</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-wrapper {
            position: relative;
            margin-top: 10px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            overflow: hidden;
            background-color: #050505;
        }

        #home-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 8px 12px;
            font-size: 14px;
            background: #1a1a1a;
            color: white;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            z-index: 105; /* Поверх стартового экрана */
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #home-btn:active { background: #4CAF50; transform: translateY(2px); border-color: #4CAF50; }

        #score-board {
            position: absolute;
            top: 15px;
            right: 15px; /* Перенесли вправо, чтобы освободить место для кнопки меню */
            font-size: 32px;
            font-weight: 900;
            color: #4CAF50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.4);
            z-index: 10;
        }

        #game-over, #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        #game-over { display: none; }

        h1 { font-size: 42px; margin-bottom: 5px; letter-spacing: 2px; }
        .green { color: #4CAF50; }
        .red { color: #ff4444; }

        .btn {
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(135deg, #4CAF50, #2e7d32);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
        }

        .btn:active { transform: scale(0.95); }

        #mobile-controls {
            display: flex;
            width: 100%;
            max-width: 400px;
            justify-content: space-between;
            padding: 15px 20px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .control-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        #mobile-controls button {
            background-color: #1a1a1a;
            border: 2px solid #333;
            color: white;
            font-size: 28px;
            width: 70px;
            height: 70px;
            border-radius: 16px; 
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            box-shadow: 0 5px 0 #000;
            padding: 0;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        #mobile-controls button:active { 
            background-color: #4CAF50; 
            transform: translateY(5px);
            box-shadow: 0 0px 0 #000;
        }

        @media (max-height: 850px) {
            #game-wrapper { transform: scale(0.85); transform-origin: top; margin-bottom: -90px; }
        }
        @media (max-height: 700px) {
            #game-wrapper { transform: scale(0.75); transform-origin: top; margin-bottom: -150px; }
            #mobile-controls button { width: 60px; height: 60px; font-size: 24px; }
        }
        @media (max-height: 600px) {
            #game-wrapper { transform: scale(0.65); transform-origin: top; margin-bottom: -210px; }
            #mobile-controls button { width: 50px; height: 50px; font-size: 20px; border-radius: 12px; }
            #mobile-controls { padding: 5px 10px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="game-wrapper">
        <a href="index.html" id="home-btn">🏠 В меню</a>
        <div id="score-board"><span id="score">0</span></div>
        
        <div id="start-screen">
            <h1 class="green">FLEXIS</h1>
            <p style="color: #666; margin-bottom: 25px;">Тетрис с физикой</p>
            <button class="btn" style="margin-bottom: 15px;" onclick="startGame()">ИГРАТЬ</button>
            <button id="mute-btn" class="btn" onclick="toggleMute()" style="background: #1a1a1a; border: 2px solid #333; font-size: 16px; padding: 10px 30px;">🔊 Звук: ВКЛ</button>
        </div>

        <div id="game-over">
            <h1 class="red">КОНЕЦ ИГРЫ</h1>
            <p>Ваш счет: <span id="final-score">0</span></p>
            <button class="btn" style="background: #ff4444;" onclick="restartGame()">ЗАНОВО</button>
        </div>
        
        <div id="canvas-container"></div>
    </div>

    <div id="mobile-controls">
        <div class="control-group">
            <button id="btn-left">⬅️</button>
            <button id="btn-right">➡️</button>
        </div>
        <div class="control-group">
            <button id="btn-down">⬇️</button>
            <button id="btn-rotate">🔃</button>
        </div>
    </div>

    <script>
        // --- ЗВУКОВОЙ ДВИЖОК ---
        let audioCtx = null;
        let isMuted = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-btn').innerText = isMuted ? '🔇 Звук: ВЫКЛ' : '🔊 Звук: ВКЛ';
        }

        function playSound(type) {
            if (isMuted) return;
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'start') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554, now + 0.1);
                osc.frequency.setValueAtTime(659, now + 0.2);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'lock') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'clear') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.setValueAtTime(1760, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.8);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                osc.start(now);
                osc.stop(now + 0.8);
            }
        }

        const { Engine, Render, Runner, Bodies, Body, Composite, Events, Vector, Sleeping } = Matter;

        const GAME_WIDTH = 360;
        const GAME_HEIGHT = 600;
        const BLOCK_SIZE = 30;

        const engine = Engine.create({ enableSleeping: true });

        engine.world.gravity.y = 0.5;
        engine.positionIterations = 15;
        engine.velocityIterations = 15;

        const render = Render.create({
            element: document.getElementById('canvas-container'),
            engine: engine,
            options: {
                width: GAME_WIDTH,
                height: GAME_HEIGHT,
                wireframes: false,
                background: '#050505'
            }
        });

        // Убираем визуальное потускнение (моргание цвета) при засыпании блоков
        Events.on(render, 'beforeRender', () => {
            Composite.allBodies(engine.world).forEach(b => {
                b.render._wasSleeping = b.isSleeping;
                b.isSleeping = false; // Временно скрываем статус сна от рендерера
            });
        });
        
        Events.on(render, 'afterRender', () => {
            Composite.allBodies(engine.world).forEach(b => {
                if (b.render._wasSleeping !== undefined) {
                    b.isSleeping = b.render._wasSleeping; // Возвращаем реальный статус физике
                }
            });
        });

        const wallOptions = { 
            isStatic: true, 
            friction: 0.0, 
            frictionStatic: 0.0,
            restitution: 0.0, 
            render: { fillStyle: '#111' } 
        };
        const ground = Bodies.rectangle(GAME_WIDTH / 2, GAME_HEIGHT + 25, GAME_WIDTH + 100, 50, wallOptions);
        const leftWall = Bodies.rectangle(-25, GAME_HEIGHT / 2, 50, GAME_HEIGHT * 2, wallOptions);
        const rightWall = Bodies.rectangle(GAME_WIDTH + 25, GAME_HEIGHT / 2, 50, GAME_HEIGHT * 2, wallOptions);
        Composite.add(engine.world, [ground, leftWall, rightWall]);

        const shapes = [
            [{x:0, y:0}, {x:30, y:0}, {x:60, y:0}, {x:90, y:0}], // I
            [{x:0, y:0}, {x:30, y:0}, {x:0, y:30}, {x:30, y:30}], // O
            [{x:30, y:0}, {x:0, y:30}, {x:30, y:30}, {x:60, y:30}], // T
            [{x:0, y:0}, {x:0, y:30}, {x:30, y:30}, {x:60, y:30}], // J
            [{x:60, y:0}, {x:0, y:30}, {x:30, y:30}, {x:60, y:30}], // L
            [{x:30, y:0}, {x:60, y:0}, {x:0, y:30}, {x:30, y:30}], // S
            [{x:0, y:0}, {x:30, y:0}, {x:30, y:30}, {x:60, y:30}]  // Z
        ];
        
        const colors = ['#00f0f0', '#f0f000', '#a000f0', '#0000f0', '#f0a000', '#00f000', '#f00000'];

        let activePiece = null;
        let lockedBodies = [];
        let score = 0;
        let isGameOver = false;
        let isGameStarted = false;
        
        const keys = { ArrowLeft: false, ArrowRight: false, ArrowDown: false };
        let isRotatePressed = false;
        
        let lockTimer = null; 
        const LOCK_DELAY = 1000; // 1 секунда на маневры после остановки
        
        function spawnPiece() {
            if (isGameOver) return;
            const type = Math.floor(Math.random() * shapes.length);
            const shape = shapes[type];
            const color = colors[type];

            const parts = shape.map(p => Bodies.rectangle(p.x, p.y, BLOCK_SIZE, BLOCK_SIZE, {
                render: { fillStyle: color, strokeStyle: '#000', lineWidth: 1 },
                chamfer: { radius: 5 },
                friction: 0.0, 
                frictionStatic: 0.0,
                restitution: 0.1,
                sleepThreshold: 480 // Физика засыпает через ~8 секунд покоя
            }));

            activePiece = Body.create({
                parts: parts,
                frictionAir: 0.05,
                density: 0.001,
                restitution: 0.1,
                friction: 0.0,
                frictionStatic: 0.0
            });
            
            Body.setPosition(activePiece, { x: Math.round(GAME_WIDTH / 2 / BLOCK_SIZE) * BLOCK_SIZE, y: -50 });
            Composite.add(engine.world, activePiece);
            wakeAll();
        }

        function wakeAll() {
            const allBodies = Composite.allBodies(engine.world);
            allBodies.forEach(body => {
                if (!body.isStatic) Sleeping.set(body, false);
            });
        }

        function lockPiece() {
            if (!activePiece) return;
            
            const piece = activePiece;
            activePiece = null;
            if (lockTimer) {
                clearTimeout(lockTimer);
                lockTimer = null;
            }

            // Мягкое финальное выравнивание для башни
            const targetAngle = Math.round(piece.angle / (Math.PI / 2)) * (Math.PI / 2);
            Body.setAngle(piece, targetAngle);
            Body.setAngularVelocity(piece, 0);

            Body.setDensity(piece, 0.01);
            piece.friction = 0.4; 
            piece.frictionStatic = 0.5;
            piece.parts.forEach(p => {
                p.friction = 0.4;
                p.frictionStatic = 0.5;
            });

            lockedBodies.push(piece);
            playSound('lock'); // Звук фиксации
            checkGameOver();
            setTimeout(() => { if (!isGameOver) spawnPiece(); }, 150);
        }

        function shatterPiece(body, partsToRemove) {
            if (!body || !body.parts) return [];
            const color = body.parts[1] ? body.parts[1].render.fillStyle : '#fff';
            const survivingParts = body.parts.slice(1).filter(p => !partsToRemove.has(p));
            
            Composite.remove(engine.world, body);
            
            const newBlocks = survivingParts.map(p => {
                const block = Bodies.rectangle(p.position.x, p.position.y, BLOCK_SIZE, BLOCK_SIZE, {
                    angle: p.angle,
                    render: { fillStyle: color, strokeStyle: '#000', lineWidth: 1 },
                    chamfer: { radius: 5 },
                    friction: 0.4,
                    frictionStatic: 0.5,
                    density: 0.01,
                    restitution: 0.1,
                    sleepThreshold: 480 
                });
                Composite.add(engine.world, block);
                return block;
            });
            
            wakeAll(); 
            return newBlocks;
        }

        function checkLines() {
            let linesToRemoveY = [];
            for (let y = GAME_HEIGHT - 15; y > 50; y -= 20) {
                let partsInLine = [];
                let cols = new Set();
                lockedBodies.forEach(body => {
                    if (!body || !body.parts) return;
                    const cubes = body.parts.length > 1 ? body.parts.slice(1) : [body];
                    cubes.forEach(part => {
                        if (Math.abs(part.position.y - y) < 15) {
                            let col = Math.round((part.position.x - 15) / BLOCK_SIZE);
                            if (col >= 0 && col < 12) {
                                cols.add(col);
                                partsInLine.push({ body, part });
                            }
                        }
                    });
                });
                if (cols.size >= 12) linesToRemoveY.push({ y, parts: partsInLine });
            }

            if (linesToRemoveY.length > 0) {
                let partsToRemove = new Set();
                let affectedBodies = new Set();
                linesToRemoveY.forEach(line => line.parts.forEach(p => {
                    partsToRemove.add(p.part);
                    affectedBodies.add(p.body);
                }));

                let nextLockedBodies = [];
                lockedBodies.forEach(body => {
                    if (affectedBodies.has(body)) {
                        const fragments = shatterPiece(body, partsToRemove);
                        nextLockedBodies.push(...fragments);
                    } else if (body) {
                        nextLockedBodies.push(body);
                    }
                });
                lockedBodies = nextLockedBodies;
                score += partsToRemove.size * 10;
                document.getElementById('score').innerText = score;
                playSound('clear'); // Звук удаления линии
            }
        }

        function checkGameOver() {
            lockedBodies.forEach(body => {
                if (!body) return;
                const highestPoint = body.bounds.min.y;
                if (highestPoint < 80 && Math.abs(body.velocity.y) < 0.1) {
                    if (!isGameOver) { // Чтобы звук играл только один раз
                        isGameOver = true;
                        playSound('gameover'); // Звук проигрыша
                        document.getElementById('final-score').innerText = score;
                        document.getElementById('game-over').style.display = 'flex';
                    }
                }
            });
        }

        Events.on(engine, 'beforeUpdate', () => {
            if (!isGameStarted || isGameOver) return;
            if (engine.timing.timestamp % 500 < 20) checkLines();

            if (activePiece) {
                let vx = 0;
                
                // Скольжение вдоль стен без зацепов
                if (keys.ArrowLeft && activePiece.bounds.min.x > 2) vx = -5;
                if (keys.ArrowRight && activePiece.bounds.max.x < GAME_WIDTH - 2) vx = 5;

                let vy = activePiece.velocity.y;
                if (keys.ArrowDown) {
                    vy = 8; 
                } else {
                    if (vy > 1.1) vy = 1.1; // Ограничение падения до 1.1
                }
                
                Body.setVelocity(activePiece, { x: vx, y: vy });

                // Мягкое выравнивание угла (стабильная классика)
                const targetAngle = Math.round(activePiece.angle / (Math.PI / 2)) * (Math.PI / 2);
                const angleDiff = targetAngle - activePiece.angle;
                Body.setAngle(activePiece, activePiece.angle + angleDiff * 0.15);
                Body.setAngularVelocity(activePiece, activePiece.angularVelocity * 0.8);

                // ПРОСТАЯ И НАДЕЖНАЯ ЛОГИКА ФИКСАЦИИ
                // Если деталь на дне и почти не двигается, а игрок не давит вбок
                if (activePiece.position.y > 50 && activePiece.speed < 0.2 && vx === 0) {
                    if (!lockTimer) {
                        lockTimer = setTimeout(lockPiece, keys.ArrowDown ? 100 : LOCK_DELAY);
                    }
                } else {
                    // Если деталь начала соскальзывать или игрок её двигает — отменяем таймер
                    if (lockTimer && (activePiece.velocity.y > 0.5 || vx !== 0)) {
                        clearTimeout(lockTimer);
                        lockTimer = null;
                    }
                }
            }
        });

        // Будим физику при любых соприкосновениях
        Events.on(engine, 'collisionStart', () => wakeAll());

        window.startGame = () => {
            initAudio(); // Включаем аудио при первом клике пользователя
            playSound('start'); // Звук старта
            document.getElementById('start-screen').style.display = 'none';
            isGameStarted = true;
            spawnPiece();
        };

        window.restartGame = () => { location.reload(); };

        const setupControl = (id, key) => {
            const btn = document.getElementById(id);
            const start = (e) => { 
                e.preventDefault(); 
                if (!isGameStarted || isGameOver || !activePiece) return;
                if (key === 'rotate') {
                    if (!isRotatePressed) {
                        if (lockTimer) { clearTimeout(lockTimer); lockTimer = null; }
                        Body.setAngle(activePiece, activePiece.angle + Math.PI/2);
                        isRotatePressed = true;
                        wakeAll();
                    }
                } else keys[key] = true;
            };
            const stop = () => { 
                if (key === 'rotate') isRotatePressed = false;
                else keys[key] = false;
            };
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', stop);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', stop);
            btn.addEventListener('mouseleave', stop);
        };

        setupControl('btn-left', 'ArrowLeft');
        setupControl('btn-right', 'ArrowRight');
        setupControl('btn-down', 'ArrowDown');
        setupControl('btn-rotate', 'rotate');

        document.addEventListener('keydown', (e) => {
            if (!activePiece || isGameOver) return;
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
            if (e.code === 'ArrowUp') {
                if (!isRotatePressed) {
                    if (lockTimer) { clearTimeout(lockTimer); lockTimer = null; }
                    Body.setAngle(activePiece, activePiece.angle + Math.PI/2);
                    isRotatePressed = true;
                    wakeAll();
                }
            }
        });
        document.addEventListener('keyup', (e) => { 
            if (e.code === 'ArrowUp') isRotatePressed = false;
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
