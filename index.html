<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игровое Меню</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        .menu-container {
            background-color: rgba(20, 20, 20, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            text-align: center;
            border: 1px solid #333;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            margin-top: 0;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #4CAF50, #81C784);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 15px rgba(76, 175, 80, 0.3);
        }

        p.subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .btn-game {
            display: block;
            width: 100%;
            padding: 20px;
            margin-bottom: 20px;
            font-size: 22px;
            text-decoration: none;
            color: white;
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Цвета для кнопок при наведении */
        .btn-game.flexis { border-color: #4CAF50; }
        .btn-game.BOUNCE { border-color: #2196F3; }
        .btn-game.TANKS { border-color: #FF9800; } /* Цвет новой кнопки */

        .btn-game:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-game.flexis:hover { background: #4CAF50; color: #000; }
        .btn-game.BOUNCE:hover { background: #2196F3; color: #000; }
        .btn-game.TANKS:hover { background: #FF9800; color: #000; } /* Эффект наведения новой кнопки */

        .btn-game:active {
            transform: translateY(2px);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>АРКАДА</h1>
        <p class="subtitle">Выберите игру для запуска</p>

        <!-- Ссылка на ваш тетрис -->
        <a href="FLEXIS.html" class="btn-game flexis">
            🟢 FLEXIS TETRIS
        </a>

        <!-- Ссылка на вашу вторую игру -->
        <a href="BOUNCE.html" class="btn-game BOUNCE">
            🔵 BOUNCE
        </a>

        <!-- Ссылка на новую (третью) игру -->
        <a href="TANKS.html" class="btn-game TANKS">
            🟠 TANKS
        </a>
    </div>

</body>
</html>
