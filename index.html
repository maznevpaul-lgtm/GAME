<!DOCTYPE html>
<html>
<head>
    <title>Игры</title>
    <style>
        body { text-align: center; background: #222; color: white; font-family: sans-serif; }
        iframe { width: 800px; height: 600px; border: 5px solid #444; display: none; }
        .menu { margin-top: 50px; }
        button { padding: 15px 30px; font-size: 1.2em; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

    <div id="main-menu" class="menu">
        <h1>__________________</h1>
        <button onclick="startGame('Bounce.html')">Шарик</button>
        <button onclick="startGame('Tetris.html')">Тетрис</button>
    </div>

    <div id="game-container" style="display:none;">
        <button onclick="backToMenu()">⬅ В меню</button><br><br>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function startGame(url) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            const frame = document.getElementById('game-frame');
            frame.src = url;
            frame.style.display = 'inline-block';
        }

        function backToMenu() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
