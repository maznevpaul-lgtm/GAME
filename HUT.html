        // --- БАЗА ДАННЫХ КАРТ ---
        const CARD_TYPES = {
          SQUIRREL: { typeId: 'SQUIRREL', cost: 0, power: 0, health: 1, type: 'resource', icon: '🐿️' },
          STOAT: { typeId: 'STOAT', cost: 1, power: 1, health: 2, type: 'beast', icon: '🦦' },
          FROG: { typeId: 'FROG', cost: 1, power: 1, health: 2, type: 'beast', icon: '🐸' },
          WOLF: { typeId: 'WOLF', cost: 2, power: 3, health: 2, type: 'beast', icon: '🐺' },
          RAVEN: { typeId: 'RAVEN', cost: 1, power: 2, health: 1, type: 'beast', icon: '🐦‍⬛', airborne: true },
          BEAR: { typeId: 'BEAR', cost: 3, power: 4, health: 6, type: 'beast', icon: '🐻' },
          ADDER: { typeId: 'ADDER', cost: 2, power: 1, health: 1, type: 'beast', icon: '🐍', touchOfDeath: true },
          GOAT: { typeId: 'GOAT', cost: 1, power: 0, health: 1, type: 'beast', icon: '🐐', bloodValue: 3 },
          CAT: { typeId: 'CAT', cost: 1, power: 1, health: 1, type: 'beast', icon: '🐈', manyLives: true },
          URAYULI: { typeId: 'URAYULI', cost: 4, power: 7, health: 7, type: 'beast', icon: '👹' },
          TURTLE: { typeId: 'TURTLE', cost: 1, power: 0, health: 4, type: 'beast', icon: '🐢', mightyLeap: true },
          PORCUPINE: { typeId: 'PORCUPINE', cost: 1, power: 1, health: 2, type: 'beast', icon: '🦔', sharpQuills: true }
        };

        const ITEMS_DB = [
          { id: 'pliers', icon: '🦷' },
          { id: 'bottle', icon: '🍾' },
          { id: 'scissors', icon: '✂️' }
        ];

        const createCard = (type) => ({ ...type, id: Math.random().toString(36).substr(2, 9) });

        const shuffleArray = (array) => {
          const newArray = [...array];
          for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
          }
          return newArray;
        };

        const generateDeck = () => {
          const deck = [
            createCard(CARD_TYPES.STOAT), createCard(CARD_TYPES.STOAT),
            createCard(CARD_TYPES.FROG), createCard(CARD_TYPES.TURTLE),
            createCard(CARD_TYPES.RAVEN), createCard(CARD_TYPES.WOLF),
            createCard(CARD_TYPES.WOLF), createCard(CARD_TYPES.ADDER),
            createCard(CARD_TYPES.BEAR), createCard(CARD_TYPES.GOAT),
            createCard(CARD_TYPES.CAT), createCard(CARD_TYPES.URAYULI),
            createCard(CARD_TYPES.PORCUPINE)
          ];
          return shuffleArray(deck);
        };

        const generateRandomQueue = () => {
          const q = [null, null, null, null];
          let hasEnemy = false;
          const enemyTypes = [CARD_TYPES.STOAT, CARD_TYPES.FROG, CARD_TYPES.RAVEN, CARD_TYPES.WOLF, CARD_TYPES.ADDER, CARD_TYPES.TURTLE, CARD_TYPES.PORCUPINE];
          for(let i=0; i<4; i++) {
            if(Math.random() > 0.6) {
              q[i] = createCard(enemyTypes[Math.floor(Math.random() * enemyTypes.length)]);
              hasEnemy = true;
            }
          }
          if(!hasEnemy) q[Math.floor(Math.random() * 4)] = createCard(CARD_TYPES.WOLF);
          return q;
        };

        // Генерация до 3 случайных предметов
        const generateRandomItems = (max = 3) => {
          const count = Math.floor(Math.random() * (max + 1));
          const newItems = [];
          for (let i = 0; i < count; i++) {
            newItems.push(ITEMS_DB[Math.floor(Math.random() * ITEMS_DB.length)]);
          }
          return newItems;
        };

        // Вспомогательная функция для миграции старых сохранений
        const getTypeId = (card) => {
           if (!card) return null;
           if (card.typeId) return card.typeId;
           const entry = Object.entries(CARD_TYPES).find(([k, v]) => v.icon === card.icon);
           return entry ? entry[0] : null;
        };

        // --- ЗВУКОВАЯ СИСТЕМА ---
        let audioCtx = null;
        const playSound = (type, isEnabled) => {
          if (!isEnabled) return;
          try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 800;

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            gain.gain.setValueAtTime(0, now); 
            
            if (type === 'card_light') {
              osc.type = 'sine';
              osc.frequency.setValueAtTime(600, now);
              osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
              gain.gain.linearRampToValueAtTime(0.08, now + 0.01);
              gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
              osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'card_heavy') {
              osc.type = 'triangle';
              osc.frequency.setValueAtTime(250, now);
              osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
              gain.gain.linearRampToValueAtTime(0.12, now + 0.01);
              gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
              osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'card') {
              osc.type = 'sine';
              osc.frequency.setValueAtTime(400, now);
              osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
              gain.gain.linearRampToValueAtTime(0.1, now + 0.01);
              gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
              osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'bell') {
              osc.type = 'sine';
              osc.frequency.setValueAtTime(250, now);
              osc.frequency.exponentialRampToValueAtTime(30, now + 2.5);
              gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
              gain.gain.exponentialRampToValueAtTime(0.01, now + 2.5);
              osc.start(now); osc.stop(now + 2.5);
            } else if (type === 'hit') {
              osc.type = 'square';
              osc.frequency.setValueAtTime(150, now);
              osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
              gain.gain.linearRampToValueAtTime(0.15, now + 0.02);
              gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
              osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'sacrifice') {
              osc.type = 'sawtooth';
              osc.frequency.setValueAtTime(200, now);
              osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
              gain.gain.linearRampToValueAtTime(0.15, now + 0.03);
              gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
              osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'die') {
              osc.type = 'square';
              osc.frequency.setValueAtTime(100, now);
              osc.frequency.exponentialRampToValueAtTime(20, now + 0.5);
              gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
              gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
              osc.start(now); osc.stop(now + 0.5);
            }
          } catch(e) { console.error('Audio error:', e); }
        };

        function App() {
          const [initialData] = useState(() => {
            try {
              const saved = localStorage.getItem('inscryption_save');
              if (saved) {
                const parsed = JSON.parse(saved);
                if (parsed.playerLives === undefined) parsed.playerLives = 3;
                if (parsed.enemyLives === undefined) parsed.enemyLives = 3;
                if (parsed.enemyItems === undefined) parsed.enemyItems = generateRandomItems(3);
                if (parsed.isSoundEnabled === undefined) parsed.isSoundEnabled = true;
                return parsed;
              }
            } catch (e) { console.error('Ошибка загрузки сохранения:', e); }

            const d = generateDeck();
            return {
              phase: 'draw',
              message: null, // Инициализируем null, чтобы подхватить перевод позже
              scale: 0,
              playerLives: 3,
              enemyLives: 3,
              items: generateRandomItems(3),
              enemyItems: generateRandomItems(3),
              isSoundEnabled: true,
              deck: d,
              playerHand: [createCard(CARD_TYPES.SQUIRREL), d.pop(), d.pop(), d.pop()],
              playerBoard: [null, null, null, null],
              opponentBoard: [null, null, null, null],
              opponentQueue: generateRandomQueue()
            };
          });

          // Состояние языка
          const [lang, setLang] = useState(() => localStorage.getItem('inscryption_lang') || 'ru');
          const t = DICT[lang]; // Текущий словарь

          const [phase, setPhase] = useState(initialData.phase);
          const [message, setMessage] = useState(initialData.message || DICT[lang].msgDraw);
          const [scale, setScale] = useState(initialData.scale);
          const [playerLives, setPlayerLives] = useState(initialData.playerLives);
          const [enemyLives, setEnemyLives] = useState(initialData.enemyLives);
          
          const [items, setItems] = useState(initialData.items);
          const [enemyItems, setEnemyItems] = useState(initialData.enemyItems);
          const [activeItem, setActiveItem] = useState(null);

          const [deck, setDeck] = useState(initialData.deck);
          const [playerHand, setPlayerHand] = useState(initialData.playerHand);
          
          const [playerBoard, setPlayerBoard] = useState(initialData.playerBoard);
          const [opponentBoard, setOpponentBoard] = useState(initialData.opponentBoard);
          const [opponentQueue, setOpponentQueue] = useState(initialData.opponentQueue);

          const [isSoundEnabled, setIsSoundEnabled] = useState(initialData.isSoundEnabled);
          const [showRules, setShowRules] = useState(false);
          const [showMenu, setShowMenu] = useState(false);

          // Новые состояния для событий
          const [cardChoices, setCardChoices] = useState(null);
          const [punishment, setPunishment] = useState(null);

          const [selectedHandCard, setSelectedHandCard] = useState(null);
          const [sacrifices, setSacrifices] = useState([]); 
          const [attackingSlot, setAttackingSlot] = useState(null); 
          const [shakeScale, setShakeScale] = useState(false);
          const [isBellRinging, setIsBellRinging] = useState(false);
          
          const [eyeReaction, setEyeReaction] = useState(false);
          const reactionTimeout = useRef(null);
          
          const eyesContainerRef = useRef(null);
          const leftPupilRef = useRef(null);
          const rightPupilRef = useRef(null);

          const toggleLang = () => {
             const newLang = lang === 'ru' ? 'en' : 'ru';
             setLang(newLang);
             localStorage.setItem('inscryption_lang', newLang);
             // Сброс базового сообщения при смене языка
             if (message === DICT[lang].msgDraw) setMessage(DICT[newLang].msgDraw);
          };

          const triggerEyeReaction = () => {
            setEyeReaction(true);
            if(reactionTimeout.current) clearTimeout(reactionTimeout.current);
            reactionTimeout.current = setTimeout(() => setEyeReaction(false), 400);
          };

          useEffect(() => {
            const handlePointerMove = (e) => {
              if (!eyesContainerRef.current || !leftPupilRef.current || !rightPupilRef.current) return;

              let clientX, clientY;
              if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
              } else if (e.clientX !== undefined) {
                clientX = e.clientX;
                clientY = e.clientY;
              } else return;

              const rect = eyesContainerRef.current.getBoundingClientRect();
              const eyeCenterX = rect.left + rect.width / 2;
              const eyeCenterY = rect.top + rect.height / 2;

              const dx = clientX - eyeCenterX;
              const dy = clientY - eyeCenterY;
              const angle = Math.atan2(dy, dx);
              const distance = Math.min(Math.hypot(dx, dy) / 300, 1); 

              const isMobile = window.innerWidth < 640;
              const maxX = isMobile ? 10 : 15;
              const maxY = isMobile ? 4 : 7;

              const px = Math.cos(angle) * distance * maxX;
              const py = Math.sin(angle) * distance * maxY;

              leftPupilRef.current.style.setProperty('--px', `${px}px`);
              leftPupilRef.current.style.setProperty('--py', `${py}px`);
              rightPupilRef.current.style.setProperty('--px', `${px}px`);
              rightPupilRef.current.style.setProperty('--py', `${py}px`);
            };

            window.addEventListener('mousemove', handlePointerMove);
            window.addEventListener('touchmove', handlePointerMove, { passive: true });
            window.addEventListener('touchstart', handlePointerMove, { passive: true });

            return () => {
              window.removeEventListener('mousemove', handlePointerMove);
              window.removeEventListener('touchmove', handlePointerMove);
              window.removeEventListener('touchstart', handlePointerMove);
            };
          }, []);

          const handleManualSave = () => {
            const stateToSave = {
              phase, message, scale, items, deck, playerHand, playerBoard, opponentBoard, opponentQueue,
              playerLives, enemyLives, enemyItems, isSoundEnabled
            };
            localStorage.setItem('inscryption_save', JSON.stringify(stateToSave));
            setMessage(t.msgSaved);
            setShowMenu(false);
            triggerEyeReaction();
            setTimeout(() => {
              setMessage(prev => prev === t.msgSaved ? t.msgContinue : prev);
            }, 2000);
          };

          const handleLoad = () => {
            try {
              const saved = localStorage.getItem('inscryption_save');
              if (saved) {
                const parsed = JSON.parse(saved);
                setPhase(parsed.phase || 'draw');
                setMessage(t.msgLoaded);
                setScale(parsed.scale || 0);
                setPlayerLives(parsed.playerLives !== undefined ? parsed.playerLives : 3);
                setEnemyLives(parsed.enemyLives !== undefined ? parsed.enemyLives : 3);
                setItems(parsed.items || []);
                setEnemyItems(parsed.enemyItems || []);
                setDeck(parsed.deck || []);
                setPlayerHand(parsed.playerHand || []);
                setPlayerBoard(parsed.playerBoard || [null, null, null, null]);
                setOpponentBoard(parsed.opponentBoard || [null, null, null, null]);
                setOpponentQueue(parsed.opponentQueue || [null, null, null, null]);
                setIsSoundEnabled(parsed.isSoundEnabled !== undefined ? parsed.isSoundEnabled : true);
                setActiveItem(null);
                setSelectedHandCard(null);
                setSacrifices([]);
                setShowMenu(false);
                triggerEyeReaction();
              } else {
                setMessage(t.msgNoSave);
                setShowMenu(false);
              }
            } catch (e) {
              console.error('Ошибка загрузки:', e);
              setMessage(t.msgLoadError);
              setShowMenu(false);
            }
          };

          const handleItemClick = (index) => {
            if (phase !== 'play') return;
            const item = items[index];
            playSound('card', isSoundEnabled);
            triggerEyeReaction();
            
            if (item.id === 'pliers') {
              setScale(s => s + 1);
              setMessage(t.msgPliers);
              playSound('hit', isSoundEnabled);
              setItems(items.filter((_, i) => i !== index));
            } else if (item.id === 'bottle') {
              setPlayerHand([...playerHand, createCard(CARD_TYPES.SQUIRREL)]);
              setMessage(t.msgBottle);
              setItems(items.filter((_, i) => i !== index));
            } else if (item.id === 'scissors') {
              setActiveItem({ itemIndex: index, type: 'scissors' });
              setMessage(t.msgScissorsSelect);
              setSelectedHandCard(null);
              setSacrifices([]);
            }
          };

          const handleOpponentBoardClick = (index) => {
            if (activeItem?.type === 'scissors') {
              playSound('sacrifice', isSoundEnabled);
              triggerEyeReaction();
              if (opponentBoard[index]) {
                const newBoard = [...opponentBoard];
                newBoard[index] = null;
                setOpponentBoard(newBoard);
                setMessage(t.msgScissorsDone);
                setItems(items.filter((_, i) => i !== activeItem.itemIndex));
                setActiveItem(null);
              } else {
                setMessage(t.msgScissorsEmpty);
              }
            }
          };

          const drawCard = (isSquirrel) => {
            if (phase !== 'draw') return;
            playSound(isSquirrel ? 'card_light' : 'card_heavy', isSoundEnabled);
            triggerEyeReaction();
            
            if (isSquirrel) {
              if (Math.random() < 0.10 && items.length < 3) {
                const newItem = ITEMS_DB[Math.floor(Math.random() * ITEMS_DB.length)];
                setItems([...items, newItem]);
                setMessage(t.msgFoundItem(newItem.icon, t.items[newItem.id].name));
                return; 
              }
              setPlayerHand([...playerHand, createCard(CARD_TYPES.SQUIRREL)]);
            } else {
              if (deck.length === 0) {
                setMessage(t.msgDeckEmpty);
                playSound('hit', isSoundEnabled);
                setScale(prev => prev - 1);
                if (scale - 1 <= -5) {
                  setPhase('gameover');
                  playSound('die', isSoundEnabled);
                  setMessage(t.msgDeathDarkness);
                  setPlayerLives(0);
                  return;
                }
              } else {
                const newDeck = [...deck];
                const card = newDeck.pop();
                setPlayerHand([...playerHand, card]);
                setDeck(newDeck);
              }
            }
            setPhase('play');
            setMessage(t.msgPlayCreatures);
          };

          const handleHandClick = (card) => {
            if (phase !== 'play') return;
            playSound(card.type === 'resource' ? 'card_light' : 'card_heavy', isSoundEnabled);
            triggerEyeReaction();
            setActiveItem(null); 
            if (selectedHandCard?.id === card.id) {
              setSelectedHandCard(null); 
              setSacrifices([]);
            } else {
              setSelectedHandCard(card);
              setSacrifices([]);
              if (card.cost > 0) {
                setMessage(t.msgSacrificeNeeded(card.cost));
              } else {
                setMessage(t.msgSelectEmpty);
              }
            }
          };

          const handleBoardClick = (index) => {
            if (phase !== 'play') return;

            if (selectedHandCard) {
              const targetSlot = playerBoard[index];
              const currentBlood = sacrifices.reduce((sum, idx) => sum + (playerBoard[idx].bloodValue || 1), 0);
              const canPlayHere = currentBlood >= selectedHandCard.cost && (!targetSlot || sacrifices.includes(index));

              if (canPlayHere) {
                if(sacrifices.length > 0) playSound('sacrifice', isSoundEnabled);
                else playSound(selectedHandCard.type === 'resource' ? 'card_light' : 'card_heavy', isSoundEnabled);
                triggerEyeReaction();

                const newBoard = [...playerBoard];
                sacrifices.forEach(sacIndex => {
                  if (!playerBoard[sacIndex].manyLives) newBoard[sacIndex] = null;
                });

                newBoard[index] = { ...selectedHandCard };

                setPlayerHand(playerHand.filter(c => c.id !== selectedHandCard.id));
                setPlayerBoard(newBoard);
                setSelectedHandCard(null);
                setSacrifices([]);
                setMessage(t.msgCardPlayed);
                return;
              }

              if (targetSlot) {
                if (selectedHandCard.cost > 0) {
                  playSound('card_light', isSoundEnabled);
                  triggerEyeReaction();
                  if (sacrifices.includes(index)) {
                    setSacrifices(sacrifices.filter(i => i !== index));
                  } else {
                    if (currentBlood < selectedHandCard.cost) {
                      setSacrifices([...sacrifices, index]);
                    } else {
                      setMessage(t.msgBloodReady);
                    }
                  }
                }
              } else {
                setMessage(t.msgNotEnoughBlood(selectedHandCard.cost, currentBlood));
              }
            }
          };

          const handleCardChoice = (selectedCard) => {
            playSound('card', isSoundEnabled);
            setPlayerHand(prev => [...prev, selectedCard]); 
            setCardChoices(null);
            setMessage(t.msgNewRound);
            setPhase('draw');
          };

          const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

          const endTurn = async () => {
            if (phase !== 'play') return;
            setPhase('combat');
            playSound('bell', isSoundEnabled);
            triggerEyeReaction();
            setIsBellRinging(true);
            setTimeout(() => setIsBellRinging(false), 500);
            setSelectedHandCard(null);
            setSacrifices([]);
            setMessage(t.msgCombatStart);

            let currentScale = scale;
            let currentOppBoard = [...opponentBoard];
            let currentPlayerBoard = [...playerBoard];
            let currentEnemyItems = [...enemyItems];

            const handleRoundEnd = async (winner) => {
              playSound('die', isSoundEnabled);
              const newEnemyLives = winner === 'player' ? enemyLives - 1 : enemyLives;
              const newPlayerLives = winner === 'opponent' ? playerLives - 1 : playerLives;
              
              if (winner === 'player') {
                  setMessage(t.msgShadowLosesCandle);
                  setEnemyLives(newEnemyLives);
              } else {
                  setMessage(t.msgYouLoseCandle);
                  setPlayerLives(newPlayerLives);
              }
              
              await sleep(2000);
              
              if (newEnemyLives <= 0 || newPlayerLives <= 0) {
                  setPhase('gameover');
                  setScale(winner === 'player' ? 5 : -5);
                  return;
              }
              
              setScale(0);
              currentScale = 0; 
              
              let pItems = [...items]; 
              let eItems = [...currentEnemyItems]; 
              
              const numPlayerDrops = Math.floor(Math.random() * 2) + 1; 
              const numEnemyDrops = Math.floor(Math.random() * 2);      
              
              let droppedItemsText = [];
              for(let i=0; i < numPlayerDrops; i++) {
                  if (pItems.length < 3) {
                      const newItem = ITEMS_DB[Math.floor(Math.random() * ITEMS_DB.length)];
                      pItems.push(newItem);
                      droppedItemsText.push(t.items[newItem.id].name);
                  }
              }
              for(let i=0; i < numEnemyDrops; i++) {
                  if (eItems.length < 3) {
                      eItems.push(ITEMS_DB[Math.floor(Math.random() * ITEMS_DB.length)]);
                  }
              }
              
              setItems(pItems);
              setEnemyItems(eItems);
              
              if (winner === 'opponent') {
                  const draftTypes = Object.values(CARD_TYPES).filter(c => c.type !== 'resource');
                  const choice1 = createCard(draftTypes[Math.floor(Math.random() * draftTypes.length)]);
                  let choice2 = createCard(draftTypes[Math.floor(Math.random() * draftTypes.length)]);
                  while(choice1.typeId === choice2.typeId) {
                       choice2 = createCard(draftTypes[Math.floor(Math.random() * draftTypes.length)]);
                  }
                  setCardChoices([choice1, choice2]);
                  setPhase('event');
                  return; 
              } else if (winner === 'player') {
                  setPunishment(t.msgShadowCandleOut);
                  playSound('bell', isSoundEnabled);
                  await sleep(1200); 
                  setPunishment(null); 
                  await sleep(300); 

                  const punishType = Math.random() > 0.5 ? 'column' : 'random';
                  let didPunish = false;
                  
                  if (punishType === 'column') {
                      const col = Math.floor(Math.random() * 4);
                      if (currentPlayerBoard[col]) { currentPlayerBoard[col] = { ...currentPlayerBoard[col], isPunished: true }; didPunish = true; }
                      if (currentOppBoard[col]) { currentOppBoard[col] = { ...currentOppBoard[col], isPunished: true }; didPunish = true; }
                      
                      setPlayerBoard([...currentPlayerBoard]);
                      setOpponentBoard([...currentOppBoard]);
                      
                      if (didPunish) {
                          playSound('hit', isSoundEnabled);
                          setTimeout(() => playSound('die', isSoundEnabled), 300);
                          await sleep(800); 
                      }
                      
                      currentPlayerBoard[col] = null;
                      currentOppBoard[col] = null;
                  } else {
                      const pIndexes = currentPlayerBoard.map((c, i) => c && !c.isDying && !c.isPunished ? i : -1).filter(i => i !== -1);
                      const oIndexes = currentOppBoard.map((c, i) => c && !c.isDying && !c.isPunished ? i : -1).filter(i => i !== -1);
                      let pTarget = pIndexes.length > 0 ? pIndexes[Math.floor(Math.random() * pIndexes.length)] : -1;
                      let oTarget = oIndexes.length > 0 ? oIndexes[Math.floor(Math.random() * oIndexes.length)] : -1;

                      if (pTarget !== -1) { currentPlayerBoard[pTarget] = { ...currentPlayerBoard[pTarget], isPunished: true }; didPunish = true; }
                      if (oTarget !== -1) { currentOppBoard[oTarget] = { ...currentOppBoard[oTarget], isPunished: true }; didPunish = true; }

                      setPlayerBoard([...currentPlayerBoard]);
                      setOpponentBoard([...currentOppBoard]);
                      
                      if (didPunish) {
                          playSound('hit', isSoundEnabled);
                          setTimeout(() => playSound('die', isSoundEnabled), 300);
                          await sleep(800);
                      }

                      if (pTarget !== -1) currentPlayerBoard[pTarget] = null;
                      if (oTarget !== -1) currentOppBoard[oTarget] = null;
                  }

                  setPlayerBoard([...currentPlayerBoard]);
                  setOpponentBoard([...currentOppBoard]);
                  
                  if (droppedItemsText.length > 0) {
                      setMessage(t.msgFoundLoot(droppedItemsText.join(', ')));
                  } else {
                      setMessage(t.msgNewRound);
                  }
                  setPhase('draw');
              }
            };

            for (let i = 0; i < 4; i++) {
              const pCard = currentPlayerBoard[i];
              if (pCard && pCard.power > 0) {
                setAttackingSlot({ side: 'player', index: i });
                await sleep(400);
                playSound('hit', isSoundEnabled);

                const oCard = currentOppBoard[i];
                if (oCard && (!pCard.airborne || oCard.mightyLeap)) {
                  oCard.health -= pCard.power;
                  if (pCard.touchOfDeath) oCard.health = 0; 
                  
                  let pDied = false;
                  if (oCard.sharpQuills) {
                    pCard.health -= 1;
                    if (pCard.health <= 0) pDied = true;
                  }
                  
                  if (oCard.health <= 0) {
                    currentOppBoard[i] = { ...oCard, isDying: true };
                  }
                  if (pDied) {
                    currentPlayerBoard[i] = { ...pCard, isDying: true };
                  }

                  if (oCard.health <= 0 || pDied) playSound('die', isSoundEnabled);
                  
                  setOpponentBoard([...currentOppBoard]);
                  setPlayerBoard([...currentPlayerBoard]);

                  if (oCard.health <= 0 || pDied) {
                    await sleep(400); 
                    if (oCard.health <= 0) currentOppBoard[i] = null; 
                    if (pDied) currentPlayerBoard[i] = null; 
                  }
                } else {
                  currentScale += pCard.power; 
                  setShakeScale(true);
                  setTimeout(() => setShakeScale(false), 300);
                }
                
                setOpponentBoard([...currentOppBoard]);
                setPlayerBoard([...currentPlayerBoard]);
                setScale(currentScale);
                setAttackingSlot(null);
                await sleep(200);

                if (currentScale >= 5) {
                  await handleRoundEnd('player');
                  return; 
                }
              }
            }

            setMessage(t.msgShadowTurn);
            triggerEyeReaction();
            await sleep(600);

            let remainingEItems = [];
            let itemsUsedThisTurn = 0;
            for (let i = 0; i < currentEnemyItems.length; i++) {
                const item = currentEnemyItems[i];
                let wantToUse = false;
                
                if (item.id === 'scissors' && currentPlayerBoard.some(c => c && c.power >= 1)) wantToUse = true;
                if (item.id === 'pliers' && Math.random() > 0.3) wantToUse = true;
                if (item.id === 'bottle' && currentOppBoard.includes(null)) wantToUse = true;

                if (wantToUse && itemsUsedThisTurn < 2) { 
                    setMessage(t.msgShadowUses(item.icon, t.items[item.id].name));
                    playSound('card', isSoundEnabled);
                    triggerEyeReaction();
                    itemsUsedThisTurn++;
                    await sleep(800);
                    
                    if (item.id === 'scissors') {
                        playSound('sacrifice', isSoundEnabled);
                        let bestIdx = currentPlayerBoard.findIndex(c => c && c.power >= 1);
                        if (bestIdx !== -1) {
                            currentPlayerBoard[bestIdx] = { ...currentPlayerBoard[bestIdx], isDying: true };
                            setPlayerBoard([...currentPlayerBoard]);
                            await sleep(400);
                            currentPlayerBoard[bestIdx] = null;
                            setPlayerBoard([...currentPlayerBoard]);
                        }
                    } else if (item.id === 'pliers') {
                        playSound('hit', isSoundEnabled);
                        currentScale -= 1;
                        setScale(currentScale);
                        setShakeScale(true);
                        setTimeout(() => setShakeScale(false), 300);
                        if (currentScale <= -5) {
                            setEnemyItems([...remainingEItems, ...currentEnemyItems.slice(i+1)]);
                            await handleRoundEnd('opponent');
                            return;
                        }
                    } else if (item.id === 'bottle') {
                        let emptyIdx = currentOppBoard.findIndex(c => c === null);
                        if (emptyIdx !== -1) {
                            currentOppBoard[emptyIdx] = createCard(CARD_TYPES.SQUIRREL);
                            setOpponentBoard([...currentOppBoard]);
                        }
                    }
                    await sleep(500);
                } else {
                    remainingEItems.push(item);
                }
            }
            if (itemsUsedThisTurn > 0) {
                currentEnemyItems = remainingEItems;
                setEnemyItems(currentEnemyItems);
            }

            let newQueue = [...opponentQueue];
            let dropped = false;
            for (let i = 0; i < 4; i++) {
              if (!currentOppBoard[i] && newQueue[i]) {
                currentOppBoard[i] = newQueue[i];
                newQueue[i] = null;
                dropped = true;
              }
            }
            if(dropped) playSound('card_heavy', isSoundEnabled);
            setOpponentBoard([...currentOppBoard]);
            setOpponentQueue([...newQueue]);
            await sleep(600);

            for (let i = 0; i < 4; i++) {
              const oCard = currentOppBoard[i];
              if (oCard && oCard.power > 0) {
                setAttackingSlot({ side: 'opponent', index: i });
                await sleep(400);
                playSound('hit', isSoundEnabled);

                const pCard = currentPlayerBoard[i];
                if (pCard && (!oCard.airborne || pCard.mightyLeap)) {
                  pCard.health -= oCard.power;
                  if (oCard.touchOfDeath) pCard.health = 0; 
                  
                  let oDied = false;
                  if (pCard.sharpQuills) {
                    oCard.health -= 1;
                    if (oCard.health <= 0) oDied = true;
                  }
                  
                  if (pCard.health <= 0) {
                    currentPlayerBoard[i] = { ...pCard, isDying: true };
                  }
                  if (oDied) {
                    currentOppBoard[i] = { ...oCard, isDying: true };
                  }

                  if (pCard.health <= 0 || oDied) playSound('die', isSoundEnabled);

                  setPlayerBoard([...currentPlayerBoard]);
                  setOpponentBoard([...currentOppBoard]);

                  if (pCard.health <= 0 || oDied) {
                    await sleep(400); 
                    if (pCard.health <= 0) currentPlayerBoard[i] = null; 
                    if (oDied) currentOppBoard[i] = null; 
                  }
                } else {
                  currentScale -= oCard.power; 
                  setShakeScale(true);
                  setTimeout(() => setShakeScale(false), 300);
                }
                
                setPlayerBoard([...currentPlayerBoard]);
                setOpponentBoard([...currentOppBoard]);
                setScale(currentScale);
                setAttackingSlot(null);
                await sleep(200);

                if (currentScale <= -5) {
                  await handleRoundEnd('opponent');
                  return; 
                }
              }
            }

            for (let i = 0; i < 4; i++) {
              if (!newQueue[i] && Math.random() > 0.6) {
                const enemyTypes = [CARD_TYPES.STOAT, CARD_TYPES.FROG, CARD_TYPES.RAVEN, CARD_TYPES.WOLF, CARD_TYPES.ADDER, CARD_TYPES.TURTLE, CARD_TYPES.PORCUPINE];
                const randomEnemy = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
                newQueue[i] = createCard(randomEnemy);
              }
            }
            setOpponentQueue(newQueue);

            setPhase('draw');
            setMessage(t.msgDraw);
          };

          const restartGame = () => {
            const newDeck = generateDeck();
            const newHand = [createCard(CARD_TYPES.SQUIRREL), newDeck.pop(), newDeck.pop(), newDeck.pop()];
            
            setDeck(newDeck);
            setPlayerHand(newHand);
            setPlayerBoard([null, null, null, null]);
            setOpponentBoard([null, null, null, null]);
            setOpponentQueue(generateRandomQueue());
            setItems(generateRandomItems(3));
            setEnemyItems(generateRandomItems(3));
            setPlayerLives(3);
            setEnemyLives(3);
            setActiveItem(null);
            setScale(0);
            setPhase('draw');
            setShowMenu(false);
            setMessage(t.msgDraw);
          };

          const getHandMarginLeft = (index, count) => {
              if (index === 0) return '0px';
              if (count <= 4) return 'min(1vw, 0.8vh)';
              if (count <= 6) return 'min(-3vw, -1.8vh)';
              if (count <= 8) return 'min(-6vw, -3.5vh)';
              if (count <= 12) return 'min(-10vw, -6vh)';
              return 'min(-13vw, -8vh)';
          };

          const Sigil = ({ icon, title }) => (
            <div className="bg-[#1a1612]/90 border border-[#3a3022] rounded-full w-[min(3.5vw,2vh)] h-[min(3.5vw,2vh)] flex items-center justify-center shadow-md backdrop-blur-sm" title={title}>
                <span className="text-[min(2vw,1.2vh)] drop-shadow-md">{icon}</span>
            </div>
          );

          // КОМПАКТНАЯ АДАПТИВНАЯ КАРТА С ПЕРЕВОДОМ
          const Card = ({ card, onClick, isSelected, isSacrifice, isAttacking, isHidden }) => {
            const cardBaseClass = "w-[min(15vw,9.5vh)] h-[min(22.5vw,14.25vh)] rounded-[0.5vh] border-[1.5px] border-[#111] shrink-0";
            
            if (!card && !isHidden) return <div className={`${cardBaseClass} border-dashed border-[#443c30] bg-[#2a241b] opacity-50`} />;
            if (isHidden) return (
              <div className={`${cardBaseClass} bg-[#2a241b] flex items-center justify-center shadow-lg relative overflow-hidden`}>
                <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/wood-pattern.png')] mix-blend-overlay"></div>
                <span className="text-[min(7vw,3.5vh)]">🌲</span>
              </div>
            );

            const cardName = t.cards[getTypeId(card)] || card.name;

            return (
              <div 
                onClick={onClick}
                className={`${cardBaseClass} flex flex-col justify-between p-[min(0.4vw,0.3vh)] shadow-md transition-all duration-300 select-none cursor-pointer relative overflow-hidden
                  ${isSelected ? 'border-yellow-500 scale-105 shadow-[0_0_15px_rgba(234,179,8,0.6)] animate-pulse' : 'border-[#111] hover:border-[#4a4231]'}
                  ${isSacrifice ? 'border-red-600 shadow-[0_0_15px_rgba(220,38,38,0.6)] animate-pulse' : ''}
                  ${isAttacking ? 'scale-110 z-10 border-red-500 shadow-red-500/50' : ''}
                  ${card?.isPunished ? 'anim-punish' : (card?.isDying ? 'anim-die' : '')}
                  ${activeItem?.type === 'scissors' && !isSelected && !isHidden ? 'hover:border-blue-500 hover:shadow-blue-900/50 cursor-crosshair' : ''}
                  bg-[#e6d8ba] text-[#2c241b]
                `}
                style={{
                   backgroundImage: `url("https://www.transparenttextures.com/patterns/old-paper.png")`,
                   transform: isAttacking ? 'translateY(calc(-1 * var(--attack-dir, 0) * 10px)) scale(1.1)' : '',
                   touchAction: 'manipulation'
                }}
              >
                <div className="absolute top-[min(0.4vw,0.3vh)] left-[min(0.4vw,0.3vh)] flex flex-col gap-[min(0.3vw,0.2vh)] z-10">
                    {card.airborne && <Sigil icon="🕊️" title={t.sigilAirborne} />}
                    {card.touchOfDeath && <Sigil icon="☠️" title={t.sigilTouchOfDeath} />}
                    {card.bloodValue > 1 && <Sigil icon="🩸" title={t.sigilWorthySacrifice.replace('{val}', card.bloodValue)} />}
                    {card.manyLives && <Sigil icon="♾️" title={t.sigilManyLives} />}
                    {card.mightyLeap && <Sigil icon="🛡️" title={t.sigilMightyLeap} />}
                    {card.sharpQuills && <Sigil icon="🌵" title={t.sigilSharpQuills} />}
                </div>

                <div className="flex justify-end h-[min(2vw,1.2vh)] gap-[min(0.4vw,0.2vh)] relative z-10">
                  {Array.from({ length: card.cost }).map((_, i) => (
                    <span key={i} className="text-red-700 text-[min(1.5vw,1vh)] drop-shadow-sm leading-none">🩸</span>
                  ))}
                </div>
                
                <div className="flex flex-col items-center flex-1 justify-center -mt-[min(0.8vw,0.5vh)] relative">
                  <span className="text-[min(4.5vw,3vh)] drop-shadow-md leading-none">{card.icon}</span>
                  <span className="text-[min(2.2vw,1.3vh)] font-bold mt-[min(0.4vw,0.2vh)] text-center leading-tight uppercase tracking-tighter border-b border-black/30 pb-[min(0.2vw,0.1vh)] w-full truncate">{cardName}</span>
                </div>

                <div className="flex justify-between items-end h-[min(2.5vw,1.5vh)] font-bold text-[min(1.8vw,1.2vh)] leading-none relative z-10">
                  <div className="flex items-center gap-[min(0.4vw,0.2vh)]">
                    <span className="text-[min(1.5vw,1vh)]">⚔️</span>{card.power}
                  </div>
                  <div className="flex items-center gap-[min(0.4vw,0.2vh)]">
                    {card.health}<span className="text-[min(1.5vw,1vh)]">❤️</span>
                  </div>
                </div>

                {isSacrifice && (
                  <div className="absolute inset-0 bg-red-900/40 flex items-center justify-center z-20">
                    <span className="text-red-600 text-[min(7vw,4vh)] font-black drop-shadow-lg animate-bounce">X</span>
                  </div>
                )}
              </div>
            );
          };

          return (
            <div className="min-h-[100dvh] w-full bg-[#14120f] text-[#d4c3a3] font-mono flex flex-col items-center justify-between selection:bg-red-900 relative touch-manipulation overscroll-none"
                 style={{ backgroundImage: `radial-gradient(circle at center, #26211a 0%, #0a0907 100%)`, WebkitTapHighlightColor: 'transparent' }}>
              
              <style>{`
                @keyframes shakeScale { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px) rotate(-1deg); } 75% { transform: translateX(4px) rotate(1deg); } }
                @keyframes shakeScaleVertical { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-4px) rotate(-1deg); } 75% { transform: translateY(4px) rotate(1deg); } }
                @keyframes die { 0% { filter: brightness(1) sepia(0); transform: scale(1); opacity: 1; } 50% { filter: brightness(0.5) sepia(1) hue-rotate(-50deg); transform: scale(1.05) rotate(3deg); opacity: 0.8; } 100% { filter: brightness(0) sepia(1); transform: scale(0.9) translateY(20px) rotate(-5deg); opacity: 0; } }
                @keyframes bellRing { 0%, 100% { transform: rotate(0); } 20%, 60% { transform: rotate(15deg); } 40%, 80% { transform: rotate(-15deg); } }
                @keyframes blink { 0%, 96%, 98%, 100% { transform: scaleY(1); } 97%, 99% { transform: scaleY(0.1); } }
                
                @keyframes punish {
                  0% { filter: drop-shadow(0 0 0px red) brightness(1); transform: scale(1); opacity: 1; }
                  20% { filter: drop-shadow(0 0 20px red) brightness(0.6) sepia(1) hue-rotate(-50deg) saturate(5); transform: scale(1.15) rotate(-5deg); }
                  40% { filter: drop-shadow(0 0 20px red) brightness(0.3) sepia(1) hue-rotate(-50deg) saturate(5); transform: scale(1.1) rotate(5deg); }
                  60% { filter: drop-shadow(0 0 10px red) brightness(0); transform: scale(0.9) translateY(10px); opacity: 0.8; }
                  100% { filter: drop-shadow(0 0 0px red) brightness(0); transform: scale(0.5) translateY(40px); opacity: 0; }
                }

                .anim-shake { animation: shakeScale 0.2s ease-in-out 2; }
                .anim-shake-vertical { animation: shakeScaleVertical 0.2s ease-in-out 2; }
                .anim-die { animation: die 0.5s ease-in forwards; }
                .anim-punish { animation: punish 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; z-index: 50; }
                .anim-bell { animation: bellRing 0.5s ease-in-out; }
                .anim-eyes { animation: blink 8s infinite; }
                
                .hide-scrollbar::-webkit-scrollbar { display: none; }
                .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
              `}</style>

              {/* ВЕРХНЯЯ ПАНЕЛЬ И ГЛАЗА */}
              <div className="w-full max-w-4xl flex justify-between items-start px-[min(3vw,2vh)] mt-[min(2vw,1vh)] z-20 relative shrink-0">
                
                {/* ЛЕВАЯ ЧАСТЬ: Название, Жизни, Меню */}
                <div className="flex flex-col gap-[min(1vw,0.5vh)] w-[30%] sm:w-1/3">
                  <div className="flex items-center gap-[min(2vw,1.5vh)]">
                    <a href="index.html" className="text-[min(6vw,3vh)] opacity-80 hover:opacity-100 hover:scale-110 transition-all drop-shadow-md cursor-pointer text-white no-underline" title="Home">🏠</a>
                    <button onClick={() => setShowRules(true)} className="text-[min(6vw,3vh)] opacity-80 hover:opacity-100 hover:scale-110 transition-all drop-shadow-md cursor-pointer" title="Rules">📖</button>
                    <button onClick={() => setShowMenu(true)} className="text-[min(6vw,3vh)] opacity-80 hover:opacity-100 hover:scale-110 transition-all drop-shadow-md cursor-pointer" title="Menu">💾</button>
                  </div>
                  <div className="text-[min(2.5vw,1.5vh)] font-bold tracking-widest text-[#8c7a61] border-b border-[#8c7a61] pb-[min(0.5vw,0.2vh)] uppercase w-fit mt-[min(0.5vw,0.2vh)]">
                    {t.title}
                  </div>
                  <div className="flex items-center gap-[min(1vw,0.5vh)] bg-[#1a1612] px-[min(1.5vw,1vh)] py-[min(0.5vw,0.2vh)] rounded border border-[#3a3022] w-fit mt-[min(0.5vw,0.2vh)]" title={t.shadow}>
                    <span className="text-[min(2vw,1.2vh)]">{t.shadow}</span> {Array.from({length: 3}).map((_, i) => <span key={`e-life-${i}`} className={`text-[min(3vw,1.5vh)] ${i < enemyLives ? 'opacity-100 text-red-500' : 'opacity-20 grayscale'}`}>🕯️</span>)}
                  </div>
                </div>

                {/* ГЛАЗА */}
                <div ref={eyesContainerRef} className="absolute left-1/2 -translate-x-1/2 top-[min(0.5vh,1vw)] flex gap-[min(4vw,3vh)] justify-center items-center opacity-85 mix-blend-screen pointer-events-none">
                  <div className="anim-eyes flex gap-[min(4vw,3vh)]">
                    <div className="w-[min(12vw,9vh)] h-[min(6vw,4.5vh)] bg-[#050403] rounded-full overflow-hidden relative shadow-[0_0_15px_rgba(0,0,0,1)] flex items-center justify-center border-t border-[#222]">
                       <div ref={leftPupilRef} 
                            className={`w-[min(3vw,2.2vh)] h-[min(3vw,2.2vh)] rounded-full ${eyeReaction ? 'bg-red-500 shadow-[0_0_10px_red]' : 'bg-[#e6d8ba] shadow-[0_0_5px_white]'}`}
                            style={{ transform: `translate(var(--px, 0px), var(--py, 0px)) ${eyeReaction ? 'scale(2)' : 'scale(1)'}`, transition: 'transform 0.05s ease-out, background-color 0.3s, box-shadow 0.3s' }}>
                       </div>
                    </div>
                    <div className="w-[min(12vw,9vh)] h-[min(6vw,4.5vh)] bg-[#050403] rounded-full overflow-hidden relative shadow-[0_0_15px_rgba(0,0,0,1)] flex items-center justify-center border-t border-[#222]">
                       <div ref={rightPupilRef} 
                            className={`w-[min(3vw,2.2vh)] h-[min(3vw,2.2vh)] rounded-full ${eyeReaction ? 'bg-red-500 shadow-[0_0_10px_red]' : 'bg-[#e6d8ba] shadow-[0_0_5px_white]'}`}
                            style={{ transform: `translate(var(--px, 0px), var(--py, 0px)) ${eyeReaction ? 'scale(2)' : 'scale(1)'}`, transition: 'transform 0.05s ease-out, background-color 0.3s, box-shadow 0.3s' }}>
                       </div>
                    </div>
                  </div>
                </div>

                {/* ПРАВАЯ ЧАСТЬ: Звук, Язык, Предметы противника */}
                <div className="flex flex-col gap-[min(1vw,0.5vh)] items-end w-[30%] sm:w-1/3">
                  <div className="flex items-center gap-[min(2vw,1.5vh)]">
                    <button onClick={toggleLang} className="text-[min(4.5vw,2.2vh)] font-bold opacity-80 hover:opacity-100 hover:scale-110 transition-all drop-shadow-md cursor-pointer" title="Language">
                      {lang === 'ru' ? '🌐RU' : '🌐EN'}
                    </button>
                    <button onClick={() => setIsSoundEnabled(!isSoundEnabled)} className="text-[min(6vw,3vh)] opacity-80 hover:opacity-100 transition-all hover:scale-110 drop-shadow-md" title="Sound">
                      {isSoundEnabled ? '🔊' : '🔇'}
                    </button>
                  </div>

                  <div className="flex gap-[min(0.8vw,0.4vh)] bg-[#1e1813] p-[min(0.8vw,0.4vh)] border border-[#3a3022] rounded shadow-inner mt-[min(0.5vw,0.2vh)] h-[min(6vw,3.5vh)]" title={t.shadow}>
                    {enemyItems.map((item, i) => (
                      <div key={`e-item-${i}`} className="h-full aspect-square rounded border border-[#4a3f31] bg-[#1a1612] flex items-center justify-center text-[min(3.5vw,1.8vh)] opacity-90 shadow-sm">
                        {item.icon}
                      </div>
                    ))}
                    {Array.from({ length: 3 - enemyItems.length }).map((_, i) => (
                      <div key={`e-empty-${i}`} className="h-full aspect-square rounded border border-[#3a3022] bg-[#1a1612] opacity-30 flex items-center justify-center text-[min(1.5vw,0.8vh)] text-[#6e5d4a]">{t.empty}</div>
                    ))}
                  </div>
                </div>
              </div>

              {/* ЦЕНТРАЛЬНОЕ ПОЛЕ БОЯ */}
              <div className="flex-1 flex flex-col justify-center items-center gap-[min(2vw,1.5vh)] w-full max-w-4xl perspective-1000 z-10 px-1 py-[min(1vw,1vh)] relative shrink-0">
                
                {/* ВЕРТИКАЛЬНЫЕ ВЕСЫ */}
                <div className="absolute right-[min(2vw,1vh)] top-1/2 -translate-y-1/2 h-[min(45vw,35vh)] w-[min(8vw,4.5vh)] flex flex-col items-center justify-between bg-[#1a1612] border-2 border-[#3a3022] rounded-full p-[min(1vw,0.5vh)] shadow-[0_0_20px_rgba(0,0,0,0.8)] z-20 pointer-events-none">
                  <div className="text-[min(3.5vw,2vh)] mb-[min(1vw,0.5vh)] opacity-80" title={t.yourAdvantage}>⚖️</div>
                  <div className={`relative flex-1 w-full bg-[#050403] rounded-full overflow-hidden shadow-inner ${shakeScale ? 'anim-shake-vertical' : ''}`}>
                     <div className="absolute top-1/2 left-0 right-0 h-[2px] bg-[#8c7a61] z-10 -mt-[1px]"></div>
                     <div className="absolute bottom-1/2 w-full bg-gradient-to-t from-green-900 to-green-500 transition-all duration-500 ease-out"
                          style={{ height: `${scale > 0 ? (scale * 10) : 0}%`, boxShadow: scale > 0 ? '0 0 10px #22c55e' : 'none' }}></div>
                     <div className="absolute top-1/2 w-full bg-gradient-to-b from-red-900 to-red-600 transition-all duration-500 ease-out"
                          style={{ height: `${scale < 0 ? (Math.abs(scale) * 10) : 0}%`, boxShadow: scale < 0 ? '0 0 10px #dc2626' : 'none' }}></div>
                     <div className="absolute inset-0 flex flex-col justify-between py-[min(1vw,0.5vh)] items-center z-20 pointer-events-none opacity-30">
                        {Array.from({length: 11}).map((_, i) => <div key={i} className={`w-[40%] h-[1px] ${i === 5 ? 'bg-transparent' : 'bg-[#d4c3a3]'}`}></div>)}
                     </div>
                  </div>
                  <div className="text-[min(3.5vw,2vh)] mt-[min(1vw,0.5vh)] opacity-50 grayscale" title={t.shadowAdvantage}>💀</div>
                </div>

                <div className="flex gap-[min(1.5vw,1vh)] opacity-70 shrink-0">
                  {opponentQueue.map((card, i) => (
                    <div key={`queue-${i}`} className="w-[min(15vw,9.5vh)] h-[min(7.5vw,4.75vh)] border border-dashed border-[#4a3f31] bg-[#1a1612] flex items-center justify-center rounded overflow-hidden relative shrink-0">
                      {card && <span className="text-[min(4vw,2.5vh)] mt-[min(1.5vw,1vh)] opacity-50">{card.icon}</span>}
                      {card && <div className="absolute top-0 text-[min(1.5vw,0.9vh)] w-full text-center bg-black/50 text-[#8c7a61]">{t.coming}</div>}
                    </div>
                  ))}
                </div>

                <div className="flex gap-[min(1.5vw,1vh)] p-[min(1.5vw,1vh)] rounded bg-[#1e1a15] border border-[#2a241c] shadow-xl relative shrink-0 z-20" style={{ '--attack-dir': -1 }}>
                  {opponentBoard.map((card, i) => (
                    <div key={`opp-${i}`} onClick={() => handleOpponentBoardClick(i)}>
                      <Card card={card} isAttacking={attackingSlot?.side === 'opponent' && attackingSlot?.index === i} />
                    </div>
                  ))}
                </div>

                <div className="w-[90%] h-px bg-gradient-to-r from-transparent via-[#4a3f31] to-transparent shadow-[0_0_5px_rgba(74,63,49,0.5)] shrink-0 z-20"></div>

                <div className="flex gap-[min(1.5vw,1vh)] p-[min(1.5vw,1vh)] rounded bg-[#1e1a15] border border-[#2a241c] shadow-xl relative shrink-0 z-20" style={{ '--attack-dir': 1 }}>
                  {playerBoard.map((card, i) => (
                    <div key={`pl-slot-${i}`} onClick={() => handleBoardClick(i)}>
                      <Card card={card} isSacrifice={sacrifices.includes(i)} isAttacking={attackingSlot?.side === 'player' && attackingSlot?.index === i} />
                    </div>
                  ))}
                </div>

              </div>

              {/* ПАНЕЛЬ ИГРОКА */}
              <div className="w-full max-w-4xl bg-[#110e0c] border-t border-[#2a241c] p-[min(1.5vw,1vh)] pb-[calc(env(safe-area-inset-bottom)+min(1vw,0.5vh))] rounded-t-xl flex flex-col items-center shadow-[0_-10px_30px_rgba(0,0,0,0.8)] z-30 shrink-0">
                
                {/* СТРОКА СООБЩЕНИЯ В ПАНЕЛИ ИГРОКА */}
                <div className="text-center w-full mb-[min(1.5vw,1vh)] text-[min(3vw,1.4vh)] font-bold text-[#d4c3a3] animate-pulse z-10 px-2 shrink-0 border-b border-[#2a241c] pb-[min(1vw,0.5vh)]">
                  {message}
                </div>

                <div className="flex justify-between w-full mb-[min(1vw,0.5vh)] px-[min(1.5vw,1vh)] items-center gap-[min(2vw,1vh)]">
                  
                  {/* ЛЕВАЯ ЧАСТЬ: КОЛОДЫ + КОЛОНКА ПРЕДМЕТОВ */}
                  <div className="flex gap-[min(2vw,1.5vh)] items-center shrink-0">
                    
                    {/* Колоды */}
                    <div className="flex gap-[min(1.5vw,1.5vh)] shrink-0">
                      <button onClick={() => drawCard(true)} disabled={phase !== 'draw'} className="group relative cursor-pointer disabled:opacity-50 transition-transform hover:-translate-y-1 touch-manipulation w-[min(15vw,9.5vh)] h-[min(22.5vw,14.25vh)] rounded border-[1.5px] border-[#111] bg-[#2a241b]">
                        <div className="absolute -top-[min(3vw,2vh)] left-1/2 -translate-x-1/2 text-[min(2vw,1.2vh)] text-[#8c7a61] opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity">{t.squirrel}</div>
                        <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/wood-pattern.png')] mix-blend-overlay"></div>
                        <div className="absolute inset-0 flex items-center justify-center opacity-80 text-[min(7vw,4vh)]">🐿️</div>
                      </button>
                      <button onClick={() => drawCard(false)} disabled={phase !== 'draw'} className="group relative cursor-pointer disabled:opacity-50 transition-transform hover:-translate-y-1 touch-manipulation w-[min(15vw,9.5vh)] h-[min(22.5vw,14.25vh)] rounded border-[1.5px] border-[#111] bg-[#2a241b]">
                         <div className="absolute -top-[min(3vw,2vh)] left-1/2 -translate-x-1/2 text-[min(2vw,1.2vh)] text-[#8c7a61] opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">{t.deck} ({deck.length})</div>
                        <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/wood-pattern.png')] mix-blend-overlay"></div>
                        <div className="absolute inset-0 flex items-center justify-center opacity-80 text-[min(7vw,4vh)]">🌲</div>
                      </button>
                    </div>

                    {/* Вертикальная колонка предметов (макс. 3) */}
                    <div className="flex flex-col gap-[min(1vw,0.5vh)] shrink-0 h-[min(22.5vw,14.25vh)] w-[min(8vw,5vh)]">
                      {items.map((item, i) => (
                        <button key={i} onClick={() => handleItemClick(i)} disabled={phase !== 'play'} title={t.items[item.id].desc} 
                                className={`flex-1 min-h-0 overflow-hidden w-full rounded border ${activeItem?.itemIndex === i ? 'border-blue-500 bg-blue-900/30' : 'border-[#4a3f31] bg-[#2a241c]'} hover:bg-[#3d3121] flex items-center justify-center transition-all disabled:opacity-30 disabled:cursor-not-allowed touch-manipulation shadow-sm text-[min(4.5vw,2.5vh)] leading-none`}>
                          {item.icon}
                        </button>
                      ))}
                      {Array.from({ length: 3 - items.length }).map((_, i) => (
                        <div key={`empty-${i}`} className="flex-1 min-h-0 overflow-hidden w-full rounded border border-[#3a3022] bg-[#1e1813] opacity-50 flex items-center justify-center text-[min(1.8vw,1vh)] text-[#6e5d4a] leading-none whitespace-pre-wrap text-center">
                          {t.noItems}
                        </div>
                      ))}
                    </div>

                  </div>

                  {/* ПРАВАЯ ЧАСТЬ: ЖИЗНИ + ОГРОМНАЯ КНОПКА ХОДА */}
                  <div className="flex flex-col gap-[min(1vw,0.6vh)] shrink-0 h-[min(22.5vw,14.25vh)] w-[min(18vw,12vh)]">
                    <div className="flex items-center justify-between gap-[min(1vw,0.5vh)] bg-[#1a1612] px-[min(2vw,1vh)] py-[min(0.8vw,0.4vh)] rounded border border-[#3a3022] font-bold shrink-0" title={t.you}>
                       <span className="text-[min(1.8vw,1vh)] leading-none text-[#8c7a61]">{t.you}</span>
                       <div className="flex gap-[min(0.5vw,0.2vh)]">
                           {Array.from({length: 3}).map((_, i) => <span key={`p-life-${i}`} className={`text-[min(2.5vw,1.4vh)] leading-none ${i < playerLives ? 'opacity-100' : 'opacity-20 grayscale'}`}>🕯️</span>)}
                       </div>
                    </div>
                    <button onClick={endTurn} disabled={phase !== 'play'} className="flex-1 w-full rounded border border-[#5c4a35] bg-[#2a2116] hover:bg-[#3d3121] text-[#d4c3a3] font-bold tracking-widest uppercase transition-all disabled:opacity-30 disabled:cursor-not-allowed flex flex-col items-center justify-center gap-[min(1vw,0.5vh)] shadow-[0_0_10px_rgba(0,0,0,0.5)] group touch-manipulation text-[min(2vw,1.2vh)] px-[min(2vw,1vh)]">
                      <span className={`text-[min(5vw,3vh)] inline-block leading-none ${isBellRinging ? 'anim-bell' : 'group-hover:anim-bell'}`}>🔔</span> 
                      <span className="leading-none mt-[min(0.5vw,0.2vh)]">{t.turn}</span>
                    </button>
                  </div>

                </div>

                <div className="flex flex-row justify-center items-end w-full p-[min(1vw,0.5vh)] border border-dashed border-[#2a241c] rounded bg-[#0a0806]/50 touch-manipulation shrink-0 min-h-[min(25vw,16vh)] pt-[min(1.5vw,1vh)]" style={{ WebkitOverflowScrolling: 'touch' }}>
                  {playerHand.length === 0 && <span className="m-auto opacity-30 italic text-[min(3vw,1.5vh)]">{t.emptyHand}</span>}
                  {playerHand.map((card, i) => {
                    const isSelected = selectedHandCard?.id === card.id;
                    return (
                      <div key={card.id} 
                           className={`relative transition-all duration-300 ease-out hover:z-40 ${isSelected ? '-translate-y-[min(12vw,8vh)] z-50' : 'hover:-translate-y-[min(5vw,3.5vh)]'}`}
                           style={{ 
                               marginLeft: getHandMarginLeft(i, playerHand.length),
                               zIndex: isSelected ? 50 : i 
                           }}>
                        <Card card={card} isSelected={isSelected} onClick={() => handleHandClick(card)} />
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* --- МОДАЛКИ СЮЖЕТА --- */}
              {cardChoices && (
                <div className="absolute inset-0 bg-black/90 backdrop-blur-sm flex flex-col items-center justify-center z-50 p-4">
                  <h2 className="text-[min(4vw,3vh)] font-black text-[#e6d8ba] mb-[min(4vw,3vh)] text-center whitespace-pre-wrap">{t.msgCandleOutChoice}</h2>
                  <div className="flex gap-[min(4vw,3vh)]">
                    {cardChoices.map((c, i) => (
                      <div key={i} className="hover:-translate-y-[min(2vw,1vh)] hover:scale-110 transition-all cursor-pointer" onClick={() => handleCardChoice(c)}>
                        <Card card={c} />
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* БЫСТРАЯ ТАБЛИЧКА РАСПЛАТЫ */}
              {punishment && (
                <div className="absolute inset-0 bg-black/60 flex items-center justify-center z-50 p-4 pointer-events-none">
                  <div className="bg-[#1a1612] border-2 border-red-900 p-[3vh] rounded-xl flex flex-col items-center text-center shadow-[0_0_80px_rgba(220,38,38,0.8)] animate-pulse">
                    <h2 className="text-[min(6vw,4.5vh)] font-black text-red-600 mb-[1vh]">{t.msgPunishment}</h2>
                    <p className="text-[#d4c3a3] text-[min(3vw,2vh)] whitespace-pre-line">{punishment}</p>
                  </div>
                </div>
              )}

              {/* --- ГЛАВНОЕ МЕНЮ --- */}
              {showMenu && (
                <div className="absolute inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setShowMenu(false)}>
                  <div className="bg-[#1a1612] text-[#e6d8ba] border-4 border-[#3a3022] p-[3vh] rounded-xl shadow-[0_0_50px_rgba(0,0,0,1)] w-full max-w-xs flex flex-col gap-[2vh]" onClick={e => e.stopPropagation()}>
                    <h2 className="text-[3vh] font-black text-center mb-[1vh] border-b-2 border-[#3a3022] pb-2 text-[#8c7a61] tracking-widest">{t.menu}</h2>
                    <button onClick={handleManualSave} className="px-[2vh] py-[1.5vh] text-[2vh] bg-[#2a241c] hover:bg-[#3d3121] border border-[#5c4a35] text-[#d4c3a3] rounded uppercase tracking-widest transition-all font-bold shadow-md">{t.save}</button>
                    <button onClick={handleLoad} className="px-[2vh] py-[1.5vh] text-[2vh] bg-[#2a241c] hover:bg-[#3d3121] border border-[#5c4a35] text-[#d4c3a3] rounded uppercase tracking-widest transition-all font-bold shadow-md">{t.load}</button>
                    <button onClick={restartGame} className="px-[2vh] py-[1.5vh] text-[2vh] bg-[#4a1c1c] hover:bg-[#6b2525] border border-[#7a2e2e] text-[#d4c3a3] rounded uppercase tracking-widest transition-all font-bold mt-[1vh] shadow-md">{t.newGame}</button>
                    <button onClick={() => setShowMenu(false)} className="px-[2vh] py-[1vh] text-[1.6vh] bg-transparent hover:bg-[#111] text-gray-500 rounded uppercase tracking-widest transition-all font-bold mt-[1vh]">{t.cancel}</button>
                  </div>
                </div>
              )}

              {/* --- МОДАЛКИ ПРАВИЛ --- */}
              {showRules && (
                <div className="absolute inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setShowRules(false)}>
                  <div className="bg-[#e6d8ba] text-[#2c241b] border-4 border-[#332c22] p-[3vh] rounded shadow-[0_0_50px_rgba(0,0,0,1)] w-full max-w-lg max-h-[90vh] overflow-y-auto" style={{ backgroundImage: `url("https://www.transparenttextures.com/patterns/old-paper.png")` }} onClick={e => e.stopPropagation()}>
                    <h2 className="text-[3vh] font-black mb-[1.5vh] border-b-2 border-[#332c22] pb-2">{t.rulesTitle}</h2>
                    <ul className="space-y-[1vh] text-[1.6vh] text-left">
                      <li dangerouslySetInnerHTML={{__html: t.rules[0]}} />
                      <li dangerouslySetInnerHTML={{__html: t.rules[1]}} />
                      <li dangerouslySetInnerHTML={{__html: t.rules[2]}} />
                      <li dangerouslySetInnerHTML={{__html: t.rules[3]}} />
                      <li>
                        <strong dangerouslySetInnerHTML={{__html: t.rules[4]}} />
                        <ul className="pl-4 mt-1 list-disc opacity-80">
                          {t.rulesSigils.map((s, idx) => <li key={idx} dangerouslySetInnerHTML={{__html: s}} />)}
                        </ul>
                      </li>
                    </ul>
                    <button onClick={() => setShowRules(false)} className="mt-[2vh] px-[2vh] py-[1vh] text-[1.6vh] bg-[#332c22] hover:bg-[#111] text-[#e6d8ba] rounded uppercase tracking-widest transition-colors font-bold w-full">{t.understood}</button>
                  </div>
                </div>
              )}

              {phase === 'gameover' && (
                <div className="absolute inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                  <div className="bg-[#1a1612] border-2 border-[#4a3f31] p-[3vh] rounded-xl flex flex-col items-center text-center shadow-[0_0_50px_rgba(0,0,0,1)] w-full max-w-md">
                    <h2 className={`text-[4vh] font-black mb-[1.5vh] ${scale >= 5 ? 'text-green-700' : 'text-red-800'}`}>
                      {scale >= 5 ? t.victory : t.defeat}
                    </h2>
                    <p className="text-[#8c7a61] mb-[3vh] text-[1.6vh]">
                      {scale >= 5 ? t.victoryDesc : t.defeatDesc}
                    </p>
                    <button onClick={restartGame} className="px-[2vh] py-[1vh] text-[1.6vh] bg-[#2a241c] hover:bg-[#4a3f31] border border-[#8c7a61] text-[#d4c3a3] rounded uppercase tracking-widest transition-colors font-bold touch-manipulation">{t.restart}</button>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
