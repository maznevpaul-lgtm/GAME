<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Танки: Эволюция</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; 
            overflow: hidden;
        }
        #game-wrapper {
            width: 100%;
            max-width: 488px; 
            margin: 0 auto;
        }
        #game-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #111;
            border: 4px solid #4a4a4a;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }
        .hidden { display: none !important; }
        
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            width: 180px;
        }
        .btn {
            background: #333;
            border: 2px solid #555;
            color: white;
            border-radius: 8px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            font-size: 1.25rem;
        }
        .btn:active, .btn.active-btn { background: #555; border-color: #777; }
        
        .btn-fire {
            background: #b91c1c;
            border-color: #f87171;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-weight: bold;
        }
        .btn-fire:active, .btn-fire.active-btn { background: #ef4444; border-color: #fca5a5; }
        
        .btn-mine {
            background: #d97706;
            border-color: #fbbf24;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            line-height: 1.1;
        }
        .btn-mine:active, .btn-mine.active-btn { background: #b45309; border-color: #f59e0b; }
    </style>
</head>

<script>

};

let currentLang = localStorage.getItem('tanksLang') || 'ru';
const t = (key, params = {}) => {
    let str = i18n[currentLang][key] || key;
    for (let p in params) str = str.replace(`{${p}}`, params[p]);
    return str;
};

function updateStaticUI() {
    document.documentElement.lang = currentLang;
    document.getElementById('lbl_score').innerHTML = t('score');
    document.getElementById('lbl_lvl').innerHTML = t('lvl');
    document.getElementById('lbl_title').innerHTML = t('title');
    document.getElementById('lbl_campaign').innerHTML = t('campaign');
    document.getElementById('startBtn').innerHTML = t('newGame');
    document.getElementById('startLoadBtn').innerHTML = t('continue');
    document.getElementById('lbl_saveFileStart').innerHTML = t('saveFile');
    
    let btn = document.getElementById('muteBtn');
    if (sfx.isMuted) btn.innerText = t('soundOff'); else btn.innerText = t('soundOn');
    
    document.getElementById('lbl_pauseTitle').innerHTML = t('pauseTitle');
    document.getElementById('resumeBtn').innerHTML = t('resume');
    document.getElementById('lbl_cacheTitle').innerHTML = t('cacheTitle');
    document.getElementById('saveBtn').innerHTML = t('save');
    document.getElementById('pauseLoadBtn').innerHTML = t('load');
    document.getElementById('lbl_deviceTitle').innerHTML = t('deviceTitle');
    document.getElementById('exportBtn').innerHTML = t('download');
    document.getElementById('lbl_fileLoadPause').innerHTML = t('load');
    
    document.getElementById('lbl_gameOverTitle').innerHTML = t('missionFailed');
    document.getElementById('lbl_finalScore').innerHTML = t('finalScore');
    document.getElementById('restartBtn').innerHTML = t('toMenu');
    document.getElementById('lbl_backToMenu').innerHTML = t('backToMenu');
    document.getElementById('headerPauseBtn').innerHTML = t('pauseBtn');
    document.getElementById('lbl_mineBtn').innerHTML = t('mineBtn');
    document.getElementById('langToggleBtn').innerHTML = t('langToggle');
    
    updateObjectiveUI();
}

document.getElementById('langToggleBtn').addEventListener('click', () => {
    currentLang = currentLang === 'ru' ? 'en' : 'ru';
    localStorage.setItem('tanksLang', currentLang);
    updateStaticUI();
});

/**
 * НАСТРОЙКИ И КОНСТАНТЫ
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const TILE_SIZE = 32; 
const COLS = 15; 
let ROWS = 15;   

const EMPTY = 0;
const BRICK = 1;
const STEEL = 2;
const BASE = 3;
const ENEMY_BASE = 4;
const SUBSTATION = 5;
const WATER = 6;
const RADAR = 7;
const BUSH = 8; // Стелс-кусты

const DIR_UP = 0, DIR_RIGHT = 1, DIR_DOWN = 2, DIR_LEFT = 3;
const BONUS_TYPES = ['LIFE', 'SHIELD', 'FIRE', 'BASE', 'ALLY', 'TURRET', 'BOMB', 'TIME'];

// Помощник для точных пересечений хитбоксов пуль и частичных кирпичей
function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

/**
 * 8-БИТНЫЙ АУДИО ДВИЖОК (Web Audio API)
 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sfx = {
    isMuted: false,
    init() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
    },
    createNoiseBuffer() {
        const bufferSize = audioCtx.sampleRate * 2; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        return buffer;
    },
    noiseBuffer: null,
    
    playShoot(isPlayer = true) {
        if (this.isMuted || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(isPlayer ? 400 : 300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(isPlayer ? 0.05 : 0.02, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    },

    playLaser() {
        if (this.isMuted || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    },
    
    playExplosion(isBig = false) {
        if (this.isMuted || audioCtx.state === 'suspended') return;
        if (!this.noiseBuffer) this.noiseBuffer = this.createNoiseBuffer();
        const noise = audioCtx.createBufferSource(); noise.buffer = this.noiseBuffer;
        const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
        filter.frequency.value = isBig ? 800 : 2000; 
        const gain = audioCtx.createGain();
        let dur = isBig ? 0.5 : 0.15; let vol = isBig ? 0.3 : 0.1;
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noise.start(); noise.stop(audioCtx.currentTime + dur);
    },

    playArmorHit() {
        if (this.isMuted || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    },

    playBonus() { this.playMelody([[600,0.1], [800,0.2]]); },

    engineOsc: null, engineGain: null,
    startEngine() {
        if (this.isMuted || this.engineOsc || audioCtx.state === 'suspended') return;
        this.engineOsc = audioCtx.createOscillator(); this.engineGain = audioCtx.createGain();
        this.engineOsc.type = 'square'; this.engineOsc.frequency.value = 55; 
        this.engineGain.gain.setValueAtTime(0.02, audioCtx.currentTime);
        this.engineOsc.connect(this.engineGain); this.engineGain.connect(audioCtx.destination);
        this.engineOsc.start();
    },
    stopEngine() {
        if (this.engineOsc) {
            this.engineGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            this.engineOsc.stop(audioCtx.currentTime + 0.1);
            this.engineOsc = null;
        }
    },

    playMelody(notes, type='square') { 
        if (this.isMuted || audioCtx.state === 'suspended') return;
        let time = audioCtx.currentTime;
        notes.forEach(([freq, dur]) => {
            if (freq > 0) {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.05, time); gain.gain.linearRampToValueAtTime(0, time + dur * 0.9);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(time); osc.stop(time + dur);
            }
            time += dur;
        });
    },
    playStart() { this.playMelody([[330,0.15], [330,0.15], [330,0.15], [261,0.15], [330,0.15], [392,0.3]]); },
    playWin() { this.playMelody([[261,0.1],[330,0.1],[392,0.1],[523,0.4]]); },
    playLose() { this.playMelody([[392,0.2],[370,0.2],[349,0.2],[330,0.8]], 'sawtooth'); }
};

/**
 * СОСТОЯНИЕ ИГРЫ
 */
let grid = [];
let brickState = []; 
let player = null;
let enemies = [];
let allies = [];
let turrets = [];
let bullets = [];
let lasers = [];
let particles = [];
let bonuses = [];
let placedMines = [];
let enemyMines = [];
let score = 0;
let lives = 3;
let continues = 3;
let minesCount = 3;
let level = 1;
let levelType = 'CLASSIC'; 
let assaultMode = 'NORMAL'; 
let gameState = 'START'; 
let baseAlive = true;
let substationAlive = false;
let radarsAlive = 3;

let wasSpottedLastFrame = false;

function saveGame() {
    const data = { level, score, lives, continues, lastBossLevel, playerWeaponLevel };
    localStorage.setItem('battleCityEvoSave', JSON.stringify(data));
    
    let btn = document.getElementById('saveBtn');
    let old = btn.innerText;
    btn.innerText = t('success');

function loadGame(buttonId) {
    const save = localStorage.getItem('battleCityEvoSave');
    let btn = document.getElementById(buttonId);
    let old = btn.innerText;

    if (save) {
        const data = JSON.parse(save);
        level = data.level;
        score = data.score;
        lives = data.lives;
        continues = data.continues;
        lastBossLevel = data.lastBossLevel || 0;
        playerWeaponLevel = data.playerWeaponLevel || 0;
        
        document.getElementById('scoreUI').innerText = score;
        document.getElementById('livesUI').innerText = lives;
        document.getElementById('continuesUI').innerText = continues;
        
        btn.innerText = t('loaded');
        setTimeout(() => { 
            btn.innerText = old; 
            document.getElementById('pauseScreen').classList.add('hidden');
            initLevel(false);
            if (gameState === 'PAUSED') togglePause();
        }, 500);
    } else {
        btn.innerText = t('noSaves');
        setTimeout(() => { btn.innerText = old; }, 2000);
    }
}

/**
 * ГЕНЕРАЦИЯ УРОВНЯ
 */
function generateLevel() {
    let validLevel = false;
    
    if (level >= 8 && (level - lastBossLevel) >= 8 && Math.random() < 0.4) {
        levelType = 'BOSS';
        lastBossLevel = level;
    } else {
        let modes = ['CLASSIC', 'ASSAULT', 'COMMAND', 'STEALTH'];
        if (level < 3) {
            levelType = level === 1 ? 'CLASSIC' : 'ASSAULT';
        } else {
            levelType = modes[Math.floor(Math.random() * modes.length)];
        }
    }
    
    if (levelType === 'CLASSIC') {
        ROWS = 15;
        enemiesToSpawn = Math.min(4 + level * 2, 15);
        MAX_ENEMIES_ON_SCREEN = Math.min(3 + Math.floor(level / 3), 6);
    } else if (levelType === 'ASSAULT') {
        ROWS = Math.floor(Math.random() * 15) + 20; 
        enemiesToSpawn = Math.min(4 + level * 2, 25); 
        MAX_ENEMIES_ON_SCREEN = Math.min(3 + Math.floor(level / 3), 8);
    } else if (levelType === 'COMMAND' || levelType === 'STEALTH') {
        ROWS = Math.floor(Math.random() * 10) + 20; 
        enemiesToSpawn = Math.min(4 + level * 2, 25);
        MAX_ENEMIES_ON_SCREEN = Math.min(3 + Math.floor(level / 3), 8);
    } else if (levelType === 'BOSS') {
        ROWS = 18; 
        enemiesToSpawn = 0; 
        MAX_ENEMIES_ON_SCREEN = 1;
    }
    
    baseAlive = true;
    baseDefTimer = 0;
    substationAlive = false;
    assaultMode = 'NORMAL';
    timeStopTimer = 0;
    spottedTimer = 0;
    wasSpottedLastFrame = false;
    enemyMines = [];
    radarsAlive = 3;
    
    let hasMines = (levelType === 'ASSAULT' || levelType === 'COMMAND') && level >= 2 && Math.random() < 0.4;
    if (levelType === 'ASSAULT' && level >= 2) {
        let roll = Math.random();
        if (roll < 0.33) assaultMode = 'SUBSTATION';
        else if (roll < 0.66) assaultMode = 'MINIBOSSES';
    }

    updateObjectiveUI();

    while (!validLevel) {
        grid = Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
        brickState = Array.from({ length: ROWS }, () => Array(COLS).fill(15));
        enemyMines = [];
        let safeZones = [];

        if (levelType === 'CLASSIC') {
            grid[14][7] = BASE;
            grid[14][6] = BRICK; grid[14][8] = BRICK;
            grid[13][6] = BRICK; grid[13][7] = BRICK; grid[13][8] = BRICK;
            safeZones.push({r: 14, c: 4}); 
            safeZones.push({r: 0, c: 0}, {r: 0, c: 7}, {r: 0, c: 14}); 
        } else if (levelType === 'ASSAULT') {
            enemyBaseCol = Math.floor(Math.random() * 9) + 3;
            grid[1][enemyBaseCol] = ENEMY_BASE;
            for(let r=0; r<=2; r++) {
                for(let c=enemyBaseCol-2; c<=enemyBaseCol+2; c++) {
                    if(r===1 && c===enemyBaseCol) continue;
                    grid[r][c] = (Math.random() > 0.6) ? STEEL : BRICK;
                }
            }
            safeZones.push({r: ROWS - 1, c: 7}); 
            safeZones.push({r: 4, c: 2}, {r: 4, c: 7}, {r: 4, c: 12}); 
            
            if (assaultMode === 'SUBSTATION') {
                let subR = Math.floor(Math.random() * (ROWS - 12)) + 6;
                let subC = Math.floor(Math.random() * (COLS - 4)) + 2;
                grid[subR][subC] = SUBSTATION;
                for(let r=subR-1; r<=subR+1; r++) {
                    for(let c=subC-1; c<=subC+1; c++) {
                        if (r>=0 && r<ROWS && c>=0 && c<COLS && grid[r][c] === EMPTY && Math.random() > 0.3) {
                            grid[r][c] = (Math.random() > 0.5) ? BRICK : STEEL;
                        }
                    }
                }
                substationAlive = true;
            } else if (assaultMode === 'MINIBOSSES') {
                safeZones.push({r: 2, c: 1}, {r: 2, c: 13});
            }
        } else if (levelType === 'COMMAND') {
            enemyBaseCol = Math.floor(Math.random() * 9) + 3;
            grid[1][enemyBaseCol] = ENEMY_BASE;
            for(let r=0; r<=2; r++) {
                for(let c=enemyBaseCol-2; c<=enemyBaseCol+2; c++) {
                    if(r===1 && c===enemyBaseCol) continue;
                    grid[r][c] = (Math.random() > 0.6) ? STEEL : BRICK;
                }
            }
            safeZones.push({r: ROWS - 1, c: 7}); 
            safeZones.push({r: 4, c: 2}, {r: 4, c: 7}, {r: 4, c: 12}); 
            
            let radarPositions = [{r: ROWS - 3, c: 3}, {r: ROWS - 3, c: 7}, {r: ROWS - 3, c: 11}];
            for (let pos of radarPositions) {
                grid[pos.r][pos.c] = RADAR;
                grid[pos.r-1][pos.c] = BRICK;
                grid[pos.r][pos.c-1] = BRICK;
                grid[pos.r][pos.c+1] = BRICK;
                safeZones.push(pos);
            }
        } else if (levelType === 'STEALTH') {
            enemyBaseCol = Math.floor(Math.random() * 9) + 3;
            grid[1][enemyBaseCol] = ENEMY_BASE;
            for(let r=0; r<=2; r++) {
                for(let c=enemyBaseCol-2; c<=enemyBaseCol+2; c++) {
                    if(r===1 && c===enemyBaseCol) continue;
                    grid[r][c] = STEEL;
                }
            }
            
            grid[ROWS-1][7] = BASE;
            grid[ROWS-1][6] = BRICK; grid[ROWS-1][8] = BRICK;
            grid[ROWS-2][6] = BRICK; grid[ROWS-2][7] = BRICK; grid[ROWS-2][8] = BRICK;
            
            safeZones.push({r: ROWS-1, c: 7});
            safeZones.push({r: ROWS-1, c: 4}); 
            safeZones.push({r: 1, c: enemyBaseCol});
            
            // Всегда прячем игрока при старте
            grid[ROWS-1][4] = BUSH; 
            
        } else if (levelType === 'BOSS') {
            grid[17][7] = BASE;
            grid[17][6] = BRICK; grid[17][8] = BRICK;
            grid[16][6] = BRICK; grid[16][7] = BRICK; grid[16][8] = BRICK;
            safeZones.push({r: 17, c: 4});
            safeZones.push({r: 2, c: 7});
            
            for (let r = 4; r < 14; r += 3) {
                grid[r][3] = STEEL; grid[r][11] = STEEL;
                grid[r][4] = BRICK; grid[r][10] = BRICK;
            }
        }

        // Рандомные блоки
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] !== EMPTY) continue;
                let inSafeZone = false;
                for (let zone of safeZones) {
                    if (Math.abs(r - zone.r) <= 1 && Math.abs(c - zone.c) <= 1) { inSafeZone = true; break; }
                }
                if (!inSafeZone && levelType !== 'BOSS') { 
                    let rand = Math.random();
                    if (levelType === 'STEALTH') {
                        if (rand < 0.60) grid[r][c] = BUSH;
                        else if (rand < 0.70) grid[r][c] = BRICK;
                        else if (rand < 0.75) grid[r][c] = WATER;
                    } else {
                        if (rand < 0.20) grid[r][c] = BRICK; 
                        else if (rand < 0.28) grid[r][c] = STEEL;
                        else if (rand < 0.35) grid[r][c] = WATER;
                    }
                }
            }
        }

        if (levelType === 'CLASSIC' || levelType === 'BOSS' || levelType === 'STEALTH') {
            let baseR = levelType === 'BOSS' ? 17 : (levelType === 'STEALTH' ? ROWS - 1 : 14);
            let numBlocks = 2 + Math.floor(Math.random() * 3);
            for(let i=0; i<numBlocks; i++) {
                let rr = baseR - 3 - Math.floor(Math.random() * 3);
                let cc = 5 + Math.floor(Math.random() * 5); 
                if (rr >= 0 && rr < ROWS && grid[rr][cc] === EMPTY) grid[rr][cc] = STEEL;
            }
        }
        
        if ((levelType === 'ASSAULT' || levelType === 'COMMAND') && hasMines) {
            let mineCount = Math.floor(Math.random() * 4) + 3;
            let attempts = 0;
            while (enemyMines.length < mineCount && attempts < 50) {
                attempts++;
                let r = Math.floor(Math.random() * (ROWS - 10)) + 5; 
                let c = Math.floor(Math.random() * COLS);
                if (grid[r][c] === EMPTY) {
                    enemyMines.push(new Mine(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2, true));
                }
            }
        }

        validLevel = checkLevelPlayability();
    }

    savedGrid = grid.map(row => [...row]);
    savedBrickState = brickState.map(row => [...row]);
    savedLevelType = levelType;
    savedAssaultMode = assaultMode;
    savedEnemyBaseCol = enemyBaseCol;
    savedEnemiesToSpawn = enemiesToSpawn;
    savedEnemyMinesCoords = enemyMines.map(m => ({x: m.x, y: m.y}));
}

function checkLevelPlayability() {
    let visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
    let startR = levelType === 'CLASSIC' ? 14 : (levelType === 'BOSS' ? 17 : ROWS - 1); 
    let startC = levelType === 'CLASSIC' ? 4 : (levelType === 'BOSS' ? 4 : 7);
    if (levelType === 'STEALTH') startC = 4;
    
    let queue = [{ r: startR, c: startC }]; visited[startR][startC] = true;

    let subR = -1, subC = -1;
    if (levelType === 'ASSAULT' || levelType === 'COMMAND') {
        for (let r=0; r<ROWS; r++) {
            for(let c=0; c<COLS; c++) {
                if (grid[r][c] === SUBSTATION) { subR = r; subC = c; break; }
            }
        }
    }

    while (queue.length > 0) {
        let curr = queue.shift();
        for (let dir of [[-1, 0], [1, 0], [0, -1], [0, 1]]) {
            let nr = curr.r + dir[0]; let nc = curr.c + dir[1];
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                if (!visited[nr][nc] && grid[nr][nc] !== STEEL && grid[nr][nc] !== WATER) {
                    visited[nr][nc] = true; queue.push({ r: nr, c: nc });
                }
            }
        }
    }

    if (levelType === 'CLASSIC' || levelType === 'BOSS' || levelType === 'STEALTH') {
        if (!visited[0][7]) return false; 
    } else {
        if (!visited[2][enemyBaseCol] && !visited[1][enemyBaseCol-1] && !visited[1][enemyBaseCol+1]) return false;
        if (subR !== -1) {
            let reachable = false;
            for (let dir of [[-1, 0], [1, 0], [0, -1], [0, 1]]) {
                let nr = subR + dir[0]; let nc = subC + dir[1];
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && visited[nr][nc]) reachable = true;
            }
            if (!reachable) return false;
        }
    }
    return true; 
}

    if (levelType === 'CLASSIC') {
        objUI.innerText = t('objDefend', {n: enemiesToSpawn + enemies.length});
        objUI.className = "w-full text-center mb-2 font-bold text-green-300 bg-gray-800 rounded py-1 border border-green-700 text-[11px] sm:text-xs";

}
