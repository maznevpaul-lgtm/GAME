<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Танки: Эволюция</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; 
            overflow: hidden;
        }
        #game-wrapper {
            width: 100%;
            max-width: 488px; 
            margin: 0 auto;
        }
        #game-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #111;
            border: 4px solid #4a4a4a;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }
        .hidden { display: none !important; }
        
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            width: 180px;
        }
        .btn {
            background: #333;
            border: 2px solid #555;
            color: white;
            border-radius: 8px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            font-size: 1.25rem;
        }
        .btn:active, .btn.active-btn { background: #555; border-color: #777; }
        
        .btn-fire {
            background: #b91c1c;
            border-color: #f87171;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-weight: bold;
        }
        .btn-fire:active, .btn-fire.active-btn { background: #ef4444; border-color: #fca5a5; }
        
        .btn-mine {
            background: #d97706;
            border-color: #fbbf24;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            line-height: 1.1;
        }
        .btn-mine:active, .btn-mine.active-btn { background: #b45309; border-color: #f59e0b; }
    </style>
</head>
<body class="h-[100dvh] w-screen flex flex-col items-center justify-center select-none">

    <div id="game-wrapper" class="px-2 sm:px-0 flex flex-col pb-4 sm:pb-0">
        <!-- Кнопки управления окном -->
        <div class="w-full flex justify-between items-center mb-2">
            <a href="index.html" class="bg-gray-800 hover:bg-gray-700 text-white font-bold py-1.5 px-3 rounded border-2 border-gray-600 transition-colors shadow text-xs flex items-center gap-1 no-underline cursor-pointer">
                🏠 В меню
            </a>
            <button id="headerPauseBtn" class="bg-blue-800 hover:bg-blue-700 text-white font-bold py-1.5 px-3 rounded border-2 border-blue-600 transition-colors shadow text-xs flex items-center gap-1 cursor-pointer hidden">
                ⏸️ Пауза
            </button>
        </div>

        <!-- Верхний интерфейс -->
        <div class="w-full flex justify-between items-center mb-1 px-1 text-[11px] sm:text-xs font-bold">
            <div class="text-yellow-400">СЧЕТ: <span id="scoreUI">0</span></div>
            <div class="text-blue-300">УР: <span id="levelUI">1</span></div>
            <div class="text-green-400">♥: <span id="livesUI">3</span></div>
            <div class="text-purple-400">🔄: <span id="continuesUI">3</span></div>
            <div class="text-orange-400">💣: <span id="minesUI">3</span></div>
        </div>
        <div class="w-full text-center mb-2 font-bold text-gray-300 bg-gray-800 rounded py-1 border border-gray-600 text-[11px] sm:text-xs">
            <span id="objectiveUI">ЦЕЛЬ: УНИЧТОЖИТЬ ВСЕХ (ОСТАЛОСЬ 5)</span>
        </div>

        <!-- Контейнер игры -->
        <div id="game-container">
            <canvas id="gameCanvas" width="480" height="480"></canvas>
            
            <!-- Стартовый экран -->
            <div id="startScreen" class="overlay">
                <h1 class="text-4xl font-bold text-yellow-500 mb-2 tracking-widest">ТАНКИ</h1>
                <h2 class="text-xl text-white mb-4">КАМПАНИЯ</h2>
                <div class="flex flex-col gap-3 w-full max-w-[240px]">
                    <button id="startBtn" class="bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-3 px-4 rounded border-4 border-yellow-700 text-lg transition-colors">
                        НОВАЯ ИГРА
                    </button>
                    <div class="flex gap-2">
                        <button id="startLoadBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-2 rounded border-4 border-blue-700 text-sm transition-colors" title="Загрузить из браузера">
                            ПРОДОЛЖИТЬ
                        </button>
                        <label class="flex-1 bg-purple-600 hover:bg-purple-500 text-white font-bold py-2 px-2 rounded border-4 border-purple-700 text-[10px] leading-tight transition-colors text-center cursor-pointer flex items-center justify-center" title="Загрузить из файла (.json)">
                            ФАЙЛ СОХРАНЕНИЯ
                            <input type="file" id="fileLoadStart" class="hidden" accept=".json">
                        </label>
                    </div>
                    <button id="muteBtn" class="mt-2 bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded border-2 border-green-700 text-sm transition-colors">
                        ЗВУК: ВКЛ
                    </button>
                </div>
            </div>

            <!-- Экран Паузы -->
            <div id="pauseScreen" class="overlay hidden backdrop-blur-sm">
                <h1 class="text-4xl font-bold text-white mb-6 tracking-widest">ПАУЗА</h1>
                <div class="flex flex-col gap-3 w-full max-w-[240px]">
                    <button id="resumeBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded border-4 border-blue-700 text-lg mb-2">
                        ПРОДОЛЖИТЬ
                    </button>
                    
                    <div class="text-xs text-gray-300 text-center mt-1 border-b border-gray-600 pb-1">Кэш браузера</div>
                    <div class="flex gap-2">
                        <button id="saveBtn" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-2 rounded border-4 border-green-700 text-xs">
                            СОХРАНИТЬ
                        </button>
                        <button id="pauseLoadBtn" class="flex-1 bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-2 px-2 rounded border-4 border-yellow-700 text-xs">
                            ЗАГРУЗИТЬ
                        </button>
                    </div>

                    <div class="text-xs text-gray-300 text-center mt-2 border-b border-gray-600 pb-1">Файл на устройстве</div>
                    <div class="flex gap-2">
                        <button id="exportBtn" class="flex-1 bg-teal-600 hover:bg-teal-500 text-white font-bold py-2 px-2 rounded border-4 border-teal-700 text-xs">
                            СКАЧАТЬ
                        </button>
                        <label class="flex-1 bg-purple-600 hover:bg-purple-500 text-white font-bold py-2 px-2 rounded border-4 border-purple-700 text-xs text-center cursor-pointer flex items-center justify-center">
                            ЗАГРУЗИТЬ
                            <input type="file" id="fileLoadPause" class="hidden" accept=".json">
                        </label>
                    </div>
                </div>
            </div>

            <!-- Экран перехода между уровнями -->
            <div id="transitionScreen" class="overlay hidden">
                <h1 class="text-3xl font-bold text-green-400 mb-4 whitespace-pre-line" id="transitionText">УРОВЕНЬ ПРОЙДЕН!</h1>
            </div>

            <!-- Экран проигрыша -->
            <div id="gameOverScreen" class="overlay hidden">
                <h1 class="text-4xl font-bold text-red-500 mb-2">МИССИЯ ПРОВАЛЕНА</h1>
                <p class="text-xl mb-6">Итоговый счет: <span id="finalScore" class="text-yellow-400">0</span></p>
                <button id="restartBtn" class="bg-white hover:bg-gray-200 text-black font-bold py-3 px-8 rounded border-4 border-gray-400 text-xl transition-colors">
                    В МЕНЮ
                </button>
            </div>
        </div>

        <!-- Мобильное управление -->
        <div id="mobile-controls" class="w-full mt-2 mb-4 flex justify-between items-center sm:hidden">
            <div class="controls-grid">
                <div></div>
                <div class="btn" id="btn-up">▲</div>
                <div></div>
                <div class="btn" id="btn-left">◀</div>
                <div></div>
                <div class="btn" id="btn-right">▶</div>
                <div></div>
                <div class="btn" id="btn-down">▼</div>
                <div></div>
            </div>
            <div class="flex items-center justify-center gap-2">
                <div class="btn-mine text-center" id="btn-mine">МИНА<br>(B/И)</div>
                <div class="btn-fire" id="btn-fire"></div>
            </div>
        </div>
    </div>

<script>
/**
 * НАСТРОЙКИ И КОНСТАНТЫ
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const TILE_SIZE = 32; 
const COLS = 15; 
let ROWS = 15;   

const EMPTY = 0;
const BRICK = 1;
const STEEL = 2;
const BASE = 3;
const ENEMY_BASE = 4;
const SUBSTATION = 5;
const WATER = 6;

const DIR_UP = 0, DIR_RIGHT = 1, DIR_DOWN = 2, DIR_LEFT = 3;
const BONUS_TYPES = ['LIFE', 'SHIELD', 'FIRE', 'BASE', 'ALLY', 'TURRET', 'BOMB', 'TIME'];

/**
 * 8-БИТНЫЙ АУДИО ДВИЖОК (Web Audio API)
 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sfx = {
    isMuted: false,
    init() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
    },
    createNoiseBuffer() {
        const bufferSize = audioCtx.sampleRate * 2; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        return buffer;
    },
    noiseBuffer: null,
    
    playShoot(isPlayer = true) {
        if (this.isMuted || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(isPlayer ? 400 : 300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(isPlayer ? 0.05 : 0.02, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    },

    playLaser() {
        if (this.isMuted || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    },
    
    playExplosion(isBig = false) {
        if (this.isMuted || audioCtx.state === 'suspended') return;
        if (!this.noiseBuffer) this.noiseBuffer = this.createNoiseBuffer();
        const noise = audioCtx.createBufferSource(); noise.buffer = this.noiseBuffer;
        const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
        filter.frequency.value = isBig ? 800 : 2000; 
        const gain = audioCtx.createGain();
        let dur = isBig ? 0.5 : 0.15; let vol = isBig ? 0.3 : 0.1;
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noise.start(); noise.stop(audioCtx.currentTime + dur);
    },

    playArmorHit() {
        if (this.isMuted || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    },

    playBonus() { this.playMelody([[600,0.1], [800,0.2]]); },

    engineOsc: null, engineGain: null,
    startEngine() {
        if (this.isMuted || this.engineOsc || audioCtx.state === 'suspended') return;
        this.engineOsc = audioCtx.createOscillator(); this.engineGain = audioCtx.createGain();
        this.engineOsc.type = 'square'; this.engineOsc.frequency.value = 55; 
        this.engineGain.gain.setValueAtTime(0.02, audioCtx.currentTime);
        this.engineOsc.connect(this.engineGain); this.engineGain.connect(audioCtx.destination);
        this.engineOsc.start();
    },
    stopEngine() {
        if (this.engineOsc) {
            this.engineGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            this.engineOsc.stop(audioCtx.currentTime + 0.1);
            this.engineOsc = null;
        }
    },

    playMelody(notes, type='square') { 
        if (this.isMuted || audioCtx.state === 'suspended') return;
        let time = audioCtx.currentTime;
        notes.forEach(([freq, dur]) => {
            if (freq > 0) {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.05, time); gain.gain.linearRampToValueAtTime(0, time + dur * 0.9);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(time); osc.stop(time + dur);
            }
            time += dur;
        });
    },
    playStart() { this.playMelody([[330,0.15], [330,0.15], [330,0.15], [261,0.15], [330,0.15], [392,0.3]]); },
    playWin() { this.playMelody([[261,0.1],[330,0.1],[392,0.1],[523,0.4]]); },
    playLose() { this.playMelody([[392,0.2],[370,0.2],[349,0.2],[330,0.8]], 'sawtooth'); }
};

/**
 * СОСТОЯНИЕ ИГРЫ
 */
let grid = [];
let player = null;
let enemies = [];
let allies = [];
let turrets = [];
let bullets = [];
let lasers = [];
let particles = [];
let bonuses = [];
let placedMines = [];
let enemyMines = [];
let score = 0;
let lives = 3;
let continues = 3;
let minesCount = 3;
let level = 1;
let levelType = 'CLASSIC'; 
let gameState = 'START'; // START, PLAYING, PAUSED, DYING, LEVEL_TRANSITION, GAMEOVER
let baseAlive = true;
let substationAlive = false;

let enemiesToSpawn = 0;
let enemySpawnTimer = 0;
const ENEMY_SPAWN_RATE = 2500;
let MAX_ENEMIES_ON_SCREEN = 3;

let camera = { x: 0, y: 0 };
let enemyBaseCol = 7;
let baseDefTimer = 0;
let mineCooldown = 0;
let timeStopTimer = 0;

let playerWeaponLevel = 0; // 0 = Normal, 1 = Rapid, 2 = Laser
let lastBossLevel = 0; 

let savedGrid = [];
let savedLevelType = 'CLASSIC';
let savedEnemyBaseCol = 7;
let savedEnemiesToSpawn = 0;
let savedEnemyMinesCoords = [];

let lastTime = 0;
let animationId;

// Поддержка русской раскладки
const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false, W: false, A: false, S: false, D: false, 'ц': false, 'ф': false, 'ы': false, 'в': false, 'Ц': false, 'Ф': false, 'Ы': false, 'В': false, ' ': false, 'b': false, 'B': false, 'и': false, 'И': false };
let touchDirs = { up: false, down: false, left: false, right: false };
let touchFire = false;
let touchMine = false;

/**
 * СОХРАНЕНИЕ / ЗАГРУЗКА
 */
function saveGame() {
    const data = { level, score, lives, continues, lastBossLevel, playerWeaponLevel };
    localStorage.setItem('battleCityEvoSave', JSON.stringify(data));
    
    let btn = document.getElementById('saveBtn');
    let old = btn.innerText;
    btn.innerText = 'УСПЕШНО!';
    setTimeout(() => { btn.innerText = old; }, 2000);
}

function loadGame(buttonId) {
    const save = localStorage.getItem('battleCityEvoSave');
    let btn = document.getElementById(buttonId);
    let old = btn.innerText;

    if (save) {
        const data = JSON.parse(save);
        level = data.level;
        score = data.score;
        lives = data.lives;
        continues = data.continues;
        lastBossLevel = data.lastBossLevel || 0;
        playerWeaponLevel = data.playerWeaponLevel || 0;
        
        document.getElementById('scoreUI').innerText = score;
        document.getElementById('livesUI').innerText = lives;
        document.getElementById('continuesUI').innerText = continues;
        
        btn.innerText = 'ЗАГРУЖЕНО!';
        setTimeout(() => { 
            btn.innerText = old; 
            document.getElementById('pauseScreen').classList.add('hidden');
            initLevel(false);
            if (gameState === 'PAUSED') togglePause();
        }, 500);
    } else {
        btn.innerText = 'НЕТ СОХРАНЕНИЙ';
        setTimeout(() => { btn.innerText = old; }, 2000);
    }
}

/**
 * ГЕНЕРАЦИЯ УРОВНЯ
 */
function generateLevel() {
    let validLevel = false;
    
    if (level >= 8 && (level - lastBossLevel) >= 8 && Math.random() < 0.4) {
        levelType = 'BOSS';
        lastBossLevel = level;
    } else {
        levelType = level === 1 ? 'CLASSIC' : (Math.random() > 0.5 ? 'CLASSIC' : 'ASSAULT');
    }
    
    if (levelType === 'CLASSIC') {
        ROWS = 15;
        enemiesToSpawn = Math.min(4 + level * 2, 15);
        MAX_ENEMIES_ON_SCREEN = Math.min(3 + Math.floor(level / 3), 6);
    } else if (levelType === 'ASSAULT') {
        ROWS = Math.floor(Math.random() * 15) + 20; 
        enemiesToSpawn = Math.min(4 + level * 2, 25); 
        MAX_ENEMIES_ON_SCREEN = Math.min(3 + Math.floor(level / 3), 8);
    } else if (levelType === 'BOSS') {
        ROWS = 18; 
        enemiesToSpawn = 0; 
        MAX_ENEMIES_ON_SCREEN = 1;
    }
    
    baseAlive = true;
    baseDefTimer = 0;
    substationAlive = false;
    timeStopTimer = 0;
    enemyMines = [];
    updateObjectiveUI();

    let hasSubstation = levelType === 'ASSAULT' && level >= 2 && Math.random() < 0.4;
    let hasMines = levelType === 'ASSAULT' && level >= 2 && Math.random() < 0.4;

    while (!validLevel) {
        grid = Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
        enemyMines = [];
        let safeZones = [];

        if (levelType === 'CLASSIC') {
            grid[14][7] = BASE;
            grid[14][6] = BRICK; grid[14][8] = BRICK;
            grid[13][6] = BRICK; grid[13][7] = BRICK; grid[13][8] = BRICK;
            safeZones.push({r: 14, c: 4}); 
            safeZones.push({r: 0, c: 0}, {r: 0, c: 7}, {r: 0, c: 14}); 
        } else if (levelType === 'ASSAULT') {
            enemyBaseCol = Math.floor(Math.random() * 9) + 3;
            grid[1][enemyBaseCol] = ENEMY_BASE;
            for(let r=0; r<=2; r++) {
                for(let c=enemyBaseCol-2; c<=enemyBaseCol+2; c++) {
                    if(r===1 && c===enemyBaseCol) continue;
                    grid[r][c] = (Math.random() > 0.6) ? STEEL : BRICK;
                }
            }
            safeZones.push({r: ROWS - 1, c: 7}); 
            safeZones.push({r: 4, c: 2}, {r: 4, c: 7}, {r: 4, c: 12}); 
            
            if (hasSubstation) {
                let subR = Math.floor(Math.random() * (ROWS - 12)) + 6;
                let subC = Math.floor(Math.random() * (COLS - 4)) + 2;
                grid[subR][subC] = SUBSTATION;
                for(let r=subR-1; r<=subR+1; r++) {
                    for(let c=subC-1; c<=subC+1; c++) {
                        if (r>=0 && r<ROWS && c>=0 && c<COLS && grid[r][c] === EMPTY && Math.random() > 0.3) {
                            grid[r][c] = (Math.random() > 0.5) ? BRICK : STEEL;
                        }
                    }
                }
                substationAlive = true;
            }
        } else if (levelType === 'BOSS') {
            grid[17][7] = BASE;
            grid[17][6] = BRICK; grid[17][8] = BRICK;
            grid[16][6] = BRICK; grid[16][7] = BRICK; grid[16][8] = BRICK;
            safeZones.push({r: 17, c: 4});
            safeZones.push({r: 2, c: 7});
            
            for (let r = 4; r < 14; r += 3) {
                grid[r][3] = STEEL; grid[r][11] = STEEL;
                grid[r][4] = BRICK; grid[r][10] = BRICK;
            }
        }

        // Рандомные блоки
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] !== EMPTY) continue;
                let inSafeZone = false;
                for (let zone of safeZones) {
                    if (Math.abs(r - zone.r) <= 1 && Math.abs(c - zone.c) <= 1) { inSafeZone = true; break; }
                }
                if (!inSafeZone && levelType !== 'BOSS') { 
                    let rand = Math.random();
                    if (rand < 0.20) grid[r][c] = BRICK; 
                    else if (rand < 0.28) grid[r][c] = STEEL;
                    else if (rand < 0.35) grid[r][c] = WATER;
                }
            }
        }

        // Умная защита базы сверху для Классики и Босса
        if (levelType === 'CLASSIC' || levelType === 'BOSS') {
            let baseR = levelType === 'CLASSIC' ? 14 : 17;
            let numBlocks = 2 + Math.floor(Math.random() * 3);
            for(let i=0; i<numBlocks; i++) {
                let rr = baseR - 3 - Math.floor(Math.random() * 3);
                let cc = 5 + Math.floor(Math.random() * 5); // с 5 по 9
                if (rr >= 0 && rr < ROWS && grid[rr][cc] === EMPTY) grid[rr][cc] = STEEL;
            }
        }
        
        if (levelType === 'ASSAULT' && hasMines) {
            let mineCount = Math.floor(Math.random() * 4) + 3;
            let attempts = 0;
            while (enemyMines.length < mineCount && attempts < 50) {
                attempts++;
                let r = Math.floor(Math.random() * (ROWS - 10)) + 5; 
                let c = Math.floor(Math.random() * COLS);
                if (grid[r][c] === EMPTY) {
                    enemyMines.push(new Mine(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2, true));
                }
            }
        }

        validLevel = checkLevelPlayability();
    }

    savedGrid = grid.map(row => [...row]);
    savedLevelType = levelType;
    savedEnemyBaseCol = enemyBaseCol;
    savedEnemiesToSpawn = enemiesToSpawn;
    savedEnemyMinesCoords = enemyMines.map(m => ({x: m.x, y: m.y}));
}

function checkLevelPlayability() {
    let visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
    let startR = levelType === 'CLASSIC' ? 14 : (levelType === 'BOSS' ? 17 : ROWS - 1); 
    let startC = levelType === 'CLASSIC' ? 4 : (levelType === 'BOSS' ? 4 : 7);
    let queue = [{ r: startR, c: startC }]; visited[startR][startC] = true;

    let subR = -1, subC = -1;
    if (levelType === 'ASSAULT') {
        for (let r=0; r<ROWS; r++) {
            for(let c=0; c<COLS; c++) {
                if (grid[r][c] === SUBSTATION) { subR = r; subC = c; break; }
            }
        }
    }

    while (queue.length > 0) {
        let curr = queue.shift();
        for (let dir of [[-1, 0], [1, 0], [0, -1], [0, 1]]) {
            let nr = curr.r + dir[0]; let nc = curr.c + dir[1];
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                // Вода тоже считается непреодолимым препятствием
                if (!visited[nr][nc] && grid[nr][nc] !== STEEL && grid[nr][nc] !== WATER) {
                    visited[nr][nc] = true; queue.push({ r: nr, c: nc });
                }
            }
        }
    }

    if (levelType === 'CLASSIC' || levelType === 'BOSS') {
        if (!visited[0][7]) return false; 
    } else {
        if (!visited[2][enemyBaseCol] && !visited[1][enemyBaseCol-1] && !visited[1][enemyBaseCol+1]) return false;
        if (subR !== -1) {
            let reachable = false;
            for (let dir of [[-1, 0], [1, 0], [0, -1], [0, 1]]) {
                let nr = subR + dir[0]; let nc = subC + dir[1];
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && visited[nr][nc]) reachable = true;
            }
            if (!reachable) return false;
        }
    }
    return true; 
}

function updateObjectiveUI() {

        objUI.innerText = `ЦЕЛЬ: ЗАЩИТИТЬ БАЗУ (ВРАГОВ: ${enemiesToSpawn + enemies.length})`;
        objUI.className = "w-full text-center mb-2 font-bold text-green-300 bg-gray-800 rounded py-1 border border-green-700 text-[11px] sm:text-xs";

}

class Mine {
    constructor(x, y, isEnemy = false) {
        this.x = x; this.y = y;
        this.radius = 6;
        this.isEnemy = isEnemy;
        this.markForDeletion = false;
    }
    update(dt) {
        if (this.isEnemy) {
            let targets = [];
            if (player && !player.markForDeletion) targets.push(player);
            targets = targets.concat(allies);
            
            for (let t of targets) {
                if (Math.hypot(t.x + t.w/2 - this.x, t.y + t.h/2 - this.y) < 18) {
                    this.markForDeletion = true;
                    createExplosion(this.x, this.y, '#ff0000', 30);
                    sfx.playExplosion(true);
                    if (t.shieldTimer > 0) {
                        sfx.playArmorHit();
                        createExplosion(this.x, this.y, '#3b82f6', 10);
                    } else {
                        if (t === player) playerDeath();
                        else { t.hp = 0; t.markForDeletion = true; }
                    }
                }
            }
        } else {
            for (let e of enemies) {
                if (Math.hypot(e.x + e.w/2 - this.x, e.y + e.h/2 - this.y) < 18) {
                    this.markForDeletion = true;
                    e.markForDeletion = true;
                    createExplosion(this.x, this.y, '#ff0000', 30);
                    sfx.playExplosion(true);
                    score += (e.isBoss ? 1000 : (e.eType === 'NORMAL' ? 100 : 300));
                    document.getElementById('scoreUI').innerText = score;
                    updateObjectiveUI();
                }
            }
        }
    }
    draw(ctx) {
        ctx.fillStyle = this.isEnemy ? '#374151' : '#ef4444';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
        if (Math.floor(Date.now() / 250) % 2 === 0) {
            ctx.fillStyle = this.isEnemy ? '#ef4444' : '#fff';
            ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
        }
    }
}

class Bonus {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.w = 20; this.h = 20;
        this.type = type;
        this.blinkTimer = 0; this.markForDeletion = false;
        this.lifeTime = 15000; 
    }
    update(dt) {
        this.lifeTime -= dt;
        if (this.lifeTime <= 0) this.markForDeletion = true;
        this.blinkTimer += dt;
    }
    draw(ctx) {
        if (this.blinkTimer % 400 < 200 && this.lifeTime > 3000) return; 
        if (this.blinkTimer % 200 < 100 && this.lifeTime <= 3000) return;

        ctx.fillStyle = '#fff'; ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        
        let char = '';
        if(this.type === 'LIFE') { ctx.fillStyle = '#ef4444'; char = '♥'; }
        else if(this.type === 'SHIELD') { ctx.fillStyle = '#3b82f6'; char = 'S'; }
        else if(this.type === 'FIRE') { ctx.fillStyle = '#eab308'; char = 'F'; }
        else if(this.type === 'BASE') { ctx.fillStyle = '#22c55e'; char = 'B'; }
        else if(this.type === 'ALLY') { ctx.fillStyle = '#0ea5e9'; char = 'A'; }
        else if(this.type === 'TURRET') { ctx.fillStyle = '#a855f7'; char = 'T'; }
        else if(this.type === 'BOMB') { ctx.fillStyle = '#111827'; char = '💣'; ctx.font = '12px sans-serif'; }
        else if(this.type === 'TIME') { ctx.fillStyle = '#f59e0b'; char = '⏱'; ctx.font = '12px sans-serif'; }
        
        ctx.fillRect(this.x+2, this.y+2, this.w-4, this.h-4);
        ctx.fillStyle = '#fff'; ctx.fillText(char, this.x + this.w/2, this.y + this.h/2 + ((this.type==='BOMB'||this.type==='TIME')?1:2));
    }
}

class Turret {
    constructor(c, r) {
        this.x = c * TILE_SIZE; this.y = r * TILE_SIZE;
        this.hp = 5; this.lifeTime = 25000; this.cooldown = 0;
        this.dir = DIR_UP; this.markForDeletion = false;
    }
    update(dt) {
        this.lifeTime -= dt;
        if (this.lifeTime <= 0) {
            this.markForDeletion = true; createExplosion(this.x + TILE_SIZE/2, this.y + TILE_SIZE/2, '#a855f7', 20);
            return;
        }
        this.cooldown -= dt;
        if (this.cooldown <= 0 && enemies.length > 0) {
            let closest = enemies[0]; let minDist = Infinity;
            for (let e of enemies) {
                let d = Math.hypot(e.x - this.x, e.y - this.y);
                if (d < minDist) { minDist = d; closest = e; }
            }
            let diffX = closest.x - this.x; let diffY = closest.y - this.y;
            if (Math.abs(diffX) > Math.abs(diffY)) this.dir = diffX > 0 ? DIR_RIGHT : DIR_LEFT;
            else this.dir = diffY > 0 ? DIR_DOWN : DIR_UP;
            this.shoot(); this.cooldown = 600; 
        }
    }
    shoot() {
        let bx = this.x + TILE_SIZE / 2; let by = this.y + TILE_SIZE / 2; let bdx = 0, bdy = 0;
        if (this.dir === DIR_UP) { bdy = -1; by -= 12; }
        if (this.dir === DIR_DOWN) { bdy = 1; by += 12; }
        if (this.dir === DIR_LEFT) { bdx = -1; bx -= 12; }
        if (this.dir === DIR_RIGHT) { bdx = 1; bx += 12; }
        bullets.push(new Bullet(bx, by, bdx, bdy, true, { weaponLevel: 0 })); sfx.playShoot(true);
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x + TILE_SIZE/2, this.y + TILE_SIZE/2);
        if (this.lifeTime < 3000 && Math.floor(Date.now() / 150) % 2 === 0) ctx.fillStyle = '#ffaaaa';
        else ctx.fillStyle = '#6b7280';
        ctx.fillRect(-12, -12, 24, 24); ctx.fillStyle = '#4b5563'; ctx.fillRect(-8, -8, 16, 16);
        ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
        if (this.dir === DIR_RIGHT) ctx.rotate(Math.PI / 2); else if (this.dir === DIR_DOWN) ctx.rotate(Math.PI); else if (this.dir === DIR_LEFT) ctx.rotate(-Math.PI / 2);
        ctx.fillStyle = '#a855f7'; ctx.fillRect(-3, -16, 6, 16); ctx.restore();
        ctx.fillStyle = '#ef4444'; ctx.fillRect(this.x + 2, this.y - 6, 28, 4);
        ctx.fillStyle = '#22c55e'; ctx.fillRect(this.x + 2, this.y - 6, 28 * (this.hp / 5), 4);
    }
}

class LaserBeam {
    constructor(startX, startY, endX, endY) {
        this.startX = startX; this.startY = startY;
        this.endX = endX; this.endY = endY;
        this.lifeTime = 200; 
        this.maxLife = 200;
        this.markForDeletion = false;
    }
    update(dt) {
        this.lifeTime -= dt;
        if (this.lifeTime <= 0) this.markForDeletion = true;
    }
    draw(ctx) {
        ctx.save();
        let alpha = this.lifeTime / this.maxLife;
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 8;
        ctx.beginPath(); ctx.moveTo(this.startX, this.startY); ctx.lineTo(this.endX, this.endY); ctx.stroke();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(this.startX, this.startY); ctx.lineTo(this.endX, this.endY); ctx.stroke();
        ctx.restore();
    }
}

class Tank {
    constructor(x, y, isPlayer, eType = 'NORMAL', isAllyAI = false) {
        this.eType = eType; 
        this.isBoss = (eType === 'BOSS');
        this.w = this.isBoss ? 48 : 28; 
        this.h = this.isBoss ? 48 : 28;
        this.x = x * TILE_SIZE + (TILE_SIZE - this.w)/2; 
        this.y = y * TILE_SIZE + (TILE_SIZE - this.h)/2;
        this.isPlayer = isPlayer; this.isAllyAI = isAllyAI;
        this.dir = DIR_UP; 
        
        if (this.isBoss) this.speed = 60;
        else this.speed = isPlayer && !isAllyAI ? 120 : (isAllyAI ? 100 : 80); 
        
        this.cooldown = 0; this.markForDeletion = false;
        
        this.hp = isAllyAI ? 3 : (this.isBoss ? 30 : 1); 
        this.maxHp = this.hp;
        this.shieldTimer = (isPlayer && !isAllyAI) ? 3000 : (isAllyAI ? 2000 : 0); 
        this.weaponLevel = (isPlayer && !isAllyAI) ? playerWeaponLevel : 0; 

        if (!isPlayer || isAllyAI) {
            this.dir = isAllyAI ? DIR_UP : DIR_DOWN;
            this.aiTimer = 0; this.blockedTimer = 0;
            if (eType === 'FAST') this.speed = 140;
            if (eType === 'ARMORED') this.hp = 3;
            if (eType === 'RAPID') this.speed = 70;
        }
    }

    update(dt) {
        if (this.cooldown > 0) this.cooldown -= dt;
        if (this.shieldTimer > 0) this.shieldTimer -= dt;
        
        // Заморозка времени для врагов
        if (!this.isPlayer && !this.isAllyAI && timeStopTimer > 0) return;

        let dx = 0, dy = 0; let moving = false;

        if (this.isPlayer && !this.isAllyAI) {
            if (keys.ArrowUp || keys.w || keys.W || keys['ц'] || keys['Ц'] || touchDirs.up) { dy = -1; this.dir = DIR_UP; moving = true; }
            else if (keys.ArrowDown || keys.s || keys.S || keys['ы'] || keys['Ы'] || touchDirs.down) { dy = 1; this.dir = DIR_DOWN; moving = true; }
            else if (keys.ArrowLeft || keys.a || keys.A || keys['ф'] || keys['Ф'] || touchDirs.left) { dx = -1; this.dir = DIR_LEFT; moving = true; }
            else if (keys.ArrowRight || keys.d || keys.D || keys['в'] || keys['В'] || touchDirs.right) { dx = 1; this.dir = DIR_RIGHT; moving = true; }
            
            if ((keys[' '] || touchFire) && this.cooldown <= 0) this.shoot();
            
            if (moving && gameState === 'PLAYING') sfx.startEngine(); else sfx.stopEngine();
        } else {
            moving = true; this.aiTimer -= dt;
            if (this.aiTimer <= 0) {
                this.aiTimer = 500 + Math.random() * 800;
                if (this.isAllyAI) {
                    if (enemies.length > 0) {
                        let target = enemies[Math.floor(Math.random() * enemies.length)];
                        let diffX = target.x - this.x; let diffY = target.y - this.y;
                        if (Math.random() < 0.8) {
                            if (Math.abs(diffX) > Math.abs(diffY)) this.dir = diffX > 0 ? DIR_RIGHT : DIR_LEFT;
                            else this.dir = diffY > 0 ? DIR_DOWN : DIR_UP;
                        } else this.dir = Math.floor(Math.random() * 4);
                    } else this.dir = Math.floor(Math.random() * 4);
                } else {
                    let targetX = player ? player.x : null; let targetY = player ? player.y : null;
                    if (levelType === 'CLASSIC' && baseAlive && Math.random() < 0.3) { targetX = 7 * TILE_SIZE; targetY = 14 * TILE_SIZE; }
                    if (targetX !== null && targetY !== null && Math.random() < 0.7) {
                        let diffX = targetX - this.x; let diffY = targetY - this.y;
                        if (Math.abs(diffX) > Math.abs(diffY)) this.dir = diffX > 0 ? DIR_RIGHT : DIR_LEFT;
                        else this.dir = diffY > 0 ? DIR_DOWN : DIR_UP;
                    } else this.dir = Math.floor(Math.random() * 4);
                }
            }
            if (this.dir === DIR_UP) dy = -1; if (this.dir === DIR_DOWN) dy = 1;
            if (this.dir === DIR_LEFT) dx = -1; if (this.dir === DIR_RIGHT) dx = 1;
            if (Math.random() < (this.isBoss ? 0.08 : 0.05) && this.cooldown <= 0) this.shoot();
        }

        if (moving) {
            let purelyForwardX = this.x + dx * this.speed * (dt / 1000); let purelyForwardY = this.y + dy * this.speed * (dt / 1000);
            let nextX = purelyForwardX; let nextY = purelyForwardY;

            if (this.isPlayer && !this.isAllyAI) {
                const alignSpeed = this.speed * 1.5 * (dt / 1000);
                if (dy !== 0) { 
                    let centerCol = Math.floor((this.x + this.w / 2) / TILE_SIZE); let idealX = centerCol * TILE_SIZE + (TILE_SIZE - this.w) / 2;
                    let diffX = idealX - this.x;
                    if (Math.abs(diffX) > 0.5) { let testX = this.x + Math.sign(diffX) * Math.min(Math.abs(diffX), alignSpeed); if (!this.checkCollision(testX, this.y)) nextX = testX; }
                } else if (dx !== 0) { 
                    let centerRow = Math.floor((this.y + this.h / 2) / TILE_SIZE); let idealY = centerRow * TILE_SIZE + (TILE_SIZE - this.h) / 2;
                    let diffY = idealY - this.y;
                    if (Math.abs(diffY) > 0.5) { let testY = this.y + Math.sign(diffY) * Math.min(Math.abs(diffY), alignSpeed); if (!this.checkCollision(this.x, testY)) nextY = testY; }
                }
            }

            if (nextX < 0) nextX = 0; if (nextY < 0) nextY = 0;
            if (nextX + this.w > COLS * TILE_SIZE) nextX = COLS * TILE_SIZE - this.w;
            if (nextY + this.h > ROWS * TILE_SIZE) nextY = ROWS * TILE_SIZE - this.h;
            if (purelyForwardX < 0) purelyForwardX = 0; if (purelyForwardY < 0) purelyForwardY = 0;
            if (purelyForwardX + this.w > COLS * TILE_SIZE) purelyForwardX = COLS * TILE_SIZE - this.w;
            if (purelyForwardY + this.h > ROWS * TILE_SIZE) purelyForwardY = ROWS * TILE_SIZE - this.h;

            if (!this.checkCollision(nextX, nextY)) {
                this.x = nextX; this.y = nextY; if(!this.isPlayer || this.isAllyAI) this.blockedTimer = 0;
            } else if (!this.checkCollision(purelyForwardX, purelyForwardY)) {
                this.x = purelyForwardX; this.y = purelyForwardY; if(!this.isPlayer || this.isAllyAI) this.blockedTimer = 0;
            } else if (this.isPlayer && !this.isAllyAI) {
                if (nextX !== purelyForwardX && !this.checkCollision(nextX, this.y)) this.x = nextX;
                else if (nextY !== purelyForwardY && !this.checkCollision(this.x, nextY)) this.y = nextY;
            }

            if ((!this.isPlayer || this.isAllyAI) && this.checkCollision(purelyForwardX, purelyForwardY)) {
                this.blockedTimer += dt;
                if (this.blockedTimer > 200) {
                    let possibleDirs = [DIR_UP, DIR_DOWN, DIR_LEFT, DIR_RIGHT].filter(d => d !== this.dir);
                    this.dir = possibleDirs[Math.floor(Math.random() * possibleDirs.length)];
                    this.aiTimer = 600; this.blockedTimer = 0;
                }
            }
        }
    }

    checkCollision(nextX, nextY) {
        let leftCol = Math.floor(nextX / TILE_SIZE); let rightCol = Math.floor((nextX + this.w - 0.1) / TILE_SIZE);
        let topRow = Math.floor(nextY / TILE_SIZE); let bottomRow = Math.floor((nextY + this.h - 0.1) / TILE_SIZE);

        for (let r = topRow; r <= bottomRow; r++) {
            for (let c = leftCol; c <= rightCol; c++) {
                if (r >= 0 && r < ROWS && c >= 0 && c < COLS) { 
                    if (grid[r][c] !== EMPTY) {
                        if (this.isBoss && grid[r][c] === BRICK) {
                            grid[r][c] = EMPTY;
                            createExplosion(c * TILE_SIZE + 16, r * TILE_SIZE + 16, '#ff9900', 5);
                            continue;
                        }
                        return true; // Вода тоже блокирует движение
                    }
                }
            }
        }
        const allTanks = [player, ...enemies, ...allies].filter(t => t && t !== this);
        for (let other of allTanks) {
            if (nextX < other.x + other.w && nextX + this.w > other.x && nextY < other.y + other.h && nextY + this.h > other.y) return true;
        }
        for (let t of turrets) {
            if (nextX < t.x + TILE_SIZE && nextX + this.w > t.x && nextY < t.y + TILE_SIZE && nextY + this.h > t.y) return true;
        }
        return false;
    }

    shoot() {
        if (this.isPlayer && !this.isAllyAI && this.weaponLevel >= 2) {
            // Лазерный выстрел
            let bx = this.x + this.w / 2; let by = this.y + this.h / 2;
            let stepX = 0, stepY = 0;
            if (this.dir === DIR_UP) stepY = -4;
            if (this.dir === DIR_DOWN) stepY = 4;
            if (this.dir === DIR_LEFT) stepX = -4;
            if (this.dir === DIR_RIGHT) stepX = 4;
            
            let curX = bx, curY = by;
            let hitWall = false;
            
            while (!hitWall) {
                curX += stepX; curY += stepY;
                if (curX < 0 || curY < 0 || curX > COLS * TILE_SIZE || curY > ROWS * TILE_SIZE) break;
                
                let cCol = Math.floor(curX / TILE_SIZE); let cRow = Math.floor(curY / TILE_SIZE);
                if (cRow >= 0 && cRow < ROWS && cCol >= 0 && cCol < COLS) {
                    let cell = grid[cRow][cCol];
                    if (cell === STEEL || cell === BASE || cell === SUBSTATION || (cell === ENEMY_BASE && this.isPlayer)) {
                        hitWall = true;
                        if (cell === BASE) { baseAlive = false; levelFailed("БАЗА УНИЧТОЖЕНА!"); }
                        if (cell === ENEMY_BASE && !substationAlive) { grid[cRow][cCol] = EMPTY; winLevel(); }
                        if (cell === SUBSTATION) { grid[cRow][cCol] = EMPTY; substationAlive = false; updateObjectiveUI(); }
                        createExplosion(curX, curY, '#ffaa00', 10);
                        break;
                    } else if (cell === BRICK) {
                        grid[cRow][cCol] = EMPTY; createExplosion(cCol*TILE_SIZE+16, cRow*TILE_SIZE+16, '#ff9900', 5);
                    } // Вода пропускает лазер
                }
                
                for (let e of enemies) {
                    if (!e.markForDeletion && curX >= e.x && curX <= e.x+e.w && curY >= e.y && curY <= e.y+e.h) {
                        e.hp = 0; 
                        e.markForDeletion = true;
                        score += (e.isBoss ? 1000 : (e.eType === 'NORMAL' ? 100 : 300));
                        document.getElementById('scoreUI').innerText = score;
                        createExplosion(e.x + e.w/2, e.y + e.h/2, '#ff4400', e.isBoss ? 80 : 30);
                        updateObjectiveUI();
                        
                        if (Math.random() < 0.20) {
                            let bType; let roll = Math.random();
                            if (roll < 0.05) bType = 'BOMB';
                            else if (roll < 0.15) bType = 'TIME';
                            else if (roll < 0.35) bType = Math.random() < 0.5 ? 'ALLY' : 'TURRET';
                            else { const std = ['LIFE', 'SHIELD', 'FIRE', 'BASE']; bType = std[Math.floor(Math.random() * std.length)]; }
                            bonuses.push(new Bonus(e.x + 10, e.y + 10, bType));
                        }
                    }
                }
            }
            
            lasers.push(new LaserBeam(bx, by, curX, curY));
            sfx.playLaser();
            this.cooldown = 450; 
            return;
        }

        // Обычные пули
        const activeBullets = bullets.filter(b => b.ownerId === this);
        let maxBul = (this.isPlayer && !this.isAllyAI) ? (this.weaponLevel >= 1 ? 3 : 1) : (this.eType === 'RAPID' ? 2 : (this.isBoss ? 4 : 1));
        if (activeBullets.length >= maxBul) return;

        if (this.isBoss) {
            let bx1 = this.x + this.w / 2; let by1 = this.y + this.h / 2; let bdx1 = 0, bdy1 = 0;
            let bx2 = this.x + this.w / 2; let by2 = this.y + this.h / 2; let bdx2 = 0, bdy2 = 0;
            let offset = 12;
            
            if (this.dir === DIR_UP) { bdy1 = -1; by1 -= 20; bdy2 = -1; by2 -= 20; bx1 -= offset; bx2 += offset; }
            if (this.dir === DIR_DOWN) { bdy1 = 1; by1 += 20; bdy2 = 1; by2 += 20; bx1 -= offset; bx2 += offset; }
            if (this.dir === DIR_LEFT) { bdx1 = -1; bx1 -= 20; bdx2 = -1; bx2 -= 20; by1 -= offset; by2 += offset; }
            if (this.dir === DIR_RIGHT) { bdx1 = 1; bx1 += 20; bdx2 = 1; bx2 += 20; by1 -= offset; by2 += offset; }

            bullets.push(new Bullet(bx1, by1, bdx1, bdy1, false, this));
            bullets.push(new Bullet(bx2, by2, bdx2, bdy2, false, this));
            sfx.playShoot(false);
            this.cooldown = 800; 
        } else {
            let bx = this.x + this.w / 2; let by = this.y + this.h / 2; let bdx = 0, bdy = 0;
            if (this.dir === DIR_UP) { bdy = -1; by = this.y - 4; }
            if (this.dir === DIR_DOWN) { bdy = 1; by = this.y + this.h + 4; }
            if (this.dir === DIR_LEFT) { bdx = -1; bx = this.x - 4; }
            if (this.dir === DIR_RIGHT) { bdx = 1; bx = this.x + this.w + 4; }

            bullets.push(new Bullet(bx, by, bdx, bdy, this.isPlayer, this)); sfx.playShoot(this.isPlayer && !this.isAllyAI);
            
            if (this.isPlayer && !this.isAllyAI) this.cooldown = this.weaponLevel >= 1 ? 150 : 400;
            else this.cooldown = this.eType === 'RAPID' ? 200 : 500;
        }
    }

    draw(ctx) {
        ctx.save(); ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
        
        // Замороженные враги
        if (!this.isPlayer && !this.isAllyAI && timeStopTimer > 0) {
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = '#60a5fa'; // Голубоватый ледяной оттенок
            ctx.fillRect(-this.w/2 - 2, -this.h/2 - 2, this.w + 4, this.h + 4);
            ctx.globalAlpha = 1.0;
        }

        if (this.dir === DIR_RIGHT) ctx.rotate(Math.PI / 2); else if (this.dir === DIR_DOWN) ctx.rotate(Math.PI); else if (this.dir === DIR_LEFT) ctx.rotate(-Math.PI / 2);

        if (this.isBoss) {
            ctx.fillStyle = '#7f1d1d'; ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h); 
            ctx.fillStyle = '#111'; ctx.fillRect(-this.w/2, -this.h/2, 12, this.h); 
            ctx.fillRect(this.w/2 - 12, -this.h/2, 12, this.h); 
            ctx.fillStyle = '#b91c1c'; 
            ctx.fillRect(-16, -this.h/2 - 14, 8, 28); ctx.fillRect(8, -this.h/2 - 14, 8, 28);
            ctx.fillStyle = '#991b1b'; 
            ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.fill();
        } else {
            if (this.isPlayer && !this.isAllyAI) ctx.fillStyle = '#eab308'; 
            else if (this.isAllyAI) ctx.fillStyle = '#0ea5e9'; 
            else if (this.eType === 'FAST') ctx.fillStyle = '#f472b6'; 
            else if (this.eType === 'ARMORED') ctx.fillStyle = '#14532d'; 
            else if (this.eType === 'RAPID') ctx.fillStyle = '#f97316'; 
            else ctx.fillStyle = '#cbd5e1'; 

            ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h); ctx.fillStyle = '#222';
            ctx.fillRect(-this.w/2, -this.h/2, 6, this.h); ctx.fillRect(this.w/2 - 6, -this.h/2, 6, this.h);
            
            ctx.fillStyle = this.isPlayer ? ((this.weaponLevel >= 2 && !this.isAllyAI) ? '#ef4444' : '#16a34a') : '#ef4444'; 
            ctx.fillRect(-3, -this.h/2 - 8, 6, 18);
            ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill(); 
        }
        ctx.restore();

        if (this.isBoss) {
            ctx.fillStyle = '#ef4444'; ctx.fillRect(this.x, this.y - 12, this.w, 6);
            ctx.fillStyle = '#22c55e'; ctx.fillRect(this.x, this.y - 12, this.w * (this.hp / this.maxHp), 6);
        }

        if (this.shieldTimer > 0) {
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(this.x + this.w/2, this.y + this.h/2, this.w/2 + 6, 0, Math.PI * 2); ctx.stroke();
        }
    }
}

class Bullet {
    constructor(x, y, dx, dy, isPlayer, ownerId) {
        this.x = x; this.y = y; this.dx = dx; this.dy = dy;
        this.speed = (isPlayer && ownerId.weaponLevel >= 1) ? 450 : 350;
        this.isPlayer = isPlayer; this.ownerId = ownerId;
        this.radius = 4; this.markForDeletion = false;
    }

    update(dt) {
        this.x += this.dx * this.speed * (dt / 1000); this.y += this.dy * this.speed * (dt / 1000);

        if (this.x < 0 || this.x > COLS * TILE_SIZE || this.y < 0 || this.y > ROWS * TILE_SIZE) {
            this.markForDeletion = true; createExplosion(this.x, this.y, '#aaa', 5); sfx.playArmorHit(); return;
        }

        let col = Math.floor(this.x / TILE_SIZE); let row = Math.floor(this.y / TILE_SIZE);
        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
            let cell = grid[row][col];
            // Пули пролетают над водой (WATER)
            if (cell !== EMPTY && cell !== WATER) {
                this.markForDeletion = true; createExplosion(this.x, this.y, '#ff9900', 10);
                if (cell === BRICK) { grid[row][col] = EMPTY; sfx.playExplosion(false); }
                else if (cell === STEEL) { sfx.playArmorHit(); }
                else if (cell === BASE) { baseAlive = false; createExplosion(this.x, this.y, '#ff0000', 40); sfx.playExplosion(true); levelFailed("БАЗА УНИЧТОЖЕНА!"); return; }
                else if (cell === SUBSTATION && this.isPlayer) {
                    grid[row][col] = EMPTY; substationAlive = false;
                    createExplosion(this.x, this.y, '#0ea5e9', 50); sfx.playExplosion(true); sfx.playBonus(); updateObjectiveUI();
                }
                else if (cell === ENEMY_BASE && this.isPlayer) { 
                    if (substationAlive) {
                        sfx.playArmorHit(); createExplosion(this.x, this.y, '#3b82f6', 15);
                    } else {
                        grid[row][col] = EMPTY; createExplosion(this.x, this.y, '#ff00ff', 50); sfx.playExplosion(true); winLevel(); 
                    }
                }
                return;
            }
        }

        for (let other of bullets) {
            if (other !== this && !other.markForDeletion && this.ownerId !== other.ownerId) {
                let dist = Math.hypot(this.x - other.x, this.y - other.y);
                if (dist < this.radius + other.radius + 4) {
                    this.markForDeletion = true; other.markForDeletion = true;
                    createExplosion((this.x + other.x) / 2, (this.y + other.y) / 2, '#fff', 6); return;
                }
            }
        }

        if (this.isPlayer) {
            for (let enemy of enemies) {
                if (!enemy.markForDeletion && this.checkTankHit(enemy)) {
                    this.markForDeletion = true; enemy.hp--;
                    if (enemy.hp <= 0) {
                        enemy.markForDeletion = true; score += (enemy.isBoss ? 1000 : (enemy.eType === 'NORMAL' ? 100 : 300));
                        document.getElementById('scoreUI').innerText = score;
                        createExplosion(enemy.x + enemy.w/2, enemy.y + enemy.h/2, '#ff4400', enemy.isBoss ? 80 : 25); sfx.playExplosion(true);
                        updateObjectiveUI();
                        
                        if (Math.random() < 0.20) {
                            let bType; let roll = Math.random();
                            if (roll < 0.05) bType = 'BOMB';
                            else if (roll < 0.15) bType = 'TIME';
                            else if (roll < 0.35) bType = Math.random() < 0.5 ? 'ALLY' : 'TURRET';
                            else { const std = ['LIFE', 'SHIELD', 'FIRE', 'BASE']; bType = std[Math.floor(Math.random() * std.length)]; }
                            bonuses.push(new Bonus(enemy.x + 10, enemy.y + 10, bType));
                        }
                    } else { 
                        createExplosion(this.x, this.y, '#fff', 8); sfx.playArmorHit(); 
                        if (enemy.isBoss && Math.random() < 0.05) {
                            let dropTypes = ['FIRE', 'LIFE', 'ALLY', 'TURRET', 'SHIELD', 'TIME'];
                            bonuses.push(new Bonus(this.x, this.y, dropTypes[Math.floor(Math.random() * dropTypes.length)]));
                        }
                    }
                    break;
                }
            }
        } else {
            if (player && !player.markForDeletion && this.checkTankHit(player)) {
                this.markForDeletion = true;
                if (player.shieldTimer > 0) { createExplosion(this.x, this.y, '#3b82f6', 10); sfx.playArmorHit(); }
                else playerDeath();
            }
            for (let ally of allies) {
                if (!ally.markForDeletion && this.checkTankHit(ally)) {
                    this.markForDeletion = true;
                    if (ally.shieldTimer > 0) { createExplosion(this.x, this.y, '#3b82f6', 10); sfx.playArmorHit(); }
                    else {
                        ally.hp--;
                        if (ally.hp <= 0) { ally.markForDeletion = true; createExplosion(ally.x + ally.w/2, ally.y + ally.h/2, '#0ea5e9', 25); sfx.playExplosion(true); }
                        else { createExplosion(this.x, this.y, '#fff', 8); sfx.playArmorHit(); }
                    }
                    break;
                }
            }
            for (let t of turrets) {
                if (!t.markForDeletion && this.x > t.x && this.x < t.x + TILE_SIZE && this.y > t.y && this.y < t.y + TILE_SIZE) {
                    this.markForDeletion = true; t.hp--;
                    if (t.hp <= 0) { t.markForDeletion = true; createExplosion(t.x + TILE_SIZE/2, t.y + TILE_SIZE/2, '#a855f7', 30); sfx.playExplosion(true); }
                    else { createExplosion(this.x, this.y, '#fff', 8); sfx.playArmorHit(); }
                    break;
                }
            }
        }
    }
    checkTankHit(tank) { return this.x > tank.x && this.x < tank.x + tank.w && this.y > tank.y && this.y < tank.y + tank.h; }
    draw(ctx) { ctx.fillStyle = this.isPlayer ? '#fff' : '#fca5a5'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color; const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 80 + 30;
        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed; this.life = 1.0; this.decay = Math.random() * 2 + 1;
    }
    update(dt) { this.x += this.vx * (dt / 1000); this.y += this.vy * (dt / 1000); this.life -= this.decay * (dt / 1000); }
    draw(ctx) { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, 4, 4); ctx.globalAlpha = 1.0; }
}

function createExplosion(x, y, color, count) { for(let i=0; i<count; i++) particles.push(new Particle(x, y, color)); }

/**
 * УПРАВЛЕНИЕ ИГРОЙ
 */
function initGame() {
    sfx.init();
    score = 0; lives = 3; continues = 3; level = 1; lastBossLevel = 0; playerWeaponLevel = 0;
    document.getElementById('scoreUI').innerText = score; document.getElementById('livesUI').innerText = lives; document.getElementById('continuesUI').innerText = continues;
    initLevel(false);
}

function initLevel(retry = false) {
    bullets = []; lasers = []; particles = []; enemies = []; bonuses = []; allies = []; turrets = []; placedMines = []; enemyMines = [];
    document.getElementById('levelUI').innerText = level;
    minesCount = 3; document.getElementById('minesUI').innerText = minesCount; mineCooldown = 0; timeStopTimer = 0;
    
    if (!retry) generateLevel();
    else {
        grid = savedGrid.map(row => [...row]); levelType = savedLevelType; enemyBaseCol = savedEnemyBaseCol; enemiesToSpawn = savedEnemiesToSpawn;
        ROWS = grid.length; baseAlive = true; baseDefTimer = 0; 
        
        substationAlive = false;
        for (let r=0; r<ROWS; r++) {
            for(let c=0; c<COLS; c++) {
                if (grid[r][c] === SUBSTATION) substationAlive = true;
            }
        }
        enemyMines = savedEnemyMinesCoords.map(c => new Mine(c.x, c.y, true));
        updateObjectiveUI();
    }
    
    if (levelType === 'CLASSIC') player = new Tank(4, 14, true); 
    else if (levelType === 'ASSAULT') player = new Tank(7, ROWS - 1, true);
    else if (levelType === 'BOSS') {
        player = new Tank(4, 17, true);
        enemies.push(new Tank(7, 2, false, 'BOSS'));
    }
    
    player.weaponLevel = playerWeaponLevel;
    
    camera.y = levelType === 'ASSAULT' ? (ROWS * TILE_SIZE - canvas.height) : 0;
    if (levelType === 'BOSS') camera.y = ROWS * TILE_SIZE - canvas.height;
    
    gameState = 'PLAYING';
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('transitionScreen').classList.add('hidden');
    document.getElementById('pauseScreen').classList.add('hidden');
    document.getElementById('headerPauseBtn').classList.remove('hidden');
    
    sfx.playStart();
    if (animationId) cancelAnimationFrame(animationId);
    lastTime = performance.now();
    animationId = requestAnimationFrame(gameLoop);
}

function togglePause() {
    if (gameState === 'PLAYING') {
        gameState = 'PAUSED';
        sfx.stopEngine();
        document.getElementById('pauseScreen').classList.remove('hidden');
    } else if (gameState === 'PAUSED') {
        gameState = 'PLAYING';
        document.getElementById('pauseScreen').classList.add('hidden');
        lastTime = performance.now(); 
    }
}

function winLevel() {
    if (gameState === 'LEVEL_TRANSITION' || gameState === 'DYING') return;
    gameState = 'LEVEL_TRANSITION';
    sfx.stopEngine(); sfx.playWin();
    level++;
    if (lives < 3) lives = 3; document.getElementById('livesUI').innerText = lives;
    let transitionText = document.getElementById('transitionText');
    transitionText.innerHTML = `УРОВЕНЬ ПРОЙДЕН!<br><br><span class="text-white text-xl">ПРИГОТОВЬТЕСЬ К УРОВНЮ ${level}</span>`;
    document.getElementById('transitionScreen').classList.remove('hidden');
    setTimeout(() => { initLevel(false); }, 3500); 
}

function levelFailed(reason) {
    if (gameState === 'DYING' || gameState === 'GAMEOVER' || gameState === 'LEVEL_TRANSITION') return;
    gameState = 'DYING'; sfx.stopEngine(); sfx.playLose();
    
    setTimeout(() => {
        if (continues > 0) {
            continues--; document.getElementById('continuesUI').innerText = continues;
            gameState = 'LEVEL_TRANSITION';
            let transitionText = document.getElementById('transitionText');
            transitionText.innerHTML = `${reason}<br><br><span class="text-white text-xl">ОСТАЛОСЬ ПОПЫТОК: ${continues}</span>`;
            document.getElementById('transitionScreen').classList.remove('hidden');
            setTimeout(() => { lives = 3; document.getElementById('livesUI').innerText = lives; initLevel(true); }, 3500);
        } else gameOver();
    }, 1500); 
}

function playerDeath() {
    createExplosion(player.x + player.w/2, player.y + player.h/2, '#ff0000', 40); sfx.playExplosion(true); sfx.stopEngine();
    player.markForDeletion = true; lives--; document.getElementById('livesUI').innerText = lives;
    playerWeaponLevel = 0; 
    
    if (lives <= 0) levelFailed("ТАНКИ КОНЧИЛИСЬ!");
    else setTimeout(() => { 
        if(gameState === 'PLAYING') {
            if (levelType === 'CLASSIC') player = new Tank(4, 14, true);
            else if (levelType === 'ASSAULT') player = new Tank(7, ROWS-1, true);
            else if (levelType === 'BOSS') player = new Tank(4, 17, true);
        }
    }, 1000);
}

function gameOver() {
    gameState = 'GAMEOVER';
    document.getElementById('headerPauseBtn').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.remove('hidden');
    document.getElementById('finalScore').innerText = score;
}

function spawnEnemy() {
    if (enemies.length >= MAX_ENEMIES_ON_SCREEN || enemiesToSpawn <= 0) return;
    let eType = 'NORMAL';
    if (level >= 3 && Math.random() < Math.min(0.1 + level * 0.05, 0.5)) {
        let types = ['FAST', 'ARMORED', 'RAPID']; eType = types[Math.floor(Math.random() * types.length)];
    }
    let spawnPoints = levelType === 'CLASSIC' ? [{c: 0, r: 0}, {c: 7, r: 0}, {c: 14, r: 0}] : [{c: 2, r: 4}, {c: 7, r: 4}, {c: 12, r: 4}]; 
    let validSpawns = spawnPoints.filter(pt => {
        let px = pt.c * TILE_SIZE; let py = pt.r * TILE_SIZE;
        for(let e of enemies) if(Math.abs(e.x - px) < TILE_SIZE && Math.abs(e.y - py) < TILE_SIZE) return false;
        if(player && Math.abs(player.x - px) < TILE_SIZE && Math.abs(player.y - py) < TILE_SIZE) return false;
        return true;
    });
    if (validSpawns.length > 0) {
        let sp = validSpawns[Math.floor(Math.random() * validSpawns.length)];
        enemies.push(new Tank(sp.c, sp.r, false, eType)); enemiesToSpawn--; updateObjectiveUI();
    }
}

function update(dt) {
    if (gameState === 'GAMEOVER' || gameState === 'LEVEL_TRANSITION' || gameState === 'DYING') {
        particles.forEach(p => p.update(dt)); particles = particles.filter(p => p.life > 0); return;
    }

    if (levelType === 'CLASSIC' && enemiesToSpawn <= 0 && enemies.length === 0) { winLevel(); return; }
    if (levelType === 'BOSS' && enemies.length === 0) { winLevel(); return; }

    if (timeStopTimer > 0) timeStopTimer -= dt;

    enemySpawnTimer -= dt; if (enemySpawnTimer <= 0) { spawnEnemy(); enemySpawnTimer = ENEMY_SPAWN_RATE; }

    if (baseDefTimer > 0) {
        baseDefTimer -= dt;
        if (baseDefTimer <= 0 && (levelType === 'CLASSIC' || levelType === 'BOSS')) {
            let br = levelType === 'CLASSIC' ? 14 : 17;
            let pts = [[br,6], [br,8], [br-1,6], [br-1,7], [br-1,8]];
            pts.forEach(p => { if (p[0] >= 0 && p[0] < ROWS && p[1] >= 0 && p[1] < COLS && grid[p[0]][p[1]] !== BASE) grid[p[0]][p[1]] = BRICK; });
        }
    }

    if (mineCooldown > 0) mineCooldown -= dt;

    if (player && !player.markForDeletion) {
        player.update(dt);
        
        if ((keys['b'] || keys['B'] || keys['и'] || keys['И'] || touchMine) && mineCooldown <= 0 && minesCount > 0) {
            placedMines.push(new Mine(player.x + player.w/2, player.y + player.h/2));
            minesCount--;
            document.getElementById('minesUI').innerText = minesCount;
            mineCooldown = 500;
            sfx.playArmorHit(); 
        }

        for (let bonus of bonuses) {
            if (!bonus.markForDeletion && player.x < bonus.x + bonus.w && player.x + player.w > bonus.x && player.y < bonus.y + bonus.h && player.y + player.h > bonus.y) {
                bonus.markForDeletion = true; score += 500; document.getElementById('scoreUI').innerText = score;
                sfx.playBonus();

                if (bonus.type === 'LIFE') { if (lives < 6) lives++; document.getElementById('livesUI').innerText = lives; } 
                else if (bonus.type === 'SHIELD') { player.shieldTimer = 10000; } 
                else if (bonus.type === 'FIRE') { 
                    if (playerWeaponLevel < 2) playerWeaponLevel++; 
                    player.weaponLevel = playerWeaponLevel; 
                } 
                else if (bonus.type === 'BASE' && (levelType === 'CLASSIC' || levelType === 'BOSS')) {
                    baseDefTimer = 15000; 
                    let br = levelType === 'CLASSIC' ? 14 : 17;
                    let pts = [[br,6], [br,8], [br-1,6], [br-1,7], [br-1,8]];
                    pts.forEach(p => { if (p[0] >= 0 && p[0] < ROWS && p[1] >= 0 && p[1] < COLS && grid[p[0]][p[1]] !== BASE) grid[p[0]][p[1]] = STEEL; });
                } 
                else if (bonus.type === 'ALLY') {
                    let spawnR = levelType === 'CLASSIC' ? 14 : (levelType === 'BOSS' ? 17 : ROWS - 1); 
                    let spawnC = levelType === 'CLASSIC' ? 4 : (levelType === 'BOSS' ? 4 : 7);
                    allies.push(new Tank(spawnC, spawnR, true, 'NORMAL', true));
                } 
                else if (bonus.type === 'TURRET') {
                    let tc = Math.floor(player.x / TILE_SIZE); let tr = Math.floor(player.y / TILE_SIZE) - 2;
                    if (levelType === 'CLASSIC' || levelType === 'BOSS') { tc = 7; tr = (levelType === 'CLASSIC' ? 12 : 15); } if (tr < 0) tr = 0;
                    if (grid[tr][tc] === BRICK || grid[tr][tc] === STEEL || grid[tr][tc] === WATER) grid[tr][tc] = EMPTY; 
                    turrets.push(new Turret(tc, tr));
                }
                else if (bonus.type === 'BOMB') {
                    sfx.playExplosion(true);
                    enemies.forEach(e => {
                        e.markForDeletion = true; createExplosion(e.x + e.w/2, e.y + e.h/2, '#ff4400', e.isBoss ? 80 : 30);
                        score += (e.isBoss ? 1000 : (e.eType === 'NORMAL' ? 100 : 300));
                    });
                    document.getElementById('scoreUI').innerText = score;
                    updateObjectiveUI();
                }
                else if (bonus.type === 'TIME') {
                    timeStopTimer = 8000;
                }
            }
        }
        
        if (levelType === 'ASSAULT') {
            let targetCamY = player.y - canvas.height / 2 + player.h / 2;
            camera.y += (targetCamY - camera.y) * 0.1;
            if (camera.y < 0) camera.y = 0; if (camera.y > ROWS * TILE_SIZE - canvas.height) camera.y = ROWS * TILE_SIZE - canvas.height;
        } else if (levelType === 'CLASSIC') {
            camera.y = 0;
        } // У босса камера зафиксирована в initLevel
    }
    
    enemies.forEach(e => e.update(dt)); allies.forEach(a => a.update(dt)); turrets.forEach(t => t.update(dt));
    bullets.forEach(b => b.update(dt)); lasers.forEach(l => l.update(dt)); particles.forEach(p => p.update(dt)); bonuses.forEach(b => b.update(dt));
    placedMines.forEach(m => m.update(dt)); enemyMines.forEach(m => m.update(dt));

    enemies = enemies.filter(e => !e.markForDeletion); allies = allies.filter(a => !a.markForDeletion);
    turrets = turrets.filter(t => !t.markForDeletion); bullets = bullets.filter(b => !b.markForDeletion);
    lasers = lasers.filter(l => !l.markForDeletion); particles = particles.filter(p => p.life > 0); bonuses = bonuses.filter(b => !b.markForDeletion);
    placedMines = placedMines.filter(m => !m.markForDeletion); enemyMines = enemyMines.filter(m => !m.markForDeletion);
    if (player && player.markForDeletion) player = null;
}

function draw() {
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(0, -camera.y);

    let startRow = Math.max(0, Math.floor(camera.y / TILE_SIZE));
    let endRow = Math.min(ROWS - 1, Math.floor((camera.y + canvas.height) / TILE_SIZE) + 1);

    for (let r = startRow; r <= endRow; r++) {
        for (let c = 0; c < COLS; c++) {
            let cell = grid[r][c]; let px = c * TILE_SIZE; let py = r * TILE_SIZE;
            if (cell === BRICK) {
                ctx.fillStyle = '#b94022'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE); ctx.strokeStyle = '#e67357'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(px, py + TILE_SIZE/2); ctx.lineTo(px + TILE_SIZE, py + TILE_SIZE/2);
                ctx.moveTo(px + TILE_SIZE/2, py); ctx.lineTo(px + TILE_SIZE/2, py + TILE_SIZE/2); ctx.stroke();
            } 
            else if (cell === STEEL) {
                ctx.fillStyle = '#ccc'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                ctx.fillStyle = '#fff'; ctx.fillRect(px + 4, py + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                ctx.fillStyle = '#999'; ctx.fillRect(px + 8, py + 8, TILE_SIZE - 16, TILE_SIZE - 16);
            }
            else if (cell === WATER) {
                ctx.fillStyle = '#0284c7'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                ctx.fillStyle = '#38bdf8';
                let offset = Math.sin(Date.now() / 200 + px) * 2;
                ctx.fillRect(px + 4, py + 8 + offset, 24, 2);
                ctx.fillRect(px + 4, py + 24 - offset, 24, 2);
            }
            else if (cell === BASE) {
                if (baseAlive) {
                    ctx.fillStyle = '#16a34a'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE); ctx.fillStyle = '#15803d';
                    ctx.beginPath(); ctx.arc(px + TILE_SIZE/2, py + TILE_SIZE/2, TILE_SIZE/2 - 4, 0, Math.PI*2); ctx.fill();
                } else { ctx.fillStyle = '#555'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE); }
            }
            else if (cell === SUBSTATION) {
                ctx.fillStyle = '#0284c7'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                ctx.fillStyle = '#0ea5e9'; ctx.beginPath(); 
                ctx.arc(px + TILE_SIZE/2, py + TILE_SIZE/2, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = (Math.floor(Date.now() / 200) % 2 === 0) ? '#fff' : '#7dd3fc';
                ctx.beginPath(); ctx.arc(px + TILE_SIZE/2, py + TILE_SIZE/2, 4, 0, Math.PI*2); ctx.fill();
            }
            else if (cell === ENEMY_BASE) {
                ctx.fillStyle = '#b91c1c'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE); ctx.fillStyle = '#7f1d1d'; ctx.beginPath(); 
                ctx.moveTo(px + TILE_SIZE/2, py + 4); ctx.lineTo(px + TILE_SIZE - 4, py + TILE_SIZE - 4);
                ctx.lineTo(px + 4, py + TILE_SIZE - 4); ctx.fill();
                
                if (substationAlive) {
                    ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(px + TILE_SIZE/2, py + TILE_SIZE/2, TILE_SIZE/2 + 2, 0, Math.PI*2); ctx.stroke();
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.3)'; ctx.fill();
                }
            }
        }
    }

    placedMines.forEach(m => m.draw(ctx));
    enemyMines.forEach(m => m.draw(ctx));
    bonuses.forEach(b => b.draw(ctx));
    turrets.forEach(t => t.draw(ctx));
    if (player && !player.markForDeletion) player.draw(ctx);
    allies.forEach(a => a.draw(ctx));
    enemies.forEach(e => e.draw(ctx));
    bullets.forEach(b => b.draw(ctx));
    lasers.forEach(l => l.draw(ctx));
    particles.forEach(p => p.draw(ctx));
    ctx.restore();
}

function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    let dt = timestamp - lastTime; lastTime = timestamp;
    if (dt > 100) dt = 16; 
    
    if (gameState !== 'PAUSED') {
        update(dt); 
    }
    draw();

    if (gameState === 'PLAYING' || gameState === 'LEVEL_TRANSITION' || gameState === 'DYING' || gameState === 'PAUSED') {
        animationId = requestAnimationFrame(gameLoop);
    }
}

/**
 * СОБЫТИЯ УПРАВЛЕНИЯ
 */
window.addEventListener('keydown', e => { 
    if(keys.hasOwnProperty(e.key)) keys[e.key] = true; 
    if(e.key === 'Escape' && (gameState === 'PLAYING' || gameState === 'PAUSED')) togglePause();
});
window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

document.getElementById('startBtn').addEventListener('click', () => { initGame(); });
document.getElementById('restartBtn').addEventListener('click', () => { window.location.reload(); });
document.getElementById('headerPauseBtn').addEventListener('click', togglePause);
document.getElementById('resumeBtn').addEventListener('click', togglePause);

// Сохранение и загрузка
document.getElementById('saveBtn').addEventListener('click', saveGame);
document.getElementById('startLoadBtn').addEventListener('click', () => { sfx.init(); loadGame('startLoadBtn'); });
document.getElementById('pauseLoadBtn').addEventListener('click', () => { loadGame('pauseLoadBtn'); });

// Экспорт в физический файл на ПК/Телефон
document.getElementById('exportBtn').addEventListener('click', () => {
    const data = { level, score, lives, continues, lastBossLevel, playerWeaponLevel };
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
    const dlAnchorElem = document.createElement('a');
    dlAnchorElem.setAttribute("href", dataStr);
    dlAnchorElem.setAttribute("download", `tanks_save_lvl${level}.json`);
    document.body.appendChild(dlAnchorElem);
    dlAnchorElem.click();
    dlAnchorElem.remove();
    
    let btn = document.getElementById('exportBtn');
    let old = btn.innerText;
    btn.innerText = 'СКАЧАНО!';
    setTimeout(() => { btn.innerText = old; }, 2000);
});

// Импорт сохранения из файла
const handleFileLoad = (event) => {
    sfx.init();
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            level = data.level || 1;
            score = data.score || 0;
            lives = data.lives || 3;
            continues = data.continues || 3;
            lastBossLevel = data.lastBossLevel || 0;
            playerWeaponLevel = data.playerWeaponLevel || 0;

            document.getElementById('scoreUI').innerText = score;
            document.getElementById('livesUI').innerText = lives;
            document.getElementById('continuesUI').innerText = continues;

            document.getElementById('pauseScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.add('hidden');
            
            initLevel(false);
            if (gameState === 'PAUSED') {
                gameState = 'PLAYING';
                lastTime = performance.now();
            }
        } catch (err) {
            alert("Ошибка чтения файла сохранения! Возможно файл поврежден.");
        }
        event.target.value = ''; 
    };
    reader.readAsText(file);
};

document.getElementById('fileLoadStart').addEventListener('change', handleFileLoad);
document.getElementById('fileLoadPause').addEventListener('change', handleFileLoad);

document.getElementById('muteBtn').addEventListener('click', (e) => {
    sfx.isMuted = !sfx.isMuted;
    const btn = e.target;
    if (sfx.isMuted) {
        btn.innerText = 'ЗВУК: ВЫКЛ'; btn.classList.replace('bg-green-600', 'bg-red-600'); btn.classList.replace('hover:bg-green-500', 'hover:bg-red-500'); btn.classList.replace('border-green-700', 'border-red-700');
    } else {
        btn.innerText = 'ЗВУК: ВКЛ'; btn.classList.replace('bg-red-600', 'bg-green-600'); btn.classList.replace('hover:bg-red-500', 'hover:bg-green-500'); btn.classList.replace('border-red-700', 'border-green-700');
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
});

// Глобальная обработка тачей для "скольжения" (D-PAD)
const mobileControls = document.getElementById('mobile-controls');
const handleTouch = (e) => {
    e.preventDefault(); 
    
    touchDirs.up = false;
    touchDirs.down = false;
    touchDirs.left = false;
    touchDirs.right = false;
    touchFire = false;
    touchMine = false;

    ['btn-up', 'btn-down', 'btn-left', 'btn-right', 'btn-fire', 'btn-mine'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('active-btn');
    });

    for (let i = 0; i < e.touches.length; i++) {
        const touch = e.touches[i];
        const element = document.elementFromPoint(touch.clientX, touch.clientY);
        if (element) {
            const btn = element.closest('.btn, .btn-fire, .btn-mine');
            if (btn) {
                if (btn.id === 'btn-up') touchDirs.up = true;
                if (btn.id === 'btn-down') touchDirs.down = true;
                if (btn.id === 'btn-left') touchDirs.left = true;
                if (btn.id === 'btn-right') touchDirs.right = true;
                if (btn.id === 'btn-fire') touchFire = true;
                if (btn.id === 'btn-mine') touchMine = true;
                btn.classList.add('active-btn');
            }
        }
    }
};

if (mobileControls) {
    mobileControls.addEventListener('touchstart', handleTouch, { passive: false });
    mobileControls.addEventListener('touchmove', handleTouch, { passive: false });
    mobileControls.addEventListener('touchend', handleTouch, { passive: false });
    mobileControls.addEventListener('touchcancel', handleTouch, { passive: false });
}

// Для мыши на компьютере
const setupMouseBtn = (id, actionDown, actionUp) => {
    const btn = document.getElementById(id);
    const triggerDown = (e) => { e.preventDefault(); actionDown(); btn.classList.add('active-btn'); };
    const triggerUp = (e) => { e.preventDefault(); actionUp(); btn.classList.remove('active-btn'); };
    btn.addEventListener('mousedown', triggerDown);
    btn.addEventListener('mouseup', triggerUp);
    btn.addEventListener('mouseleave', triggerUp);
};

setupMouseBtn('btn-up', () => touchDirs.up = true, () => touchDirs.up = false);
setupMouseBtn('btn-down', () => touchDirs.down = true, () => touchDirs.down = false);
setupMouseBtn('btn-left', () => touchDirs.left = true, () => touchDirs.left = false);
setupMouseBtn('btn-right', () => touchDirs.right = true, () => touchDirs.right = false);
setupMouseBtn('btn-fire', () => touchFire = true, () => touchFire = false);
setupMouseBtn('btn-mine', () => touchMine = true, () => touchMine = false);

</script>
